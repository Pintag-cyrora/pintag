<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src * data: blob:; connect-src https://*.supabase.co; frame-src 'none'; object-src 'none';">
<title>Pintag Admin · Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;--teal-dim:rgba(45,140,140,0.08);--teal-border:rgba(45,140,140,0.22);
  --ink:#1A2428;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--warm-deep:#EDE8E0;--white:#fff;
  --border:rgba(26,36,40,0.1);--border-mid:rgba(26,36,40,0.13);
  --red:#C0392B;--green:#1E6B45;--gold:#B8860B;
  --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--warm);color:var(--ink);line-height:1.6;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);}
.login-box{width:100%;max-width:360px;padding:48px 40px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);text-align:center;}
.login-logo{font-size:22px;font-weight:600;color:#fff;margin-bottom:6px;}
.login-sub{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;margin-bottom:12px;border-radius:3px;}
.login-input::placeholder{color:rgba(255,255,255,0.3);}
.login-btn{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:500;cursor:pointer;border-radius:3px;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.login-btn:hover{background:var(--teal-light);}
.login-error{color:#e74c3c;font-size:13px;margin-top:8px;display:none;}
#intel-screen{display:none;}

/* ── NAV ─────────────────────────────────────────────────────────── */
.admin-nav{background:var(--ink);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-nav-logo{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;}
.admin-nav-logo span{color:var(--teal-light);}
.admin-nav-crumb{font-size:12px;color:rgba(255,255,255,0.4);}
.admin-nav-right{display:flex;align-items:center;gap:10px;}
.admin-nav-btn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:3px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-decoration:none;display:inline-block;}
.btn-back{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);}
.btn-back:hover{background:rgba(255,255,255,0.15);}
.btn-logout{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}
.btn-logout:hover{background:rgba(255,255,255,0.15);}

.intel-body{max-width:820px;margin:0 auto;padding:28px 24px 80px;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink-muted);transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ── REPORT HEADER ───────────────────────────────────────────────── */
.report-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.report-toolbar-left{display:flex;align-items:center;gap:10px;}
.insp-btn{font-size:12px;font-weight:600;padding:9px 16px;border-radius:5px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:var(--teal);color:#fff;transition:background 0.2s;white-space:nowrap;}
.insp-btn:hover{background:var(--teal-light);}
.insp-btn:disabled{opacity:0.5;cursor:not-allowed;}
.insp-btn.secondary{background:var(--warm-deep);color:var(--ink-soft);}
.insp-btn.secondary:hover{background:var(--border-mid);}
select.prev-reports{font-family:'DM Sans',sans-serif;font-size:12.5px;padding:8px 10px;border:1px solid var(--border-mid);border-radius:5px;background:var(--white);color:var(--ink);}

.report-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:28px 30px;margin-bottom:20px;}
.report-meta{font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.report-title{font-size:20px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);margin-bottom:10px;}
.report-summary{font-size:14.5px;color:var(--ink-soft);background:var(--teal-dim);border-left:3px solid var(--teal);padding:12px 16px;border-radius:0 6px 6px 0;margin-bottom:20px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid transparent;}
.chip.new{background:rgba(184,134,11,0.14);color:#8A6100;}
.chip.continuing{background:rgba(192,57,43,0.10);color:var(--red);}
.chip.resolved{background:rgba(30,107,69,0.12);color:var(--green);}
.chip .dot{margin-right:4px;}
.report-body{font-size:14px;color:var(--ink-soft);}
.report-body h1{font-size:17px;font-weight:600;color:var(--ink);margin:22px 0 8px;}
.report-body h1:first-child{margin-top:0;}
.report-body h2{font-size:14.5px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:0.04em;margin:20px 0 8px;}
.report-body p{margin-bottom:10px;}
.report-body ul{margin:0 0 10px 20px;}
.report-body li{margin-bottom:4px;}
.report-body strong{color:var(--ink);}

.supporting-toggle{font-size:12px;font-weight:600;color:var(--teal);cursor:pointer;user-select:none;margin-top:6px;}
.supporting-panel{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.supporting-panel.open{display:block;}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.metric-card{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.metric-label{font-size:9.5px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.metric-value{font-size:16px;font-weight:600;color:var(--ink);}

.insp-empty{padding:40px 20px;text-align:center;color:var(--ink-muted);font-size:13px;}
.insp-loading{padding:40px;text-align:center;color:var(--ink-muted);font-size:13px;}

/* ── ARCHIVE ─────────────────────────────────────────────────────── */
.archive-filters{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.insp-field{display:flex;flex-direction:column;gap:4px;}
.insp-field label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);}
.insp-field input,.insp-field select{font-family:'DM Sans',sans-serif;font-size:12.5px;padding:8px 10px;border:1px solid var(--border-mid);border-radius:5px;background:var(--warm);color:var(--ink);min-width:140px;}
.archive-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.archive-table th{text-align:left;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);padding:10px 14px;background:var(--warm);border-bottom:1px solid var(--border);}
.archive-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--ink-soft);vertical-align:middle;}
.archive-table tr:last-child td{border-bottom:none;}
.archive-table tr.clickable{cursor:pointer;transition:background 0.15s;}
.archive-table tr.clickable:hover{background:var(--teal-dim);}
.severity-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.03em;}
.severity-pill.low{background:var(--warm-deep);color:var(--ink-soft);}
.severity-pill.medium{background:rgba(184,134,11,0.14);color:#8A6100;}
.severity-pill.high{background:rgba(192,57,43,0.12);color:var(--red);}
.severity-pill.critical{background:var(--red);color:#fff;}
.status-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.status-pill.open{background:rgba(45,140,140,0.14);color:var(--teal);}
.status-pill.resolved{background:var(--warm-deep);color:var(--ink-muted);}

.insp-back-link{font-size:12px;color:var(--teal);text-decoration:none;display:inline-block;margin-bottom:14px;}
.insp-back-link:hover{text-decoration:underline;}

.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.timeline-item:last-child{border-bottom:none;}
.timeline-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);margin-top:6px;flex-shrink:0;}
.timeline-item.is-resolved .timeline-dot{background:var(--green);}
.timeline-date{font-family:var(--mono);font-size:11px;color:var(--ink-muted);min-width:90px;}
.timeline-text{font-size:13px;color:var(--ink-soft);}
.timeline-text a{color:var(--teal);text-decoration:none;}
.timeline-text a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">Pintag</p>
    <p class="login-sub">Intelligence</p>
    <input type="password" class="login-input" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect password</p>
  </div>
</div>

<div id="intel-screen">
  <nav class="admin-nav">
    <p class="admin-nav-logo">Pintag <span>Admin</span> <span class="admin-nav-crumb">/ 🧠 Intelligence</span></p>
    <div class="admin-nav-right">
      <a href="admin.html" class="admin-nav-btn btn-back">← Admin</a>
      <button class="admin-nav-btn btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="intel-body">

    <div class="tabs" id="intel-tabs">
      <button class="tab active" data-tab="daily" onclick="switchTab('daily')">Daily Report</button>
      <button class="tab" data-tab="weekly" onclick="switchTab('weekly')">Weekly Report</button>
      <button class="tab" data-tab="monthly" onclick="switchTab('monthly')">Monthly Report</button>
      <button class="tab" data-tab="archive" onclick="switchTab('archive')">Insights Archive</button>
    </div>

    <!-- ── REPORT VIEW (daily/weekly/monthly share this) ─────────── -->
    <div id="report-view">
      <div class="report-toolbar">
        <div class="report-toolbar-left">
          <select class="prev-reports" id="prev-reports-select" onchange="onPickPreviousReport(this.value)">
            <option value="">Previous reports…</option>
          </select>
        </div>
        <button class="insp-btn" id="regenerate-btn" onclick="regenerateReport()">🔄 Regenerate</button>
      </div>
      <div id="report-container"><div class="insp-loading">Loading report…</div></div>
    </div>

    <!-- ── INSIGHTS ARCHIVE VIEW ──────────────────────────────────── -->
    <div id="archive-view" style="display:none;">
      <div class="archive-filters">
        <div class="insp-field">
          <label>Status</label>
          <select id="af-status"><option value="">All</option><option value="open">Open</option><option value="resolved">Resolved</option></select>
        </div>
        <div class="insp-field">
          <label>Severity</label>
          <select id="af-severity"><option value="">All</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
        </div>
        <div class="insp-field">
          <label>Type</label>
          <select id="af-type">
            <option value="">All</option>
            <option value="demand_spike">Demand spike</option>
            <option value="supply_shortage">Supply shortage</option>
            <option value="ctr_decline">CTR decline</option>
            <option value="ctr_improvement">CTR improvement</option>
            <option value="high_performing_listing">High-performing listing</option>
            <option value="low_performing_listing">Low-performing listing</option>
            <option value="ux_anomaly">UX anomaly</option>
            <option value="conversion_anomaly">Conversion anomaly</option>
            <option value="search_trend">Search trend</option>
            <option value="price_trend">Price trend</option>
          </select>
        </div>
        <div class="insp-field">
          <label>District</label>
          <input type="text" id="af-district" placeholder="e.g. Sisattanak">
        </div>
        <div class="insp-field">
          <label>Property Type</label>
          <input type="text" id="af-property-type" placeholder="e.g. house">
        </div>
        <div class="insp-field">
          <label>Keyword</label>
          <input type="text" id="af-keyword" placeholder="title or summary" onkeydown="if(event.key==='Enter')applyArchiveFilters()">
        </div>
        <button class="insp-btn" onclick="applyArchiveFilters()">Filter</button>
        <button class="insp-btn secondary" onclick="resetArchiveFilters()">Reset</button>
      </div>
      <div id="archive-container"><div class="insp-loading">Loading insights…</div></div>
    </div>

    <!-- ── INSIGHT TIMELINE VIEW ──────────────────────────────────── -->
    <div id="timeline-view" style="display:none;">
      <a href="#" class="insp-back-link" onclick="backToArchive();return false;">← Back to Insights Archive</a>
      <div id="timeline-container"></div>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="dev-banner.js"></script>
<script>
const SUPABASE_URL  = window.PINTAG.supabaseUrl;
const SUPABASE_ANON = window.PINTAG.anonKey;
const ADMIN_EMAIL   = 'admin@pintag.io';
const sbClient      = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let _adminToken = null;
sbClient.auth.onAuthStateChange((event, session) => { _adminToken = session ? session.access_token : null; });

async function login() {
  const pw  = document.getElementById('password-input').value;
  const btn = document.querySelector('.login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await sbClient.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pw });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) { document.getElementById('login-error').style.display = 'block'; return; }
  _adminToken = data.session.access_token;
  showIntelScreen();
}
async function logout() { _adminToken = null; await sbClient.auth.signOut(); location.reload(); }
function showIntelScreen() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('intel-screen').style.display = 'block';
  switchTab('daily');
}
sbClient.auth.getSession().then(({ data: { session } }) => {
  if (session) { _adminToken = session.access_token; showIntelScreen(); }
});

// ── REST helpers ─────────────────────────────────────────────────────
async function sbGet(path) {
  const token = _adminToken || SUPABASE_ANON;
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) { console.error('[Intelligence] REST error', path, res.status); return []; }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}
async function callGenerateReport(reportType, periodEnd) {
  const token = _adminToken || SUPABASE_ANON;
  const res = await fetch(SUPABASE_URL + '/functions/v1/generate-intelligence-report', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(periodEnd ? { report_type: reportType, period_end: periodEnd } : { report_type: reportType })
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || ('Request failed: ' + res.status));
  return body;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
}

// ══════════════════════════════════════════════════════════════════
// Minimal markdown renderer. The report prompt constrains Gemini to
// exactly this subset (# / ## headings, paragraphs, bullet lists, bold
// via **text**) — a full markdown library would be overkill and adds a
// dependency for syntax the model never produces. Every string is
// esc()-escaped before any markup is applied, so this cannot introduce
// an XSS path even if Gemini's output ever contained stray HTML.
// ══════════════════════════════════════════════════════════════════
function renderMarkdown(md) {
  if (!md) return '';
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let inList = false;
  let paraBuf = [];

  function inlineFormat(s) {
    return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }
  function flushPara() {
    if (paraBuf.length) { html += '<p>' + inlineFormat(paraBuf.join(' ')) + '</p>'; paraBuf = []; }
  }
  function closeListIfOpen() {
    if (inList) { html += '</ul>'; inList = false; }
  }

  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) { flushPara(); closeListIfOpen(); return; }
    if (trimmed.startsWith('# ')) { flushPara(); closeListIfOpen(); html += '<h1>' + inlineFormat(trimmed.slice(2)) + '</h1>'; return; }
    if (trimmed.startsWith('## ')) { flushPara(); closeListIfOpen(); html += '<h2>' + inlineFormat(trimmed.slice(3)) + '</h2>'; return; }
    if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
      flushPara();
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inlineFormat(trimmed.slice(2)) + '</li>';
      return;
    }
    closeListIfOpen();
    paraBuf.push(trimmed);
  });
  flushPara();
  closeListIfOpen();
  return html;
}

// ══════════════════════════════════════════════════════════════════
// Tabs
// ══════════════════════════════════════════════════════════════════
let currentTab = 'daily';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#intel-tabs .tab').forEach((el) => el.classList.toggle('active', el.dataset.tab === tab));
  document.getElementById('report-view').style.display = tab === 'archive' ? 'none' : 'block';
  document.getElementById('archive-view').style.display = tab === 'archive' ? 'block' : 'none';
  document.getElementById('timeline-view').style.display = 'none';

  if (tab === 'archive') {
    resetArchiveFilters();
  } else {
    loadReportTab(tab);
  }
}

// ══════════════════════════════════════════════════════════════════
// Report tabs (daily / weekly / monthly)
// ══════════════════════════════════════════════════════════════════
async function loadReportTab(reportType) {
  document.getElementById('report-container').innerHTML = '<div class="insp-loading">Loading report…</div>';
  const [reports, prevList] = await Promise.all([
    sbGet('intelligence_reports?report_type=eq.' + reportType + '&order=generated_at.desc&limit=1&select=*'),
    sbGet('intelligence_reports?report_type=eq.' + reportType + '&order=generated_at.desc&limit=20&select=id,title,period_start,period_end,generated_at,status')
  ]);
  populatePreviousReportsSelect(prevList);
  if (!reports.length) {
    document.getElementById('report-container').innerHTML = '<div class="insp-empty">No ' + reportType + ' report has been generated yet. Click 🔄 Regenerate to create the first one.</div>';
    return;
  }
  await renderReport(reports[0]);
}

function populatePreviousReportsSelect(list) {
  const sel = document.getElementById('prev-reports-select');
  sel.innerHTML = '<option value="">Previous reports…</option>' + list.map((r) =>
    '<option value="' + r.id + '">' + esc(fmtDate(r.period_end)) + (r.status === 'failed' ? ' (failed)' : '') + ' — ' + esc(r.title || 'Untitled') + '</option>'
  ).join('');
}

async function onPickPreviousReport(id) {
  if (!id) return;
  const rows = await sbGet('intelligence_reports?id=eq.' + id + '&select=*');
  if (rows.length) await renderReport(rows[0]);
}

async function renderReport(report) {
  const container = document.getElementById('report-container');

  if (report.status === 'failed') {
    container.innerHTML =
      '<div class="report-card"><div class="report-meta">' + esc(report.report_type) + ' · ' + esc(fmtDateTime(report.generated_at)) + ' · FAILED</div>' +
      '<p style="color:var(--red);font-size:13.5px;">' + esc(report.error_message || 'Report generation failed.') + '</p></div>';
    return;
  }

  const links = await sbGet(
    'report_insights?report_id=eq.' + report.id + '&select=role,intelligence_insights(*)'
  );
  const insights = links.map((l) => Object.assign({ _role: l.role }, l.intelligence_insights)).filter((i) => i && i.id);

  const groups = { new: [], continuing: [], resolved: [] };
  insights.forEach((ins) => {
    const resolvedInPeriod = ins.resolved_at && ins.resolved_at.slice(0, 10) >= report.period_start && ins.resolved_at.slice(0, 10) <= report.period_end;
    const firstSeenInPeriod = ins.first_seen >= report.period_start && ins.first_seen <= report.period_end;
    if (resolvedInPeriod) groups.resolved.push(ins);
    else if (firstSeenInPeriod) groups.new.push(ins);
    else groups.continuing.push(ins);
  });

  const chipHtml = (arr, cls, dot, prefix) => arr.map((i) =>
    '<span class="chip ' + cls + '" onclick="openInsightTimelineById(\'' + i.id + '\')" title="' + esc(i.summary || '') + '">' +
    '<span class="dot">' + dot + '</span>' + esc(i.title) + '</span>'
  ).join('');

  const metrics = report.metrics_snapshot || {};
  const scalarKeys = ['listing_impressions', 'listing_clicks', 'listing_views', 'listing_ctr', 'whatsapp_clicks', 'call_clicks', 'leads_created', 'leads_closed', 'sessions_total'];
  const metricCards = scalarKeys.filter((k) => metrics[k] !== undefined).map((k) =>
    '<div class="metric-card"><div class="metric-label">' + esc(k.replace(/_/g, ' ')) + '</div><div class="metric-value">' + esc(metrics[k]) + '</div></div>'
  ).join('');

  container.innerHTML =
    '<div class="report-card">' +
      '<div class="report-meta">' + esc(report.report_type.toUpperCase()) + ' · ' + esc(fmtDate(report.period_start)) +
        (report.period_start !== report.period_end ? ' – ' + esc(fmtDate(report.period_end)) : '') +
        ' · generated ' + esc(fmtDateTime(report.generated_at)) + '</div>' +
      '<div class="report-title">' + esc(report.title || 'Untitled report') + '</div>' +
      (report.executive_summary ? '<div class="report-summary">' + esc(report.executive_summary) + '</div>' : '') +
      (insights.length ? '<div class="chip-row">' +
        chipHtml(groups.new, 'new', '🟢', 'NEW') +
        chipHtml(groups.continuing, 'continuing', '🔴', 'CONTINUING') +
        chipHtml(groups.resolved, 'resolved', '✅', 'RESOLVED') +
      '</div>' : '') +
      '<div class="report-body">' + renderMarkdown(report.body_markdown) + '</div>' +
      (metricCards ? '<div class="supporting-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">▸ Supporting data</div>' +
        '<div class="supporting-panel"><div class="metric-grid">' + metricCards + '</div></div>' : '') +
    '</div>';
}

async function regenerateReport() {
  const btn = document.getElementById('regenerate-btn');
  btn.disabled = true; btn.textContent = 'Generating…';
  try {
    await callGenerateReport(currentTab);
    await loadReportTab(currentTab);
  } catch (e) {
    alert('Failed to generate report: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '🔄 Regenerate';
  }
}

// ══════════════════════════════════════════════════════════════════
// Insights Archive
// ══════════════════════════════════════════════════════════════════
function resetArchiveFilters() {
  ['af-status', 'af-severity', 'af-type'].forEach((id) => document.getElementById(id).value = '');
  ['af-district', 'af-property-type', 'af-keyword'].forEach((id) => document.getElementById(id).value = '');
  applyArchiveFilters();
}

async function applyArchiveFilters() {
  const container = document.getElementById('archive-container');
  container.innerHTML = '<div class="insp-loading">Loading insights…</div>';

  const status = document.getElementById('af-status').value;
  const severity = document.getElementById('af-severity').value;
  const type = document.getElementById('af-type').value;
  const district = document.getElementById('af-district').value.trim();
  const propertyType = document.getElementById('af-property-type').value.trim();
  const keyword = document.getElementById('af-keyword').value.trim();

  const params = ['select=*', 'order=first_seen.desc', 'limit=100'];
  if (status === 'open') params.push('resolved_at=is.null');
  if (status === 'resolved') params.push('resolved_at=not.is.null');
  if (severity) params.push('severity=eq.' + encodeURIComponent(severity));
  if (type) params.push('type=eq.' + encodeURIComponent(type));
  if (district) params.push('dimension_district=ilike.*' + encodeURIComponent(district) + '*');
  if (propertyType) params.push('dimension_property_type=ilike.*' + encodeURIComponent(propertyType) + '*');
  if (keyword) {
    const kw = encodeURIComponent(keyword);
    params.push('or=(title.ilike.*' + kw + '*,summary.ilike.*' + kw + '*)');
  }

  const rows = await sbGet('intelligence_insights?' + params.join('&'));
  renderArchiveTable(rows);
}

function renderArchiveTable(rows) {
  const container = document.getElementById('archive-container');
  if (!rows.length) { container.innerHTML = '<div class="insp-empty">No insights match these filters.</div>'; return; }

  container.innerHTML =
    '<table class="archive-table"><thead><tr>' +
      '<th>Insight</th><th>Type</th><th>Dimension</th><th>Severity</th><th>Status</th><th>First Seen</th><th>Last Seen</th>' +
    '</tr></thead><tbody>' +
    rows.map((i) => {
      const dims = [i.dimension_district, i.dimension_property_type].filter(Boolean).join(' / ') || '—';
      const isOpen = !i.resolved_at;
      return '<tr class="clickable" onclick="openInsightTimelineById(\'' + i.id + '\')">' +
        '<td>' + esc(i.title) + '</td>' +
        '<td>' + esc(i.type.replace(/_/g, ' ')) + '</td>' +
        '<td>' + esc(dims) + '</td>' +
        '<td><span class="severity-pill ' + esc(i.severity) + '">' + esc(i.severity) + '</span></td>' +
        '<td><span class="status-pill ' + (isOpen ? 'open' : 'resolved') + '">' + (isOpen ? 'Open' : 'Resolved') + '</span></td>' +
        '<td>' + esc(fmtDate(i.first_seen)) + '</td>' +
        '<td>' + esc(fmtDate(i.last_seen)) + '</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table>';
}

// ══════════════════════════════════════════════════════════════════
// Intelligence Timeline — one insight's full history across reports
// ══════════════════════════════════════════════════════════════════
async function openInsightTimelineById(id) {
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('archive-view').style.display = 'none';
  document.getElementById('timeline-view').style.display = 'block';
  document.getElementById('timeline-container').innerHTML = '<div class="insp-loading">Loading timeline…</div>';

  const [insightRows, links] = await Promise.all([
    sbGet('intelligence_insights?id=eq.' + id + '&select=*'),
    sbGet('report_insights?insight_id=eq.' + id + '&select=role,intelligence_reports(id,report_type,title,period_start,period_end,generated_at)')
  ]);
  if (!insightRows.length) { document.getElementById('timeline-container').innerHTML = '<div class="insp-empty">Insight not found.</div>'; return; }
  const insight = insightRows[0];
  const reports = links.map((l) => l.intelligence_reports).filter(Boolean)
    .sort((a, b) => a.generated_at < b.generated_at ? -1 : 1);

  const events = [];
  events.push({ date: insight.first_seen, text: '🟢 First detected — <strong>' + esc(insight.title) + '</strong>', resolved: false });
  reports.forEach((r) => {
    events.push({
      date: r.period_end,
      text: 'Discussed in <a href="#" onclick="jumpToReportFromTimeline(\'' + r.report_type + '\',\'' + r.id + '\');return false;">' +
        esc(r.report_type) + ' report — ' + esc(r.title || fmtDate(r.period_end)) + '</a>',
      resolved: false
    });
  });
  if (insight.resolved_at) {
    events.push({ date: insight.resolved_at.slice(0, 10), text: '✅ Resolved', resolved: true });
  } else {
    events.push({ date: insight.last_seen, text: '🔴 Still active as of ' + esc(fmtDate(insight.last_seen)) + ' (trend: ' + esc(insight.trend) + ')', resolved: false });
  }
  events.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);

  document.getElementById('timeline-container').innerHTML =
    '<div class="report-card">' +
      '<div class="report-meta">' + esc(insight.type.replace(/_/g, ' ')) + ' · ' + esc(insight.severity) + ' severity · ' +
        Math.round((insight.confidence || 0) * 100) + '% confidence</div>' +
      '<div class="report-title">' + esc(insight.title) + '</div>' +
      (insight.summary ? '<p style="color:var(--ink-soft);margin-bottom:16px;">' + esc(insight.summary) + '</p>' : '') +
      (insight.recommendation ? '<p style="color:var(--ink-soft);margin-bottom:16px;"><strong>Suggested action:</strong> ' + esc(insight.recommendation) + '</p>' : '') +
      '<div class="report-meta" style="margin-top:20px;">Timeline</div>' +
      events.map((e) =>
        '<div class="timeline-item' + (e.resolved ? ' is-resolved' : '') + '"><div class="timeline-dot"></div>' +
        '<div class="timeline-date">' + esc(fmtDate(e.date)) + '</div><div class="timeline-text">' + e.text + '</div></div>'
      ).join('') +
      '<pre style="margin-top:16px;background:var(--ink);color:#B8E8E8;font-family:' + "'SF Mono',ui-monospace,monospace" + ';font-size:11.5px;padding:12px 14px;border-radius:6px;overflow-x:auto;">' + esc(JSON.stringify(insight.evidence, null, 2)) + '</pre>' +
    '</div>';
}

function backToArchive() {
  document.getElementById('timeline-view').style.display = 'none';
  document.getElementById('archive-view').style.display = 'block';
}

function jumpToReportFromTimeline(reportType, reportId) {
  switchTab(reportType);
  setTimeout(async () => {
    const rows = await sbGet('intelligence_reports?id=eq.' + reportId + '&select=*');
    if (rows.length) renderReport(rows[0]);
  }, 0);
}
</script>
