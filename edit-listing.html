<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ແກ້ໄຂອະສັງຫາ • Pintag</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#F5F1EB;
  --panel:#FFFFFF;
  --line:#E7E1DA;
  --text:#17242B;
  --muted:#7C8B92;
  --teal:#4C9494;
  --danger:#B45B5B;
  --radius:28px;
}

body{
  font-family:'Noto Sans Lao',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:24px 16px 120px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}

.page-title{
  font-size:42px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.04em;
}

.back-btn{
  text-decoration:none;
  color:var(--teal);
  font-weight:700;
}

.section{
  background:#fff;
  border-radius:30px;
  padding:24px;
  border:1px solid var(--line);
  margin-bottom:18px;
}

.section-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:10px;
  font-size:15px;
  font-weight:700;
}

.input,
.textarea,
.select{
  width:100%;
  border:1px solid #E4DED7;
  background:#FAF8F5;
  border-radius:20px;
  padding:18px;
  font-size:16px;
  font-family:inherit;
  color:var(--text);
}

.textarea{
  min-height:160px;
  resize:none;
}

.preview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.preview{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:20px;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.remove-img{
  position:absolute;
  top:8px;
  right:8px;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,0.7);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.upload-box{
  border:2px dashed #DDD5CC;
  border-radius:24px;
  padding:24px;
  background:#FBFAF8;
}

.upload-text{
  color:var(--muted);
  line-height:1.8;
  margin-bottom:16px;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.feature{
  background:#F7F3EE;
  border-radius:18px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.save-btn,
.delete-btn{
  flex:1;
  border:none;
  border-radius:22px;
  padding:18px;
  font-size:17px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
}

.save-btn{
  background:var(--teal);
  color:#fff;
}

.delete-btn{
  background:#EFE7E4;
  color:var(--danger);
}

.status-text{
  margin-top:16px;
  color:var(--muted);
  font-size:14px;
}

.delete-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.delete-box{
  background:#fff;
  width:100%;
  max-width:380px;
  border-radius:28px;
  padding:28px;
}

.delete-box h3{
  font-size:24px;
  margin-bottom:10px;
}

.delete-box p{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:22px;
}

.delete-actions{
  display:flex;
  gap:12px;
}

.cancel-btn,
.confirm-btn{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.cancel-btn{
  background:#F2EFEB;
}

.confirm-btn{
  background:var(--danger);
  color:#fff;
}

</style>
</head>
<body>

<div class="topbar">

  <div class="page-title">
    ແກ້ໄຂ<br>
    ອະສັງຫາ
  </div>

  <a href="dashboard.html" class="back-btn">
    ← ກັບ
  </a>

</div>

<div class="section">

  <div class="section-title">
    ຂໍ້ມູນຫຼັກ
  </div>

  <div class="field">
    <label>ຫົວຂໍ້</label>
    <input type="text" class="input" id="title">
  </div>

  <div class="field">
    <label>ລາຄາ</label>
    <input type="text" class="input" id="price">
  </div>

  <div class="field">
    <label>ລາຍລະອຽດ</label>
    <textarea class="textarea" id="description"></textarea>
  </div>

</div>

<div class="section">

  <div class="section-title">
    ສະຖານທີ່
  </div>

  <div class="field">
    <label>ເມືອງ</label>
    <input type="text" class="input" id="district">
  </div>

  <div class="field">
    <label>ບ້ານ</label>
    <input type="text" class="input" id="village">
  </div>

</div>

<div class="section">

  <div class="section-title">
    ຮູບພາບ
  </div>

  <div class="upload-box">

    <div class="upload-text">
      ອັບໂຫລດຫຼາຍຮູບໄດ້<br>
      ຮູບທຳອິດຈະເປັນຮູບໜ້າປົກ
    </div>

    <input
      type="file"
      id="images"
      multiple
      accept="image/*"
    >

    <div
      class="preview-grid"
      id="previewGrid"
    ></div>

  </div>

</div>

<div class="section">

  <div class="section-title">
    ສິ່ງອຳນວຍຄວາມສະດວກ
  </div>

  <div class="features">

    <label class="feature">
      <input type="checkbox" value="furnished">
      ເຟີນີເຈີ
    </label>

    <label class="feature">
      <input type="checkbox" value="pool">
      ສະລອຍນ້ຳ
    </label>

    <label class="feature">
      <input type="checkbox" value="parking">
      ບ່ອນຈອດລົດ
    </label>

    <label class="feature">
      <input type="checkbox" value="security">
      ຄວາມປອດໄພ
    </label>

  </div>

</div>

<div class="section">

  <div class="section-title">
    ສະຖານະ
  </div>

  <select class="select" id="status">

    <option value="published">
      Published
    </option>

    <option value="draft">
      Draft
    </option>

    <option value="sold">
      Sold
    </option>

    <option value="rented">
      Rented
    </option>

  </select>

  <div class="actions">

    <button
      class="save-btn"
      onclick="saveProperty()"
    >
      ບັນທຶກ
    </button>

    <button
      class="delete-btn"
      onclick="openDeleteModal()"
    >
      ລຶບ
    </button>

  </div>

  <div class="status-text" id="statusText"></div>

</div>

<div class="delete-modal" id="deleteModal">

  <div class="delete-box">

    <h3>ລຶບອະສັງຫາ?</h3>

    <p>
      ການລຶບນີ້ບໍ່ສາມາດກູ້ຄືນໄດ້
    </p>

    <div class="delete-actions">

      <button
        class="cancel-btn"
        onclick="closeDeleteModal()"
      >
        ຍົກເລີກ
      </button>

      <button
        class="confirm-btn"
        onclick="confirmDelete()"
      >
        ລຶບ
      </button>

    </div>

  </div>

</div>

<script>

const SUPABASE_URL =
'https://eoladhcljbpbhnrmmpev.supabase.co';

const SUPABASE_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function escHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function isSafeUrl(url) {
  if (!url || typeof url !== 'string') return false;
  var t = url.trim().toLowerCase();
  return t.indexOf('https://') === 0 || t.indexOf('http://') === 0;
}

const propertyId =
new URLSearchParams(
  window.location.search
).get('id');

let existingImages = [];

async function compressImage(file){

  return new Promise((resolve)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = function(event){

      const img = new Image();

      img.src = event.target.result;

      img.onload = function(){

        const canvas =
          document.createElement('canvas');

        const MAX_WIDTH = 1600;

        let width = img.width;
        let height = img.height;

        if(width > MAX_WIDTH){

          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;

        }

        canvas.width = width;
        canvas.height = height;

        const ctx =
          canvas.getContext('2d');

        ctx.drawImage(
          img,
          0,
          0,
          width,
          height
        );

        canvas.toBlob(

          (blob)=>{

            resolve(
              new File(
                [blob],
                file.name,
                {
                  type:'image/jpeg'
                }
              )
            );

          },

          'image/jpeg',
          0.78

        );

      };

    };

  });

}

async function loadProperty(){

  const { data,error } =
  await supabaseClient
    .from('properties')
    .select('*')
    .eq('id',propertyId)
    .single();

  if(error){

    alert('Property not found');

    return;

  }

  document.getElementById('title').value =
  data.title_en || '';

  document.getElementById('price').value =
  data.price_display || '';

  document.getElementById('description').value =
  data.description_lo || '';

  document.getElementById('district').value =
  data.district_lo || '';

  document.getElementById('village').value =
  data.village_lo || '';

  document.getElementById('status').value =
  data.status || 'published';

  existingImages =
    data.images || [];

  renderPreviews();

}

function renderPreviews(){

  const grid =
  document.getElementById(
    'previewGrid'
  );

  grid.innerHTML = '';

  existingImages.forEach(
    (url,index)=>{

      if(!isSafeUrl(url)) return;

      const wrap = document.createElement('div');
      wrap.className = 'preview';

      const img = document.createElement('img');
      img.src = url;

      const btn = document.createElement('button');
      btn.className = 'remove-img';
      btn.textContent = '×';
      btn.onclick = () => removeImage(index);

      wrap.appendChild(img);
      wrap.appendChild(btn);
      grid.appendChild(wrap);

    }
  );

}

function removeImage(index){

  existingImages.splice(index,1);

  renderPreviews();

}

async function uploadImages(){

  const files =
  document.getElementById(
    'images'
  ).files;

  if(!files.length){

    return existingImages;

  }

  const uploaded = [];

  for(let file of files){

    file =
      await compressImage(file);

    const fileName =
      `${Date.now()}-${file.name}`;

    const { error } =
    await supabaseClient
      .storage
      .from('property-images')
      .upload(
        fileName,
        file
      );

    if(error){

      console.log(error);

      continue;

    }

    const { data } =
    supabaseClient
      .storage
      .from('property-images')
      .getPublicUrl(
        fileName
      );

    uploaded.push(
      data.publicUrl
    );

  }

  return [
    ...existingImages,
    ...uploaded
  ];

}

async function saveProperty(){

  document.getElementById(
    'statusText'
  ).innerHTML =
  'ກຳລັງບັນທຶກ...';

  const images =
    await uploadImages();

  const amenities =
    Array.from(
      document.querySelectorAll(
        '.feature input:checked'
      )
    ).map(el=>el.value);

  const payload = {

    title_en:
      document.getElementById(
        'title'
      ).value,

    title_lo:
      document.getElementById(
        'title'
      ).value,

    price_display:
      document.getElementById(
        'price'
      ).value,

    description_lo:
      document.getElementById(
        'description'
      ).value,

    description_en:
      document.getElementById(
        'description'
      ).value,

    district_lo:
      document.getElementById(
        'district'
      ).value,

    district_en:
      document.getElementById(
        'district'
      ).value,

    village_lo:
      document.getElementById(
        'village'
      ).value,

    village_en:
      document.getElementById(
        'village'
      ).value,

    status:
      document.getElementById(
        'status'
      ).value,

    amenities,

    images

  };

  const { error } =
  await supabaseClient
    .from('properties')
    .update(payload)
    .eq('id',propertyId);

  if(error){

    alert(
      JSON.stringify(error)
    );

    return;

  }

  document.getElementById(
    'statusText'
  ).innerHTML =
  'ບັນທຶກສຳເລັດ';

}

function openDeleteModal(){

  document.getElementById(
    'deleteModal'
  ).style.display =
  'flex';

}

function closeDeleteModal(){

  document.getElementById(
    'deleteModal'
  ).style.display =
  'none';

}

async function confirmDelete(){

  await supabaseClient
    .from('properties')
    .delete()
    .eq('id',propertyId);

  window.location.href =
    'dashboard.html';

}

loadProperty();

</script>

</body>
</html>
