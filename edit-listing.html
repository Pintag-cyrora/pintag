<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src * data: blob:; connect-src https://*.supabase.co; frame-src 'none'; object-src 'none';">
<title>ແກ້ໄຂອະສັງຫາ • Pintag</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#F5F1EB;
  --panel:#FFFFFF;
  --line:#E7E1DA;
  --text:#17242B;
  --muted:#7C8B92;
  --teal:#4C9494;
  --danger:#B45B5B;
  --radius:28px;
}

body{
  font-family:'Noto Sans Lao',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:24px 16px 120px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}

.page-title{
  font-size:42px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.04em;
}

.back-btn{
  text-decoration:none;
  color:var(--teal);
  font-weight:700;
}

.section{
  background:#fff;
  border-radius:30px;
  padding:24px;
  border:1px solid var(--line);
  margin-bottom:18px;
}

.section-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:10px;
  font-size:15px;
  font-weight:700;
}

.input,
.textarea,
.select{
  width:100%;
  border:1px solid #E4DED7;
  background:#FAF8F5;
  border-radius:20px;
  padding:18px;
  font-size:16px;
  font-family:inherit;
  color:var(--text);
}

.textarea{
  min-height:160px;
  resize:none;
}

.preview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.preview{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:20px;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.remove-img{
  position:absolute;
  top:8px;
  right:8px;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,0.7);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.upload-box{
  border:2px dashed #DDD5CC;
  border-radius:24px;
  padding:24px;
  background:#FBFAF8;
}

.upload-text{
  color:var(--muted);
  line-height:1.8;
  margin-bottom:16px;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.feature{
  background:#F7F3EE;
  border-radius:18px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.save-btn,
.delete-btn{
  flex:1;
  border:none;
  border-radius:22px;
  padding:18px;
  font-size:17px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
}

.save-btn{
  background:var(--teal);
  color:#fff;
}

.delete-btn{
  background:#EFE7E4;
  color:var(--danger);
}

.status-text{
  margin-top:16px;
  color:var(--muted);
  font-size:14px;
}

.delete-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.delete-box{
  background:#fff;
  width:100%;
  max-width:380px;
  border-radius:28px;
  padding:28px;
}

.delete-box h3{
  font-size:24px;
  margin-bottom:10px;
}

.delete-box p{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:22px;
}

.delete-actions{
  display:flex;
  gap:12px;
}

.cancel-btn,
.confirm-btn{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.cancel-btn{
  background:#F2EFEB;
}

.confirm-btn{
  background:var(--danger);
  color:#fff;
}

</style>
</head>
<body>

<div class="topbar">

  <div class="page-title">
    ແກ້ໄຂ<br>
    ອະສັງຫາ
  </div>

  <a href="dashboard.html" class="back-btn">
    ← ກັບ
  </a>

</div>

<div class="section">

  <div class="section-title">
    ຂໍ້ມູນຫຼັກ
  </div>

  <div class="field">
    <label>ຫົວຂໍ້</label>
    <input type="text" class="input" id="title">
  </div>

  <div class="field">
    <label>ປະເພດ</label>
    <select class="select" id="propertyType" onchange="renderPropertyTypeFields(this.value)"></select>
  </div>

  <div class="field">
    <label>ລາຄາ</label>
    <input type="text" class="input" id="price">
  </div>

  <div class="field">
    <label>ລາຍລະອຽດ</label>
    <textarea class="textarea" id="description"></textarea>
  </div>

</div>

<div class="section">

  <div class="section-title">
    ສະຖານທີ່
  </div>

  <div class="field">
    <label>ເມືອງ</label>
    <input type="text" class="input" id="district">
  </div>

  <div class="field">
    <label>ບ້ານ</label>
    <input type="text" class="input" id="village">
  </div>

</div>

<div class="section">

  <div class="section-title">
    ລາຍລະອຽດ
  </div>

  <!-- Rendered dynamically from PROPERTY_TYPE_FIELDS (terminology.js)
       based on the selected property type; see renderPropertyTypeFields().
       No wrapping .field class here — each rendered field is its own
       .field div, matching this page's single-column layout. -->
  <div id="property-details-grid"></div>

</div>

<div class="section">

  <div class="section-title">
    ຜູ້ຕິດຕໍ່ (Buyer Contact)
  </div>

  <div class="field">
    <label>ຊື່ຜູ້ຕິດຕໍ່</label>
    <input type="text" class="input" id="contactName">
  </div>

  <div class="field">
    <label>ເບີໂທ *</label>
    <input type="text" class="input" id="contactPhone">
  </div>

</div>

<div class="section">

  <div class="section-title">
    ຮູບພາບ
  </div>

  <div class="upload-box">

    <div class="upload-text">
      ອັບໂຫລດຫຼາຍຮູບໄດ້<br>
      ຮູບທຳອິດຈະເປັນຮູບໜ້າປົກ
    </div>

    <input
      type="file"
      id="images"
      multiple
      accept="image/*"
    >

    <div
      class="preview-grid"
      id="previewGrid"
    ></div>

  </div>

</div>

<div class="section">

  <div class="section-title">
    ສິ່ງອຳນວຍຄວາມສະດວກ
  </div>

  <!-- Rendered dynamically from PROPERTY_TYPE_FIELDS's amenities
       checkbox_ref for the selected property type; see
       renderPropertyTypeFields() below. -->
  <div class="features" id="property-features-grid"></div>

</div>

<div class="section">

  <div class="section-title">
    ສະຖານະ
  </div>

  <select class="select" id="status">

    <option value="published">
      Published
    </option>

    <option value="draft">
      Draft
    </option>

    <option value="sold">
      Sold
    </option>

    <option value="rented">
      Rented
    </option>

  </select>

  <div class="actions">

    <button
      class="save-btn"
      onclick="saveProperty()"
    >
      ບັນທຶກ
    </button>

    <button
      class="delete-btn"
      onclick="openDeleteModal()"
    >
      ລຶບ
    </button>

  </div>

  <div class="status-text" id="statusText"></div>

</div>

<div class="delete-modal" id="deleteModal">

  <div class="delete-box">

    <h3>ລຶບອະສັງຫາ?</h3>

    <p>
      ການລຶບນີ້ບໍ່ສາມາດກູ້ຄືນໄດ້
    </p>

    <div class="delete-actions">

      <button
        class="cancel-btn"
        onclick="closeDeleteModal()"
      >
        ຍົກເລີກ
      </button>

      <button
        class="confirm-btn"
        onclick="confirmDelete()"
      >
        ລຶບ
      </button>

    </div>

  </div>

</div>

<script src="config.js"></script>
<script src="dev-banner.js"></script>
<script src="terminology.js"></script>
<script src="amenities.js"></script>
<script>

const SUPABASE_URL = window.PINTAG.supabaseUrl;

const SUPABASE_KEY = window.PINTAG.anonKey;

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const propertyId =
new URLSearchParams(
  window.location.search
).get('id');

let existingImages = [];

async function compressImage(file){

  return new Promise((resolve)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = function(event){

      const img = new Image();

      img.src = event.target.result;

      img.onload = function(){

        const canvas =
          document.createElement('canvas');

        const MAX_WIDTH = 1600;

        let width = img.width;
        let height = img.height;

        if(width > MAX_WIDTH){

          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;

        }

        canvas.width = width;
        canvas.height = height;

        const ctx =
          canvas.getContext('2d');

        ctx.drawImage(
          img,
          0,
          0,
          width,
          height
        );

        canvas.toBlob(

          (blob)=>{

            resolve(
              new File(
                [blob],
                file.name,
                {
                  type:'image/jpeg'
                }
              )
            );

          },

          'image/jpeg',
          0.78

        );

      };

    };

  });

}

let editingContactId = null;
let editingContactSharedCount = 0;

// Resolves the logged-in user's own party row — checks auth_user_id first
// (the decoupled model going forward), falling back to id (the legacy
// "agents.id == auth uid" convention preserved for pre-existing agents).
async function resolveMyPartyId(userId){
  const { data } = await supabaseClient
    .from('parties')
    .select('id,name_en,whatsapp')
    .or(`auth_user_id.eq.${userId},id.eq.${userId}`)
    .limit(1);
  return (data && data[0]) || null;
}

// Populate the Property Type dropdown from PROPERTY_TYPES (terminology.js)
// using Lao labels, since this page is Lao-only UI.
(function populatePropertyTypeOptions(){
  const sel = document.getElementById('propertyType');
  sel.innerHTML = Object.keys(PROPERTY_TYPES).map(function(key){
    return '<option value="' + key + '">' + PROPERTY_TYPES[key].lo + '</option>';
  }).join('');
})();

function getCheckedFeatureKeys(){
  return Array.from(document.querySelectorAll('#property-features-grid input:checked')).map(function(el){ return el.value; });
}

// Renders the Property Details fields and the Features checkboxes for the
// selected property type from PROPERTY_TYPE_FIELDS (terminology.js). Only
// the AMENITIES-registry checkbox_ref is used here (not FEATURES), since
// this page has a single combined features/amenities checkbox list mapped
// to the `amenities` column. presetChecked, when given (on initial load),
// wins over whatever's currently checked in the DOM; when omitted (a
// mid-edit type switch), currently-checked keys are preserved instead.
function renderPropertyTypeFields(typeKey, presetChecked){
  const detailsGrid = document.getElementById('property-details-grid');
  const featuresGrid = document.getElementById('property-features-grid');
  if(!detailsGrid || !featuresGrid) return;
  const fields = PROPERTY_TYPE_FIELDS[typeKey] || [];
  const toCheck = presetChecked || getCheckedFeatureKeys();

  detailsGrid.innerHTML = fields.filter(function(f){ return f.kind !== 'checkbox_ref'; }).map(function(f){
    if(f.kind === 'select'){
      const opts = f.options.map(function(o){
        return '<option value="' + o.value + '">' + o.label.lo + '</option>';
      }).join('');
      return '<div class="field"><label>' + f.label.lo + '</label><select class="select" id="' + f.id + '">' + opts + '</select></div>';
    }
    return '<div class="field"><label>' + f.label.lo + '</label><input type="' + (f.kind === 'text' ? 'text' : 'number') + '" class="input" id="' + f.id + '"' +
      (f.min != null ? ' min="' + f.min + '"' : '') + (f.max != null ? ' max="' + f.max + '"' : '') +
      (f.placeholder ? ' placeholder="' + f.placeholder + '"' : '') + '></div>';
  }).join('');

  const amenityField = fields.find(function(f){ return f.kind === 'checkbox_ref' && f.registry === 'AMENITIES'; });
  const keys = amenityField ? amenityField.keys : [];
  featuresGrid.innerHTML = keys.map(function(key){
    const a = AMENITIES[key];
    if(!a) return '';
    return '<label class="feature"><input type="checkbox" value="' + key + '">' + a.lo + '</label>';
  }).join('');
  keys.forEach(function(key){
    if(toCheck.indexOf(key) === -1) return;
    const input = featuresGrid.querySelector('input[value="' + key + '"]');
    if(input) input.checked = true;
  });
}

function populateTypedFields(typeKey, sourceRow){
  (PROPERTY_TYPE_FIELDS[typeKey] || []).forEach(function(f){
    if(!f.column) return;
    const el = document.getElementById(f.id);
    if(!el) return;
    const v = sourceRow ? sourceRow[f.column] : null;
    el.value = (v != null ? v : '');
  });
}

function buildTypedFieldsPayload(typeKey){
  const activeIds = {};
  (PROPERTY_TYPE_FIELDS[typeKey] || []).forEach(function(f){ if(f.column) activeIds[f.id] = f; });
  const allColumns = {};
  Object.keys(PROPERTY_TYPE_FIELDS).forEach(function(key){
    PROPERTY_TYPE_FIELDS[key].forEach(function(f){ if(f.column) allColumns[f.column] = f; });
  });
  const out = {};
  Object.keys(allColumns).forEach(function(column){
    const f = allColumns[column];
    const active = activeIds[f.id];
    if(!active){ out[column] = null; return; }
    const el = document.getElementById(f.id);
    if(!el){ out[column] = null; return; }
    out[column] = f.kind === 'number' ? (parseInt(el.value) || null) : (el.value.trim() || null);
  });
  return out;
}

async function loadProperty(){

  const { data,error } =
  await supabaseClient
    .from('properties')
    .select('*,contacts(*)')
    .eq('id',propertyId)
    .single();

  if(error){

    alert('Property not found');

    return;

  }

  document.getElementById('title').value =
  data.title_en || '';

  document.getElementById('price').value =
  data.price_display || '';

  document.getElementById('description').value =
  data.description_lo || '';

  document.getElementById('district').value =
  data.district_lo || '';

  document.getElementById('village').value =
  data.village_lo || '';

  document.getElementById('status').value =
  data.status || 'published';

  document.getElementById('propertyType').value =
  data.property_type || '';

  renderPropertyTypeFields(data.property_type || '', data.amenities || []);
  populateTypedFields(data.property_type || '', data);

  editingContactId = data.contact_id || null;
  document.getElementById('contactName').value =
  (data.contacts && data.contacts.name) || '';

  document.getElementById('contactPhone').value =
  (data.contacts && data.contacts.phone) || '';

  if(editingContactId){
    const { data:usage } = await supabaseClient
      .from('properties')
      .select('id')
      .eq('contact_id',editingContactId);
    editingContactSharedCount = (usage || []).filter(r=>r.id !== propertyId).length;
    if(editingContactSharedCount > 0){
      alert(`ໝາຍເຫດ: ຜູ້ຕິດຕໍ່ນີ້ຖືກໃຊ້ຮ່ວມກັນໃນ ${editingContactSharedCount} ລາຍການອື່ນ. ການບັນທຶກຈະປ່ຽນແປງທຸກລາຍການ.`);
    }
  }

  existingImages =
    data.images || [];

  renderPreviews();

}

function renderPreviews(){

  const grid =
  document.getElementById(
    'previewGrid'
  );

  grid.innerHTML = '';

  existingImages.forEach(
    (url,index)=>{

      grid.innerHTML += `
      
      <div class="preview">

        <img src="${url}">

        <button
          class="remove-img"
          onclick="removeImage(${index})"
        >
          ×
        </button>

      </div>

      `;

    }
  );

}

function removeImage(index){

  existingImages.splice(index,1);

  renderPreviews();

}

async function uploadImages(){

  const files =
  document.getElementById(
    'images'
  ).files;

  if(!files.length){

    return existingImages;

  }

  const uploaded = [];

  for(let file of files){

    file =
      await compressImage(file);

    const fileName =
      `${Date.now()}-${file.name}`;

    const { error } =
    await supabaseClient
      .storage
      .from('property-images')
      .upload(
        fileName,
        file
      );

    if(error){

      console.log(error);

      continue;

    }

    const { data } =
    supabaseClient
      .storage
      .from('property-images')
      .getPublicUrl(
        fileName
      );

    uploaded.push(
      data.publicUrl
    );

  }

  return [
    ...existingImages,
    ...uploaded
  ];

}

async function saveProperty(){

  document.getElementById(
    'statusText'
  ).innerHTML =
  'ກຳລັງບັນທຶກ...';

  const images =
    await uploadImages();

  const amenities =
    getCheckedFeatureKeys();

  const propertyType =
    document.getElementById('propertyType').value;

  const contactPhone =
    document.getElementById('contactPhone').value.trim();

  if(!contactPhone){
    document.getElementById('statusText').innerHTML =
      'ກະລຸນາປ້ອນເບີໂທຜູ້ຕິດຕໍ່.';
    return;
  }

  const contactBody = {
    name: document.getElementById('contactName').value.trim() || null,
    phone: contactPhone,
    whatsapp: contactPhone
  };

  if(editingContactId){
    const { error: contactError } = await supabaseClient
      .from('contacts')
      .update(contactBody)
      .eq('id',editingContactId);
    if(contactError){
      alert(JSON.stringify(contactError));
      return;
    }
  } else {
    // Defensive fallback for a pre-migration listing with no contact_id yet.
    const { data:{ user } } = await supabaseClient.auth.getUser();
    const myParty = user ? await resolveMyPartyId(user.id) : null;
    const { data:created, error: contactError } = await supabaseClient
      .from('contacts')
      .insert({ ...contactBody, role: 'agent', party_id: myParty ? myParty.id : null, created_by: user ? user.id : null })
      .select('id');
    if(contactError){
      alert(JSON.stringify(contactError));
      return;
    }
    editingContactId = created[0].id;
  }

  const payload = {

    title_en:
      document.getElementById(
        'title'
      ).value,

    title_lo:
      document.getElementById(
        'title'
      ).value,

    price_display:
      document.getElementById(
        'price'
      ).value,

    description_lo:
      document.getElementById(
        'description'
      ).value,

    description_en:
      document.getElementById(
        'description'
      ).value,

    district_lo:
      document.getElementById(
        'district'
      ).value,

    district_en:
      document.getElementById(
        'district'
      ).value,

    village_lo:
      document.getElementById(
        'village'
      ).value,

    village_en:
      document.getElementById(
        'village'
      ).value,

    status:
      document.getElementById(
        'status'
      ).value,

    property_type: propertyType,

    amenities,

    images,

    contact_id: editingContactId,

    ...buildTypedFieldsPayload(propertyType)

  };

  const { error } =
  await supabaseClient
    .from('properties')
    .update(payload)
    .eq('id',propertyId);

  if(error){

    alert(
      JSON.stringify(error)
    );

    return;

  }

  document.getElementById(
    'statusText'
  ).innerHTML =
  'ບັນທຶກສຳເລັດ';

}

function openDeleteModal(){

  document.getElementById(
    'deleteModal'
  ).style.display =
  'flex';

}

function closeDeleteModal(){

  document.getElementById(
    'deleteModal'
  ).style.display =
  'none';

}

async function confirmDelete(){

  await supabaseClient
    .from('properties')
    .delete()
    .eq('id',propertyId);

  window.location.href =
    'dashboard.html';

}

loadProperty();

</script>

</body>
</html>
