<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · ວຽງຈັນ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

.lo-i{display:inline;}.en-i{display:none;}.zh-i{display:none;}
body.lang-en .lo-i{display:none;}body.lang-en .en-i{display:inline;}
body.lang-zh .lo-i{display:none;}body.lang-zh .zh-i{display:inline;}

/* FULL SCREEN SPLIT */
.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100vh;
  position:relative;
}

/* EACH PANEL */
.panel{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:flex 0.5s cubic-bezier(0.4,0,0.2,1);
}
.panel:hover{flex:1.15;}

/* BACKGROUND PHOTOS */
.panel-bg{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.panel:hover .panel-bg{transform:scale(1.04);}

/* BUYER panel - property photo */
.panel-buyer .panel-bg{
  background-image:url('pintag-villa.png');
  background-position:center 60%;
}
/* AGENT panel - interior/balcony */
.panel-agent .panel-bg{
  background-image:url('pintag-interior.png');
  background-position:center 40%;
}

/* OVERLAYS */
.panel-buyer .panel-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(15,25,30,0.78) 0%, rgba(15,25,30,0.65) 100%);
  transition:background 0.4s;
}
.panel-agent .panel-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(20,65,65,0.82) 0%, rgba(30,90,90,0.7) 100%);
  transition:background 0.4s;
}
.panel-buyer:hover .panel-overlay{background:linear-gradient(135deg, rgba(15,25,30,0.6) 0%, rgba(15,25,30,0.45) 100%);}
.panel-agent:hover .panel-overlay{background:linear-gradient(135deg, rgba(20,65,65,0.65) 0%, rgba(30,90,90,0.5) 100%);}

/* DIVIDER LINE */
.divider{
  position:absolute;
  left:50%;top:0;bottom:0;
  width:2px;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.25), rgba(255,255,255,0.35), rgba(255,255,255,0.25), transparent);
  z-index:10;
  pointer-events:none;
}

/* GOLD TOP RULE */
.gold-rule{
  position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(to right, transparent, #B8960C 20%, #D4AF37 50%, #B8960C 80%, transparent);
  z-index:20;
  pointer-events:none;
}

/* CONTENT */
.panel-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
  gap:20px;
  padding:40px 32px;
  text-align:center;
}

/* BIG ICON */
.panel-icon-wrap{
  width:100px;height:100px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08);
  transition:all 0.3s;
  backdrop-filter:blur(8px);
}
.panel:hover .panel-icon-wrap{
  transform:scale(1.08);
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.45);
}
.panel-agent .panel-icon-wrap{
  border-color:rgba(56,168,168,0.5);
  background:rgba(56,168,168,0.15);
}
.panel-agent:hover .panel-icon-wrap{
  background:rgba(56,168,168,0.28);
  border-color:#38A8A8;
}

/* BIG LABEL */
.panel-label{
  font-size:clamp(42px,8vw,80px);
  font-weight:700;
  color:#fff;
  letter-spacing:-0.03em;
  line-height:1;
  text-shadow:0 2px 20px rgba(0,0,0,0.3);
}
.panel-agent .panel-label{color:#fff;}

/* SUBLABEL */
.panel-sublabel{
  font-size:clamp(13px,2vw,17px);
  font-weight:300;
  color:rgba(255,255,255,0.55);
  letter-spacing:0.06em;
  text-transform:uppercase;
}

/* ARROW */
.panel-cta{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-top:8px;
  transition:all 0.3s;
}
.panel:hover .panel-cta{color:rgba(255,255,255,0.9);}
.panel-agent .panel-cta{color:rgba(56,168,168,0.6);}
.panel-agent:hover .panel-cta{color:#38A8A8;}
.cta-line{width:32px;height:1px;background:currentColor;transition:width 0.3s;}
.panel:hover .cta-line{width:52px;}

/* LOGO + LANG - TOP CENTER */
.top-nav{
  position:absolute;top:0;left:0;right:0;
  z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 28px;
  pointer-events:none;
}
.logo{
  display:flex;align-items:center;gap:10px;
  pointer-events:all;
}
.logo-text{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.02em;}
.lang-switcher{
  display:flex;gap:2px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:4px;padding:3px;
  backdrop-filter:blur(12px);
  pointer-events:all;
}
.lang-btn{
  font-size:11px;font-weight:500;padding:5px 10px;
  border:none;background:transparent;color:rgba(255,255,255,0.55);
  cursor:pointer;border-radius:3px;transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}
.lang-btn.active{background:rgba(255,255,255,0.18);color:#fff;}

/* BOTTOM TAG */
.bottom-tag{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:30;
  font-size:10px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.18);
  white-space:nowrap;pointer-events:none;
}

/* MOBILE */
@media(max-width:600px){
  .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .divider{left:0;right:0;top:50%;bottom:auto;width:100%;height:2px;background:linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);}
  .panel:hover{flex:1.1;}
  .panel-label{font-size:clamp(38px,12vw,64px);}
  .top-nav{padding:14px 16px;}
  .panel-icon-wrap{width:80px;height:80px;}
  .panel-content{gap:14px;padding:28px 20px;}
}
</style>
</head>
<body>

<!-- GOLD RULE -->
<div class="gold-rule"></div>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
      <circle cx="12" cy="9" r="7.5" fill="#38A8A8"/>
      <circle cx="25" cy="14" r="3.5" fill="#0D1F26" opacity="0.9"/>
    </svg>
    <span class="logo-text">Pintag</span>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('lo',this)">ລາວ</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('zh',this)">中文</button>
  </div>
</div>

<!-- SPLIT PANELS -->
<div class="split">

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- BUYER -->
  <a href="listings.html" class="panel panel-buyer">
    <div class="panel-bg"></div>
    <div class="panel-overlay"></div>
    <div class="panel-content">
      <div class="panel-icon-wrap">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </div>
      <p class="panel-label">ຜູ້ຊື້</p>
      <p class="panel-sublabel">
        <span class="lo-i">ຊອກຫາເຮືອນ</span>
        <span class="en-i">Find a Property</span>
        <span class="zh-i">找房源</span>
      </p>
      <div class="panel-cta">
        <span class="cta-line"></span>
        <span class="lo-i">ເບິ່ງລາຍການ</span>
        <span class="en-i">Browse listings</span>
        <span class="zh-i">浏览房源</span>
        <span class="cta-line"></span>
      </div>
    </div>
  </a>

  <!-- AGENT -->
  <a href="for-agents.html" class="panel panel-agent">
    <div class="panel-bg"></div>
    <div class="panel-overlay"></div>
    <div class="panel-content">
      <div class="panel-icon-wrap">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#38A8A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <p class="panel-label">ຜູ້ຂາຍ</p>
      <p class="panel-sublabel">
        <span class="lo-i">Agent · ນາຍໜ້າ</span>
        <span class="en-i">List Your Property</span>
        <span class="zh-i">发布房源</span>
      </p>
      <div class="panel-cta">
        <span class="cta-line"></span>
        <span class="lo-i">ລົງປະກາດ</span>
        <span class="en-i">Get started</span>
        <span class="zh-i">立即发布</span>
        <span class="cta-line"></span>
      </div>
    </div>
  </a>

</div>

<!-- BOTTOM -->
<div class="bottom-tag">pintag.io · ວຽງຈັນ · Vientiane · 万象</div>

<script>
function setLang(lang,btn){
  document.body.className=lang==='lo'?'':'lang-'+lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
