<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · Agent Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#2D8C8C;--ink:#1A2428;--muted:#7A9098;--warm:#F7F3EC;--border:rgba(26,36,40,0.08);--red:#C0392B;--green:#166534;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--warm);color:var(--ink);padding:40px 24px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:600px;margin:0 auto;}
h1{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:28px;margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
input[type=password]{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);outline:none;}
input[type=password]:focus{border-color:var(--teal);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:background 0.18s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:#269090;}
.btn-primary:disabled{opacity:0.5;cursor:default;}
.status{margin-top:16px;padding:12px 16px;border-radius:6px;font-size:13px;line-height:1.6;display:none;}
.status.success{background:#F0FDF4;border:1px solid #BBF7D0;color:var(--green);display:block;}
.status.error{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);display:block;}
.status.info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;display:block;}
.field-row{margin-bottom:16px;}
.preview-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border);margin-top:12px;display:none;}
.log-item{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--muted);}
.log-item.ok{color:var(--green);}
.log-item.err{color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Pintag Agent Setup</h1>
  <p class="sub">One-time setup to update agent profile in Supabase</p>

  <div class="card" id="login-card">
    <div class="field-row">
      <label>Admin Password</label>
      <input type="password" id="pw-input" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="runSetup()">Sign In &amp; Run Setup</button>
    <div class="status" id="login-status"></div>
  </div>

  <div class="card" id="progress-card" style="display:none;">
    <label>Setup Log</label>
    <div id="log-list" style="margin-top:8px;"></div>
    <div class="status" id="final-status"></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://eoladhcljbpbhnrmmpev.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';
const ADMIN_EMAIL   = 'admin@pintag.io';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const AGENT_UUID = 'bb7ff815-9db9-41a4-9914-c0f7b97f9046';
const AGENT_SLUG = 'viengkhone-phomthavong';
const IMAGE_FILENAME = 'agent-viengkhone-phomthavong.jpg';
const IMAGE_GITHUB_URL = 'https://pintag-cyrora.github.io/pintag/' + IMAGE_FILENAME;

const AGENT_DATA = {
  id:          AGENT_UUID,
  slug:        AGENT_SLUG,
  name_lo:     'ວຽງຄອນ ພົມທະວົງ',
  name_en:     'Viengkhone Phomthavong',
  bio_lo:      'ນາງ ວຽງຄອນ ພົມທະວົງ ເປັນນາຍໜ້າອະສັງຫາລິມະຊັບປະຈຳນະຄອນຫຼວງວຽງຈັນ ທີ່ມີຄວາມຊຳນານໃນດ້ານເຮືອນຢູ່ອາໄສ ທີ່ດິນ ຊັບສິນໃຫ້ເຊົ່າ ແລະ ການລົງທຶນດ້ານອະສັງຫາລິມະຊັບ. ພ້ອມໃຫ້ຄຳປຶກສາ ແລະ ຊ່ວຍເຫຼືອລູກຄ້າໃນການຊື້, ຂາຍ ແລະ ຄົ້ນຫາຊັບສິນທີ່ເໝາະສົມກັບຄວາມຕ້ອງການ.',
  bio_en:      'Real estate agent based in Vientiane specializing in residential properties, land, rentals, and investment opportunities. Dedicated to helping clients buy, sell, and discover quality properties across Laos.',
  is_verified: true,
  languages:   ['Lao', 'English'],
  agency_name: 'Pintag'
};

var _token = null;

function log(msg, type) {
  var list = document.getElementById('log-list');
  var div = document.createElement('div');
  div.className = 'log-item ' + (type || '');
  div.textContent = (type === 'ok' ? '✓ ' : type === 'err' ? '✗ ' : '  ') + msg;
  list.appendChild(div);
}

function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
}

async function sbApi(method, path, body) {
  const token = _token || SUPABASE_ANON;
  const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + token
  };
  if (method === 'POST' || method === 'PATCH') headers['Prefer'] = 'return=representation';
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + ': ' + txt.slice(0, 200));
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function uploadImageToStorage() {
  try {
    log('Fetching agent photo from repository…');
    const imgRes = await fetch(IMAGE_GITHUB_URL);
    if (!imgRes.ok) throw new Error('Could not fetch image from GitHub Pages (' + imgRes.status + ')');
    const blob = await imgRes.blob();
    log('Image fetched (' + Math.round(blob.size / 1024) + ' KB)');

    log('Uploading to Supabase Storage…');
    const uploadRes = await fetch(
      SUPABASE_URL + '/storage/v1/object/agents/' + IMAGE_FILENAME,
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + _token,
          'apikey': SUPABASE_ANON,
          'Content-Type': 'image/jpeg',
          'x-upsert': 'true'
        },
        body: blob
      }
    );

    if (uploadRes.ok) {
      const publicUrl = SUPABASE_URL + '/storage/v1/object/public/agents/' + IMAGE_FILENAME;
      log('Uploaded to Supabase Storage', 'ok');
      return publicUrl;
    } else {
      const errTxt = await uploadRes.text();
      log('Storage upload failed (' + errTxt.slice(0, 80) + ') — using GitHub Pages URL instead');
      return IMAGE_GITHUB_URL;
    }
  } catch (e) {
    log('Image upload error: ' + e.message + ' — using GitHub Pages URL');
    return IMAGE_GITHUB_URL;
  }
}

async function runSetup() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) { setStatus('login-status', 'Please enter the admin password.', 'error'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Running…';

  document.getElementById('login-card').style.display = 'none';
  document.getElementById('progress-card').style.display = 'block';

  try {
    log('Signing in as ' + ADMIN_EMAIL + '…');
    const { data, error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pw });
    if (error) throw new Error('Auth failed: ' + error.message);
    _token = data.session.access_token;
    log('Authenticated', 'ok');

    // Upload photo
    log('Setting up agent photo…');
    const photoUrl = await uploadImageToStorage();
    log('Photo URL: ' + photoUrl, 'ok');

    // Build update payload
    const payload = Object.assign({}, AGENT_DATA, { photo_url: photoUrl });
    log('Updating agent record (UUID: ' + AGENT_UUID + ')…');

    // Try PATCH first (update existing record)
    const updated = await sbApi(
      'PATCH',
      'agents?id=eq.' + AGENT_UUID,
      payload
    );

    if (Array.isArray(updated) && updated.length > 0) {
      log('Agent record updated successfully', 'ok');
    } else {
      // Record may not exist — try INSERT with upsert
      log('PATCH returned empty — attempting upsert…');
      await sbApi('POST', 'agents?on_conflict=id', payload);
      log('Agent record upserted', 'ok');
    }

    setStatus('final-status',
      '✓ Setup complete!\n\n' +
      'Profile URL: /agents.html?slug=' + AGENT_SLUG + '\n' +
      'Photo URL: ' + photoUrl + '\n' +
      'Fields updated: slug, name_lo, name_en, bio_lo, bio_en, is_verified, languages, agency_name, photo_url',
      'success'
    );
  } catch (err) {
    log('Setup failed: ' + err.message, 'err');
    setStatus('final-status', '✗ Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In & Run Setup';
    document.getElementById('login-card').style.display = 'block';
  }
}

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runSetup();
});
</script>
</body>
</html>
