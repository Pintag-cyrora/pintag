<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src * data: blob:; connect-src https://*.supabase.co; frame-src 'none'; object-src 'none';">
<title>Pintag Agent Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#F3EFE8;
  --panel:#FFFFFF;
  --line:rgba(26,36,40,0.08);
  --text:#1A2428;
  --muted:#7A9098;
  --teal:#2D8C8C;
  --teal-soft:#38A8A8;
  --radius:18px;
}

body{
  font-family:"DM Sans",sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.dashboard{
  min-height:100vh;
  display:grid;
  grid-template-columns:260px 1fr;
}

/* SIDEBAR */

.sidebar{
  background:#fff;
  border-right:1px solid var(--line);
  padding:28px 22px;
  position:sticky;
  top:0;
  height:100vh;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:38px;
}

.logo-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--teal);
}

.logo span{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.03em;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav a{
  text-decoration:none;
  color:var(--text);
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:500;
  transition:.2s;
}

.nav a:hover{
  background:rgba(45,140,140,0.08);
  color:var(--teal);
}

.nav a.active{
  background:var(--teal);
  color:#fff;
}

.logout-btn{
  margin-top:40px;
  border:none;
  background:none;
  cursor:pointer;
  color:#A24B4B;
  font-size:14px;
  font-weight:600;
  font-family:"DM Sans",sans-serif;
}

/* MAIN */

.main{
  padding:34px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:28px;
}

.welcome h1{
  font-size:34px;
  font-weight:600;
  letter-spacing:-0.04em;
  margin-bottom:6px;
}

.welcome p{
  color:var(--muted);
  font-size:14px;
}

.btn{
  border:none;
  cursor:pointer;
  font-family:"DM Sans",sans-serif;
  border-radius:12px;
  padding:12px 18px;
  font-weight:600;
  transition:.2s;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.btn-primary:hover{
  background:var(--teal-soft);
}

/* STATS */

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:28px;
}

.stat-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px;
}

.stat-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}

.stat-value{
  font-size:32px;
  font-weight:700;
  letter-spacing:-0.04em;
}

/* LISTINGS */

.section{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:22px;
}

.section-head h2{
  font-size:20px;
  font-weight:600;
  letter-spacing:-0.03em;
}

.listings{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.card{
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}

.card-img{
  aspect-ratio:16/10;
  background:#ddd;
}

.card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.card-body{
  padding:16px;
}

.card-location{
  color:var(--teal);
  font-size:12px;
  font-weight:500;
  margin-bottom:8px;
}

.card-title{
  font-size:18px;
  font-weight:600;
  line-height:1.3;
  margin-bottom:12px;
}

.card-price{
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}
.listing-stats{
  display:flex;
  gap:16px;
  margin-top:14px;
  color:#7C8B92;
  font-size:13px;
}
.card-actions{
  display:flex;
  gap:10px;
}

.card-btn{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
  font-family:"DM Sans",sans-serif;
  font-weight:600;
  font-size:13px;
}

.edit-btn{
  background:rgba(45,140,140,0.08);
  color:var(--teal);
}

.delete-btn{
  background:#F8F4F0;
  color:#A24B4B;
}

.empty{
  color:var(--muted);
  font-size:14px;
}

/* MOBILE */

@media(max-width:960px){

  .dashboard{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--line);
    padding:18px 16px;
  }

  .nav{
    flex-direction:row;
    overflow-x:auto;
    padding-bottom:4px;
  }

  .nav a{
    white-space:nowrap;
  }

  .main{
    padding:18px 16px 100px;
  }

  .topbar{
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }

  .welcome h1{
    font-size:28px;
  }

  .stats{
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .stat-card{
    padding:18px;
  }

  .stat-value{
    font-size:24px;
  }

  .listings{
    grid-template-columns:1fr;
  }

  .card-title{
    font-size:16px;
  }

}

/* Lead Analytics */
.lead-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px;}
.lead-table-wrap{overflow-x:auto;}
.lead-table{width:100%;border-collapse:collapse;font-size:13px;}
.lead-table th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--line);}
.lead-table td{padding:10px 12px;border-bottom:1px solid var(--line);}
.lead-table tr:last-child td{border-bottom:none;}
.lead-badge{display:inline-block;background:rgba(45,140,140,0.1);color:var(--teal);font-weight:600;font-size:12px;padding:2px 8px;border-radius:20px;}

</style>
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">

    <div class="logo">
      <div class="logo-dot"></div>
      <span>Pintag</span>
    </div>

    <nav class="nav">
      <a href="#" class="active">Dashboard</a>
    </nav>

    <button class="logout-btn" onclick="logout()">
      Logout
    </button>

  </aside>

  <main class="main">

    <div class="topbar">

      <div class="welcome">
        <h1 id="welcome-name">Welcome back</h1>
        <p>Manage your listings and inquiries</p>
      </div>

      <button class="btn btn-primary">
        + Add Property
      </button>

    </div>

    <div class="stats">

      <div class="stat-card">
        <div class="stat-label">Active Listings</div>
        <div class="stat-value" id="listing-count">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Published</div>
        <div class="stat-value" id="published-count">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">For Sale</div>
        <div class="stat-value" id="sale-count">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">For Rent</div>
        <div class="stat-value" id="rent-count">0</div>
      </div>

    </div>

    <section class="section">

      <div class="section-head">
        <h2>My Listings</h2>
      </div>

      <div class="listings" id="listings"></div>

    </section>

    <div style="margin-top:28px;">
      <div class="lead-stats">
        <div class="stat-card">
          <div class="stat-label">Leads Today</div>
          <div class="stat-value" id="leads-today">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Week</div>
          <div class="stat-value" id="leads-week">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Month</div>
          <div class="stat-value" id="leads-month">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Leads</div>
          <div class="stat-value" id="leads-total">—</div>
        </div>
      </div>

      <section class="section">
        <div class="section-head">
          <h2>Lead Analytics</h2>
        </div>
        <div class="lead-table-wrap">
          <table class="lead-table">
            <thead>
              <tr>
                <th>Listing</th>
                <th>WhatsApp</th>
                <th>Call</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="lead-tbody"></tbody>
          </table>
        </div>
      </section>
    </div>

  </main>

</div>

<script>

const SUPABASE_URL = 'https://eoladhcljbpbhnrmmpev.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function initDashboard(){

  const {
    data:{ user }
  } = await supabaseClient.auth.getUser();

  if(!user){
    window.location.href = 'agent-login.html';
    return;
  }

  const { data: agent } = await supabaseClient
    .from('agents')
    .select('*')
    .eq('id', user.id)
    .single();

  if(agent){
    document.getElementById('welcome-name').innerText =
      `Welcome back, ${agent.name_en || 'Agent'}`;
  }

  const { data: properties, error } = await supabaseClient
    .from('properties')
    .select('*')
    .eq('agent_id', user.id)
    .order('created_at', { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  renderStats(properties);
  renderListings(properties);
  loadLeadStats(user.id);

}

function renderStats(properties){

  const total = properties.length;

  const published = properties.filter(p =>
    p.status === 'active'
  ).length;

  const sale = properties.filter(p =>
    p.transaction_type === 'for_sale'
  ).length;

  const rent = properties.filter(p =>
    p.transaction_type === 'for_rent'
  ).length;

  document.getElementById('listing-count').innerText = total;
  document.getElementById('published-count').innerText = published;
  document.getElementById('sale-count').innerText = sale;
  document.getElementById('rent-count').innerText = rent;

}

function renderListings(properties){

  const container = document.getElementById('listings');

  if(!properties.length){

    container.innerHTML = `
      <div class="empty">
        No listings yet.
      </div>
    `;

    return;
  }

  container.innerHTML = properties.map(property => {
    const image    = esc(property.images && property.images.length ? property.images[0] : 'https://placehold.co/1200x800');
    const district = esc(property.district_en || '');
    const title    = esc(property.title_en || property.title_lo || 'Untitled');
    const price    = esc(property.price_display || '');
    const views    = Number(property.views)     || 0;
    const inquiries= Number(property.inquiries) || 0;
    const saves    = Number(property.saves)     || 0;
    const id       = esc(property.id);

    return `
      <div class="card">
        <div class="card-img"><img src="${image}"></div>
        <div class="card-body">
          <div class="card-location">${district}</div>
          <div class="card-title">${title}</div>
          <div class="card-price">${price}</div>
          <div class="listing-stats">
            <span>👁 ${views}</span>
            <span>💬 ${inquiries}</span>
            <span>❤ ${saves}</span>
          </div>
          <div class="card-actions">
            <button class="card-btn edit-btn"   data-id="${id}" onclick="editListing(this.dataset.id)">Edit</button>
            <button class="card-btn delete-btn" data-id="${id}" onclick="deleteListing(this.dataset.id)">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

}

function editListing(id){

  console.log(id);

  window.location.href =
    `edit-listing.html?id=${id}`;

}

async function deleteListing(id){

  const confirmed =
    confirm('Delete this listing?');

  if(!confirmed) return;

  const { error } = await supabaseClient
    .from('properties')
    .delete()
    .eq('id', id);

  if(error){
    alert('Could not delete listing');
    return;
  }

  location.reload();

}

async function logout(){

  await supabaseClient.auth.signOut();

  window.location.href =
    'agent-login.html';

}

async function loadLeadStats(agentId) {
  try {
    const now = new Date();
    const todayStart  = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const weekStart   = new Date(now - 7  * 86400000).toISOString();
    const monthStart  = new Date(now - 30 * 86400000).toISOString();

    const { data: leads, error } = await supabaseClient
      .from('lead_events')
      .select('id,listing_id,event_type,created_at')
      .eq('agent_id', agentId);

    if (error || !leads) return;

    document.getElementById('leads-total').innerText = leads.length;
    document.getElementById('leads-today').innerText  = leads.filter(l => l.created_at >= todayStart).length;
    document.getElementById('leads-week').innerText   = leads.filter(l => l.created_at >= weekStart).length;
    document.getElementById('leads-month').innerText  = leads.filter(l => l.created_at >= monthStart).length;

    // Build per-listing breakdown
    const byListing = {};
    leads.forEach(function(l) {
      var lid = l.listing_id || 'unknown';
      if (!byListing[lid]) byListing[lid] = { whatsapp: 0, call: 0 };
      if (l.event_type === 'whatsapp_click') byListing[lid].whatsapp++;
      else if (l.event_type === 'call_click') byListing[lid].call++;
    });

    // Fetch listing titles for the listing ids we have
    var listingIds = Object.keys(byListing).filter(id => id !== 'unknown');
    var titleMap = {};
    if (listingIds.length) {
      var { data: props } = await supabaseClient
        .from('properties')
        .select('id,title_en,title_lo')
        .in('id', listingIds);
      (props || []).forEach(function(p) { titleMap[p.id] = p.title_en || p.title_lo || '—'; });
    }

    // Sort by total desc
    var rows = Object.keys(byListing).map(function(lid) {
      return { lid, title: titleMap[lid] || '—', wa: byListing[lid].whatsapp, call: byListing[lid].call };
    }).sort(function(a, b) { return (b.wa + b.call) - (a.wa + a.call); });

    var tbody = document.getElementById('lead-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:20px;">No leads recorded yet</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function(r) {
      var total = Number(r.wa) + Number(r.call);
      return '<tr>' +
        '<td style="font-weight:500;">' + esc(r.title) + '</td>' +
        '<td>' + (r.wa   ? '<span class="lead-badge">' + Number(r.wa)   + '</span>' : '<span style="color:var(--muted)">0</span>') + '</td>' +
        '<td>' + (r.call ? '<span class="lead-badge">' + Number(r.call) + '</span>' : '<span style="color:var(--muted)">0</span>') + '</td>' +
        '<td><strong>' + total + '</strong></td>' +
        '</tr>';
    }).join('');
  } catch(e) { console.error('loadLeadStats', e); }
}

initDashboard();

</script>

</body>
</html>
