<script id="knowledge-data" type="application/json">{"generatedAt":"2026-07-08T04:08:39.399Z","maturityLevel":"2 — Software Exists.","kpis":{"total":12,"byStatus":{"verified":4,"draft":8},"byCategory":{"brands/pintag":1,"industries/real-estate":1,"language":8,"marketing":1,"psychology":1},"bySource":{"knowledge/":5,"brain/lao/":7},"byCreatedDate":{"2026-07-07":5},"pendingReview":1},"recentlyApprovedIds":["brands-pintag-brand-voice-summary-seed1","language-pintag-trilingual-requirement-seed1","marketing-educate-before-promote-hook-pattern-seed1","psychology-investor-persona-legal-complexity-sensitivity-seed1"],"entries":[{"id":"brands-pintag-brand-voice-summary-seed1","title":"\"Pintag brand voice: the one-line summary and its hard constraints\"","category":"brands/pintag","status":"verified","confidence":0.95,"tags":["brand-voice","pintag","tone"],"source":{"type":"file","reference":"brain/brand-voice.md"},"contributedBy":"seed","created":"2026-07-07","updated":"2026-07-07","relatedIds":["marketing-educate-before-promote-hook-pattern-seed1"],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"Pintag \"sounds like the most knowledgeable, least pushy person in the room — the friend who happens to know Vientiane real estate cold and explains it plainly\" (`brain/brand-voice.md`).\n\n**Hard constraints (never violate, any language, any content type):**\n- No unsourced superlatives: \"best,\" \"#1,\" \"guaranteed,\" \"unbeatable.\"\n- No manufactured urgency: \"don't miss out,\" \"act now,\" \"limited time\" — unless a real, verifiable deadline exists.\n- No vague claims (\"great investment,\" \"amazing value\") without a concrete, sourced reason attached.\n- Concrete numbers always carry a source, e.g. \"median asking price in Saysettha this quarter, per Pintag listings data.\"\n\n**Multilingual note:** these constraints apply identically across Lao, English, and Chinese — tone should not become more promotional or more formal just because the language switches. Idiom and phrasing adapt naturally per language; the underlying restraint does not (`brain/brand-voice.md` → Multilingual Note).\n\nThis is a condensed pointer, not a replacement for `brain/brand-voice.md` — Writer and Brand Guardian should still read the full file. This entry exists so a retrieval call scoped to `brands/pintag` surfaces the voice constraints alongside whatever real-estate/industry knowledge it also pulls in, without needing a separate `brain/` read for every call site.","path":"brands/pintag/brand-voice-summary.md","writable":true,"history":["82a6827 Add Knowledge & Intelligence Layer foundation (ARCHITECTURE.md v2.2)"]},{"id":"industries-real-estate-vientiane-market-structure-seed1","title":"\"Vientiane real estate: market structure and the dual sale/rent pricing pattern\"","category":"industries/real-estate","status":"draft","confidence":0.7,"tags":["real-estate","vientiane","market-structure"],"source":{"type":"file","reference":"knowledge-base/market/laos-real-estate-overview.md"},"contributedBy":"seed","created":"2026-07-07","updated":"2026-07-07","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"Vientiane's real estate market is smaller and less formalized than neighboring capitals (Bangkok, Hanoi): historically organized through personal networks, informal Facebook marketplace groups, and small local agencies rather than centralized listing platforms. There's no single centralized public price registry, so pricing is inconsistent across sources and comparable-sale data is harder to access than in more mature markets.\n\n**Distinctive pattern worth remembering for content:** a meaningful share of listed properties are advertised as available for either sale *or* rent, with the owner's preference shifting with market conditions (liquidity need vs. steady income). Treat \"for sale\" / \"for rent\" as a point-in-time attribute of a listing, not a permanent classification — owners switch between the two.\n\n**Typical property types:** House, Villa (concentrated in/around Sisattanak and parts of Saysettha), Apartment (central districts, popular with renters/younger professionals), Townhouse (mid-market, newer developments), Land (often bought for future development or long-term holding, given foreign-ownership restrictions favor land-based holding by Lao nationals — see `knowledge-base/guides/foreign-ownership-rules.md` before writing anything about this), Commercial.\n\nMarked `draft` (not `verified`) because the underlying source file itself is flagged `[to be refined by founder]` in two places — this entry inherits that same not-yet-final status rather than overstating its confidence.","path":"industries/real-estate/vientiane-market-structure.md","writable":true,"history":["82a6827 Add Knowledge & Intelligence Layer foundation (ARCHITECTURE.md v2.2)"]},{"id":"language-pintag-trilingual-requirement-seed1","title":"\"Pintag content operates in three languages: Lao, English, Chinese — with one voice\"","category":"language","status":"verified","confidence":0.9,"tags":["language","lo","en","zh","translation"],"source":{"type":"file","reference":"brain/org-config.json"},"contributedBy":"seed","created":"2026-07-07","updated":"2026-07-07","relatedIds":["brands-pintag-brand-voice-summary-seed1"],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"Pintag's configured languages are Lao (`lo`), English (`en`), and Chinese (`zh`) — see `brain/org-config.json` → `org.languages`. This isn't incidental: the Investor persona (`knowledge-base/company/audience-personas.md`) is frequently Chinese-speaking, and Lao is the market's primary language, so all three are first-class, not \"English plus translations.\"\n\n**The constraint that matters for content generation:** brand-voice restraint must not vary by language. Per `brain/brand-voice.md`'s Multilingual Note, tone should not become more promotional or more formal simply because of a language switch — idiom and phrasing adapt naturally per language, but the underlying restraint (no unsourced superlatives, no manufactured urgency) does not. A common failure mode worth watching for: translations that \"loosen up\" in a second-pass language because the strict phrasing didn't translate cleanly — that's a brand-voice violation, not an acceptable localization tradeoff.\n\nThis entry is a placeholder for what should become the real payload of `knowledge/language/` over time: specific Lao spelling/grammar/terminology notes as they're identified by the Researcher or Writer (via `proposeKnowledgeEntry()`), not general policy restatements like this one.","path":"language/pintag-trilingual-requirement.md","writable":true,"history":["82a6827 Add Knowledge & Intelligence Layer foundation (ARCHITECTURE.md v2.2)"]},{"id":"marketing-educate-before-promote-hook-pattern-seed1","title":"\"Educate-before-promote: the hook pattern behind Pintag's highest-trust content\"","category":"marketing","status":"verified","confidence":0.95,"tags":["marketing","hooks","educational-content","brand-voice"],"source":{"type":"file","reference":"brain/ceo.md"},"contributedBy":"seed","created":"2026-07-07","updated":"2026-07-07","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"Pintag's non-negotiable content principle (`brain/ceo.md` → Non-Negotiable Principles) is that educational value always outranks promotional language: \"If a piece of content teaches nothing, it doesn't ship, no matter how well it might perform.\" This is enforced structurally, not just by prompting — it's the highest-weighted dimension in the Content Quality Score (`brain/org-config.json` → `quality_score.weights.educational_value: 2.0`, the only dimension weighted above 1.5).\n\n**The hook pattern this produces:** lead with a concrete, specific, verifiable fact or explanation — never with urgency or superlatives. Compare the two examples already codified in `brain/brand-voice.md`:\n\n- Avoid: \"This AMAZING villa in Saysettha won't last long — the BEST deal in Vientiane!\"\n- Prefer: \"This Saysettha villa is priced below the district's median for comparable 3-bedroom homes this quarter — here's what's driving that gap.\"\n\nThe second version *is* the hook — a reader stops scrolling because they learn something concrete, not because they're told to hurry. Persuasion is a side effect of being genuinely useful, never the stated goal of a sentence.\n\nThis entry marked `verified` (not `draft`) because it's a direct summary of an already-founder-approved, structurally-enforced principle — not a new inference.","path":"marketing/educate-before-promote-hook-pattern.md","writable":true,"history":["82a6827 Add Knowledge & Intelligence Layer foundation (ARCHITECTURE.md v2.2)"]},{"id":"psychology-investor-persona-legal-complexity-sensitivity-seed1","title":"\"The Investor persona disengages fast if legal complexity feels glossed over\"","category":"psychology","status":"verified","confidence":0.85,"tags":["psychology","objection-handling","investor-persona","foreign-ownership"],"source":{"type":"file","reference":"knowledge-base/company/audience-personas.md"},"contributedBy":"seed","created":"2026-07-07","updated":"2026-07-07","relatedIds":["industries-real-estate-vientiane-market-structure-seed1"],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"Of Pintag's four audience personas, the Investor (regional/international, frequently Chinese-speaking, evaluating Vientiane property for yield or appreciation rather than personal use) has the sharpest trust trigger: this persona \"is quick to disengage if content feels like it is glossing over legal complexity\" around foreign ownership rules, leasehold structures, and rental demand (`knowledge-base/company/audience-personas.md`).\n\n**Practical implication for Writer/Brand Guardian:** content aimed at this persona should surface legal constraints plainly and early, not as a caveat buried after the pitch — the opposite of typical marketing instinct (lead with upside, footnote the complexity). This is also where the strictest editorial gate in the whole system applies: any new foreign land-ownership claim requires explicit founder/counsel sign-off before publication, regardless of Approval Phase (`knowledge-base/guides/foreign-ownership-rules.md`, `brain/ceo.md` Non-Negotiable Principles) — so Investor-persona content is disproportionately likely to need that sign-off, and should be planned with that lead time in mind rather than treated as routine educational output.","path":"psychology/investor-persona-legal-complexity-sensitivity.md","writable":true,"history":["82a6827 Add Knowledge & Intelligence Layer foundation (ARCHITECTURE.md v2.2)"]},{"id":"lao-dictionary-bai-ta-din","title":"Land title / land ownership deed (ໃບຕາດິນ — bai ta din)","category":"language","status":"draft","confidence":0.5,"tags":["land","title","legal","lao-dictionary","land-legal"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ໃບຕາດິນ — bai ta din** — Land title / land ownership deed\n\nThe general, everyday Lao term for the official document a landowner holds as proof of land ownership. Used broadly to refer to \"the land title\" without specifying the exact legal document type or issuing authority.\n\n**When to use:** Everyday conversation, listings, and educational content when referring generally to \"the land title\" a seller should be able to produce.\n\n**When not to use:** When precision about the exact legal document type or issuing authority matters — this term is used loosely in speech and does not by itself confirm which specific legal document a seller holds.\n\n**Common mistakes:** Treating ໃບຕາດິນ as confirmation of full, unrestricted ownership without checking which specific document the seller actually has. In practice, several different document types get casually referred to with this term, and buyers/agents don't always distinguish them precisely in conversation. The exact legal categories and how to tell them apart still need confirmation against Lao law before being stated as fact — see `land/title-types.md`.\n\n**Example usage:** \"ລາວມີໃບຕາດິນຄົບຖ້ວນບໍ?\" — \"Does he/she have the complete land title documents?\"\n\n**Preferred Pintag wording:**\n- Use \"ໃບຕາດິນ\" in educational articles when referring generally to land title documentation.\n- Use \"ໃບຕາດິນ\" in property listings when confirming a property has title documentation.\n- Avoid stating a specific title-type claim (e.g. naming a particular title category) unless that specific document type has actually been verified — see Common mistakes.\n\n**Related knowledge (in brain/lao/):**\n- `land/title-types.md`\n- `land/ownership.md`\n- `common-questions.md#how-do-i-verify-a-title`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-sit-nam-sai-thi-din","title":"Right to use land / land-use right (sometimes rendered \"usufruct right\") (ສິດນຳໃຊ້ທີ່ດິນ — sit nam sai thi din)","category":"language","status":"draft","confidence":0.5,"tags":["land","title","legal","lao-dictionary","land-legal"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ສິດນຳໃຊ້ທີ່ດິນ — sit nam sai thi din** — Right to use land / land-use right (sometimes rendered \"usufruct right\")\n\nA term commonly used in the market to describe land documentation understood, in everyday practice, as distinct from full land title — generally referring to a right to use or occupy land rather than confirmed full ownership. This is how the term is used in common market practice; it is not presented here as a settled legal definition, and the underlying legal distinction from full title has not yet been verified against Lao law (see Legal Verification below). Referenced in Pintag's own buying guide as an alternative to full land title that a seller may hold instead — that guide is itself pending founder/legal review, not a confirmed legal source.\n\n**When to use:** When a property's documentation is commonly described as a right-to-use certificate rather than full land title, or when explaining to buyers that Lao land documentation isn't a single uniform category — framed as market practice, not confirmed legal categorization.\n\n**When not to use:** As a synonym for full land title (ໃບຕາດິນ) — they are commonly discussed as distinct categories in the market, and treating them as interchangeable risks misleading a buyer about what they're actually acquiring. Also avoid presenting the distinction itself as legally settled — it isn't, yet.\n\n**Common mistakes:** Conflating this with ໃບຕາດິນ, or assuming it always carries the same rights and restrictions as full title. Do not state what those rights/restrictions specifically are as settled fact — the exact legal distinctions and implications between these categories require confirmation against Lao law before being stated definitively in published content.\n\n**Example usage:** \"ເຮືອນຫຼັງນີ້ມີສິດນຳໃຊ້ທີ່ດິນ, ບໍ່ແມ່ນໃບຕາດິນເຕັມສ່ວນ.\" — \"This house has land-use rights, not full land title.\"\n\n**Preferred Pintag wording:**\n- Use \"ສິດນຳໃຊ້ທີ່ດິນ\" in educational articles when explicitly distinguishing this from full land title.\n- Use \"ສິດນຳໃຊ້ທີ່ດິນ\" in property listings only when this is confirmed to be the actual documentation type for that property.\n- Avoid using this term interchangeably with ໃບຕາດິນ — see When not to use.\n\n**Related knowledge (in brain/lao/):**\n- `land/title-types.md`\n- `land/ownership.md`\n- `#ໃບຕາດິນ`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-on","title":"Transfer (of title/ownership) (ໂອນ — on)","category":"language","status":"draft","confidence":0.5,"tags":["land","transfer","legal","lao-dictionary","land-legal"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ໂອນ — on** — Transfer (of title/ownership)\n\nThe general Lao verb/noun for transferring ownership or title from one party to another — used broadly for the act of completing a property transaction's transfer step.\n\n**When to use:** Describing the transfer step of a transaction in general terms (e.g. \"ໂອນກໍາມະສິດ\" — transfer ownership), in both spoken and written contexts.\n\n**When not to use:** As a stand-in for the specific legal/administrative procedure required to register a transfer with the appropriate authority — ໂອນ names the action, not the procedural requirements, which vary and should not be assumed to be simple or uniform.\n\n**Common mistakes:** Assuming ໂອນ alone implies the transfer is complete and registered. Completing an informal \"ໂອນ\" step (e.g. handshake, payment) is not the same as the transfer being legally registered with the appropriate authority — content should not conflate the two without confirming what registration actually requires.\n\n**Example usage:** \"ພວກເຮົາຈະໂອນກໍາມະສິດອາທິດໜ້າ.\" — \"We will transfer ownership next week.\"\n\n**Preferred Pintag wording:**\n- Use \"ໂອນ\" or \"ໂອນກໍາມະສິດ\" in educational articles when describing the general transfer step of a transaction.\n- Use \"ໂອນ\" in listings/process descriptions when referring to the transfer stage.\n- Avoid implying that \"ໂອນ\" alone means the transfer is legally finalized — see Common mistakes.\n\n**Related knowledge (in brain/lao/):**\n- `land/transfer.md`\n- `legal-process.md`\n- `#ໃບຕາດິນ`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-huan-phom-yu","title":"Move-in ready house (ເຮືອນພ້ອມຢູ່ — huan phom yu)","category":"language","status":"draft","confidence":0.5,"tags":["residential","listing","lao-dictionary","property-listings"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ເຮືອນພ້ອມຢູ່ — huan phom yu** — Move-in ready house\n\nA listing term describing a house that is ready for immediate occupancy — no renovation or additional work needed before a buyer or renter can move in.\n\n**When to use:** Property listings and educational content describing a property's readiness for occupancy.\n\n**When not to use:** For properties still under construction, needing renovation, or not yet finished to a livable standard — using this term for such properties overstates their actual condition.\n\n**Common mistakes:** Using this term loosely to mean \"furnished.\" ເຮືອນພ້ອມຢູ່ refers to move-in readiness generally (structurally and legally complete and habitable) — it does **not** automatically mean furniture, appliances, curtains, or décor are included. Any of those must be stated separately and explicitly; their absence from the listing text should be read as \"not confirmed,\" not \"included by default.\"\n\n**Example usage:** \"ເຮືອນຫຼັງນີ້ເປັນເຮືອນພ້ອມຢູ່, ບໍ່ຕ້ອງສ້ອມແປງເພີ່ມ.\" — \"This house is move-in ready; no further renovation is needed.\"\n\n**Preferred Pintag wording:**\n- Use \"ເຮືອນພ້ອມຢູ່\" in property listings when a property is genuinely ready for immediate occupancy.\n- Use \"ເຮືອນພ້ອມຢູ່\" in educational content explaining listing terminology to buyers.\n- Avoid using this term to imply furniture, appliances, curtains, or décor are included — those must be confirmed and stated separately, never assumed from this term alone.\n\n**Related knowledge (in brain/lao/):**\n- `listings/overview.md`\n- `buyer-journey.md`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-tit-thanon-nyai","title":"Fronting / adjacent to a main road (ຕິດຖະໜົນໃຫຍ່ — tit thanon nyai)","category":"language","status":"draft","confidence":0.5,"tags":["commercial","residential","listing","land","lao-dictionary","property-listings"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ຕິດຖະໜົນໃຫຍ່ — tit thanon nyai** — Fronting / adjacent to a main road\n\nA listing descriptor indicating a property's frontage is directly on a main/major road, as opposed to being set back on a smaller lane or alley.\n\n**When to use:** Property listings and educational content when a property genuinely has direct frontage on a main road — a commonly valued feature for commercial visibility or access.\n\n**When not to use:** For properties accessed via a smaller side lane or alley, even if that lane eventually connects to a main road — this term specifically implies direct frontage, not proximity.\n\n**Common mistakes:** Using this term for a property that is merely \"near\" a main road rather than directly fronting it. Proximity and direct frontage are treated as distinct claims in the market, and conflating them risks misleading buyers evaluating access or visibility for commercial use.\n\n**Example usage:** \"ຮ້ານນີ້ຕິດຖະໜົນໃຫຍ່, ເໝາະສຳລັບເປີດຮ້ານຄ້າ.\" — \"This shop fronts the main road, suitable for opening a storefront business.\"\n\n**Preferred Pintag wording:**\n- Use \"ຕິດຖະໜົນໃຫຍ່\" in property listings only when the property has genuine direct main-road frontage.\n- Use \"ຕິດຖະໜົນໃຫຍ່\" in educational content explaining listing terminology around access and frontage.\n- Avoid this term when a property is merely near, not directly fronting, a main road — see Common mistakes.\n\n**Related knowledge (in brain/lao/):**\n- `listings/overview.md`\n- `market/overview.md`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-khai-duan","title":"Urgent sale / quick sale (ຂາຍດ່ວນ — khai duan)","category":"language","status":"draft","confidence":0.5,"tags":["sale","listing","negotiation","lao-dictionary","pricing-negotiation"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ຂາຍດ່ວນ — khai duan** — Urgent sale / quick sale\n\nA listing term signaling that the seller wants to sell quickly, often implying openness to price negotiation or a faster transaction timeline — commonly used to attract buyer interest by signaling motivation.\n\n**When to use:** Listings and marketing content where a seller has genuinely indicated urgency or motivation to sell quickly.\n\n**When not to use:** As a routine marketing phrase applied to any listing regardless of actual seller motivation — per `brand-voice.md`'s rule against manufactured urgency, this term should only be used when there's a real, verifiable reason behind it, not as a generic attention-getting device.\n\n**Common mistakes:** Overusing ຂາຍດ່ວນ as a default listing phrase rather than a genuine signal. This both erodes the term's credibility in the market and risks violating Pintag's own `posting-rules.md` ban on manufactured urgency/scarcity language.\n\n**Example usage:** \"ຂາຍດ່ວນ! ເຈົ້າຂອງຈະຍົກຍ້າຍໄປຕ່າງແຂວງ.\" — \"Urgent sale! The owner is relocating to another province.\"\n\n**Preferred Pintag wording:**\n- Use \"ຂາຍດ່ວນ\" in property listings only when there is a real, statable reason for urgency (e.g. relocation, per the example).\n- Use \"ຂາຍດ່ວນ\" in educational articles as an example of language that requires real justification, per `brand-voice.md`.\n- Avoid using \"ຂາຍດ່ວນ\" as a default/filler listing phrase — see Common mistakes.\n\n**Related knowledge (in brain/lao/):**\n- `negotiation.md`\n- `market/overview.md`\n- `forbidden-phrases.md`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]},{"id":"lao-dictionary-lakha-to-long-dai","title":"Price negotiable (ລາຄາຕໍ່ລອງໄດ້ — lakha to long dai)","category":"language","status":"draft","confidence":0.5,"tags":["sale","rent","negotiation","listing","lao-dictionary","pricing-negotiation"],"source":{"type":"file","reference":"brain/lao/dictionary.md — Common market usage"},"contributedBy":"brain/lao (Keomany, hand-authored)","created":"","updated":"","relatedIds":[],"supersededBy":null,"reviewedBy":null,"reviewNotes":null,"body":"**ລາຄາຕໍ່ລອງໄດ້ — lakha to long dai** — Price negotiable\n\nA listing term indicating the seller is open to negotiating the stated price — used to invite offers below or around the asking price.\n\n**When to use:** Listings and content where a seller has genuinely indicated willingness to negotiate price and terms.\n\n**When not to use:** As an assumed default for every listing — not every seller is open to negotiation, and stating this without confirmation misrepresents the seller's actual position.\n\n**Common mistakes:** Assuming this phrase's presence or absence definitively signals a seller's flexibility. Negotiation is broadly standard practice in the Vientiane market regardless of whether a listing explicitly states ລາຄາຕໍ່ລອງໄດ້ — buyers shouldn't treat its absence as \"no negotiation possible.\"\n\n**Example usage:** \"ລາຄາຕໍ່ລອງໄດ້, ຕິດຕໍ່ເຈົ້າຂອງໂດຍກົງ.\" — \"Price negotiable, contact the owner directly.\"\n\n**Preferred Pintag wording:**\n- Use \"ລາຄາຕໍ່ລອງໄດ້\" in property listings when the seller has confirmed openness to negotiation.\n- Use \"ລາຄາຕໍ່ລອງໄດ້\" in educational articles explaining that negotiation is standard practice in this market.\n- Avoid implying that its absence from a listing means a price is fixed — see Common mistakes.\n\n**Related knowledge (in brain/lao/):**\n- `negotiation.md`\n- `market/overview.md`\n- `#ຂາຍດ່ວນ`","path":"../brain/lao/dictionary.md","writable":false,"history":["534e168 feat(brain): add first Lao real estate dictionary entries","944a565 feat(brain): establish Lao real estate knowledge architecture","7e2d2d9 Scaffold Pintag Marketing AI (pintag-studio) — M0 foundation"]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('knowledge-data').textContent);

document.getElementById('generated-at').textContent = 'Generated ' + new Date(DATA.generatedAt).toLocaleString();
document.getElementById('maturity-line').textContent = 'Department Maturity: ' + DATA.maturityLevel;

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
  });
});

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Overview ----
const kpiGrid = document.getElementById('kpi-grid');
const statusOrder = ['draft', 'verified', 'expert_reviewed', 'deprecated'];
kpiGrid.innerHTML = [
  { label: 'Total entries', num: DATA.kpis.total },
  { label: 'Pending review', num: DATA.kpis.pendingReview },
  ...statusOrder.map(s => ({ label: s.replace('_',' '), num: DATA.kpis.byStatus[s] || 0 }))
].map(k => `<div class="kpi"><div class="kpi-num">${k.num}</div><div class="kpi-label">${escapeHtml(k.label)}</div></div>`).join('');

function renderBars(el, obj) {
  const max = Math.max(1, ...Object.values(obj));
  const rows = Object.entries(obj).sort((a,b) => b[1]-a[1]);
  el.innerHTML = rows.length ? rows.map(([label, count]) => `
    <div class="bar-row">
      <div class="bar-label">${escapeHtml(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(count/max)*100}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>`).join('') : '<div class="empty-note">No data yet.</div>';
}
renderBars(document.getElementById('by-category'), DATA.kpis.byCategory);
renderBars(document.getElementById('by-source'), DATA.kpis.bySource);

const recent = DATA.recentlyApprovedIds.map(id => DATA.entries.find(e => e.id === id)).filter(Boolean);
document.getElementById('recently-approved').innerHTML = recent.length
  ? recent.map(e => `<div class="entry-meta">${escapeHtml(e.updated)} — <b>${escapeHtml(e.title)}</b> (${escapeHtml(e.category)})</div>`).join('')
  : '<div class="empty-note">Nothing approved yet.</div>';

// ---- Explore ----
const categories = [...new Set(DATA.entries.map(e => e.category))].sort();
const categorySelect = document.getElementById('category-filter');
categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; categorySelect.appendChild(o); });

const entryList = document.getElementById('entry-list');
const searchInput = document.getElementById('search-input');
const statusFilter = document.getElementById('status-filter');

function renderEntries() {
  const q = searchInput.value.toLowerCase();
  const cat = categorySelect.value;
  const status = statusFilter.value;
  const filtered = DATA.entries.filter(e => {
    if (cat && e.category !== cat) return false;
    if (status && e.status !== status) return false;
    if (q && !(e.title.toLowerCase().includes(q) || e.tags.join(' ').toLowerCase().includes(q) || e.body.toLowerCase().includes(q))) return false;
    return true;
  });

  entryList.innerHTML = filtered.length ? filtered.map(e => `
    <div class="entry" data-id="${e.id}">
      <div class="entry-top">
        <div class="entry-title">${escapeHtml(e.title)}</div>
        <span class="badge ${e.status}">${escapeHtml(e.status.replace('_',' '))}</span>
      </div>
      <div class="entry-meta">${escapeHtml(e.category)} · ${escapeHtml(e.tags.join(', '))} · confidence ${e.confidence} · ${e.writable ? 'knowledge/' : 'brain/lao/'}</div>
      <div class="entry-detail">
        <div>${escapeHtml(e.body)}</div>
        <div style="margin-top:10px;"><b>Source:</b> ${escapeHtml(e.source.type)} — ${escapeHtml(e.source.reference)}</div>
        <div><b>Contributed by:</b> ${escapeHtml(e.contributedBy)} · <b>Created:</b> ${escapeHtml(e.created)} · <b>Updated:</b> ${escapeHtml(e.updated)}</div>
        ${e.reviewedBy ? `<div><b>Reviewed by:</b> ${escapeHtml(e.reviewedBy)}${e.reviewNotes ? ' — ' + escapeHtml(e.reviewNotes) : ''}</div>` : ''}
        ${e.relatedIds.length ? `<div><b>Related:</b> ${escapeHtml(e.relatedIds.join(', '))}</div>` : ''}
        ${e.supersededBy ? `<div><b>Superseded by:</b> ${escapeHtml(e.supersededBy)}</div>` : ''}
        <div class="history-list">${e.history.length ? 'History:<br>' + e.history.map(escapeHtml).join('<br>') : 'No git history yet (uncommitted).'}</div>
      </div>
    </div>`).join('') : '<div class="empty-note">No entries match.</div>';

  entryList.querySelectorAll('.entry').forEach(el => el.addEventListener('click', () => el.classList.toggle('open')));
}
[searchInput, categorySelect, statusFilter].forEach(el => el.addEventListener('input', renderEntries));
renderEntries();
</script>
</body>
</html>
