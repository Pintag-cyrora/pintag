name: Publish Queue

# Short-interval poll that picks up content_calendar items with a
# founder-approved decision in approvals_queue and runs Publish -> Analyze ->
# Memory Update (pipeline/publish-queue.ts). Manual trigger until real Meta
# credentials exist and META_PUBLISH_MODE is flipped to 'live' — see
# SETUP.md. Runs safely today in 'simulate' mode (the default).
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: '*/15 * * * *'

jobs:
  publish-queue:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pintag-studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run pipeline:publish-queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic-api' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_PUBLISH_MODE: ${{ vars.META_PUBLISH_MODE || 'simulate' }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
