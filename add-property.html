<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src * data: blob:; connect-src https://*.supabase.co; frame-src 'none'; object-src 'none';">
<title>ເພີ່ມອະສັງຫາ · Pintag</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#F5F1EA;
  --card:#FFFFFF;
  --text:#172026;
  --muted:#7C8B92;
  --line:rgba(23,32,38,0.08);
  --teal:#2D8C8C;
  --danger:#B45B5B;
  --radius:22px;
}
<div class="delete-modal" id="deleteModal">

  <div class="delete-box">

    <h3>Delete Listing?</h3>

    <p>
      This action cannot be undone.
    </p>

    <div class="delete-actions">

      <button
        class="cancel-btn"
        onclick="closeDeleteModal()"
      >
        Cancel
      </button>

      <button
        class="confirm-btn"
        onclick="confirmDelete()"
      >
        Delete
      </button>

    </div>

  </div>

</div>
body{
  background:var(--bg);
  font-family:"Noto Sans Lao",sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.page{
  max-width:760px;
  margin:auto;
  padding:28px 18px 120px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:28px;
}

.topbar h1{
  font-size:38px;
  line-height:1.05;
  letter-spacing:-0.03em;
}

.back{
  text-decoration:none;
  color:var(--teal);
  font-size:16px;
  font-weight:600;
}

.form-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:22px;
  border:1px solid var(--line);
}

.section{
  margin-bottom:28px;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  margin-bottom:10px;
  font-size:15px;
  font-weight:600;
}

.input,
.select,
.textarea{
  width:100%;
  border:1px solid var(--line);
  background:#fff;
  border-radius:18px;
  padding:16px;
  font-size:16px;
  font-family:"Noto Sans Lao",sans-serif;
  outline:none;
}

.textarea{
  min-height:140px;
  resize:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.upload-box{
  border:2px dashed rgba(45,140,140,0.25);
  border-radius:22px;
  background:rgba(45,140,140,0.04);
  padding:34px 20px;
  text-align:center;
}

.upload-text{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.feature{
  display:flex;
  align-items:center;
  gap:10px;
  background:#F8F5F1;
  border-radius:16px;
  padding:14px;
}

.actions{
  display:flex;
  gap:14px;
  margin-top:30px;
}

.btn{
  flex:1;
  border:none;
  border-radius:18px;
  padding:18px;
  font-size:16px;
  font-family:"Noto Sans Lao",sans-serif;
  font-weight:700;
  cursor:pointer;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.btn-secondary{
  background:#EFE7E4;
  color:var(--danger);
}
.delete-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.delete-box{
  background:#fff;
  width:100%;
  max-width:380px;
  border-radius:24px;
  padding:26px;
}

.delete-box h3{
  font-size:24px;
  margin-bottom:10px;
}

.delete-box p{
  color:#7C8B92;
  line-height:1.6;
  margin-bottom:22px;
}

.delete-actions{
  display:flex;
  gap:12px;
}

.cancel-btn,
.confirm-btn{
  flex:1;
  border:none;
  border-radius:16px;
  padding:16px;
  font-weight:700;
  cursor:pointer;
}

.cancel-btn{
  background:#F3F1EE;
}

.confirm-btn{
  background:#B45B5B;
  color:#fff;
}
.status-text{
  margin-top:18px;
  font-size:14px;
  color:var(--muted);
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:18px;
}

.preview-grid img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
}

@media(max-width:640px){

  .topbar h1{
    font-size:30px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .features{
    grid-template-columns:1fr;
  }

  .preview-grid{
    grid-template-columns:1fr 1fr;
  }

}

</style>
</head>
<body>

<div class="page">

  <div class="topbar">
    <h1>ເພີ່ມອະສັງຫາ</h1>

    <a href="dashboard.html" class="back">
      ← ກັບຄືນ
    </a>
  </div>

  <div class="form-card">

    <!-- IMAGES -->

    <div class="section">

      <div class="section-title">
        ຮູບພາບ
      </div>

      <div class="upload-box">

     <div class="upload-text">
  ອັບໂຫລດຫຼາຍຮູບໄດ້<br>
  ຮູບທຳອິດຈະເປັນຮູບໜ້າປົກ
</div>

        <input
          type="file"
          id="images"
          multiple
          accept="image/*"
        >

      </div>

      <div class="preview-grid" id="previewGrid"></div>

    </div>

    <!-- BASIC -->

    <div class="section">

      <div class="section-title">
        ຂໍ້ມູນພື້ນຖານ
      </div>

      <div class="field">
        <label>ຫົວຂໍ້</label>

        <input
          type="text"
          class="input"
          id="title"
        >
      </div>

      <div class="grid">

        <div class="field">
          <label>ປະເພດ</label>

          <select class="select" id="propertyType" onchange="renderPropertyTypeFields(this.value)">
          </select>
        </div>

        <div class="field">
          <label>ຂາຍ / ເຊົ່າ</label>

          <select class="select" id="listingType">
            <option value="for_sale">ຂາຍ</option>
            <option value="for_rent">ເຊົ່າ</option>
            <option value="sale_or_rent">ຊື້ / ເຊົ່າ</option>
          </select>
        </div>

      </div>

      <div class="field">
        <label>ລາຄາ</label>

        <input
          type="text"
          class="input"
          id="price"
          placeholder="$120,000"
        >
      </div>

    </div>

    <!-- LOCATION -->

    <div class="section">

      <div class="section-title">
        ສະຖານທີ່
      </div>

      <div class="grid">

        <div class="field">
          <label>ເມືອງ</label>

          <input
            type="text"
            class="input"
            id="district"
          >
        </div>

        <div class="field">
          <label>ບ້ານ</label>

          <input
            type="text"
            class="input"
            id="village"
          >
        </div>

      </div>

    </div>

    <!-- DETAILS -->

    <div class="section">

      <div class="section-title">
        ລາຍລະອຽດ
      </div>

      <!-- Rendered dynamically from PROPERTY_TYPE_FIELDS (terminology.js)
           based on the selected property type; see renderPropertyTypeFields()
           below. Land, for example, renders no fields here at all. -->
      <div class="grid" id="property-details-grid"></div>

      <div class="field">
        <label>ລາຍລະອຽດ</label>

        <textarea
          class="textarea"
          id="description"
        ></textarea>
      </div>

    </div>

    <!-- FEATURES -->

    <div class="section">

      <div class="section-title">
        ສິ່ງອຳນວຍຄວາມສະດວກ
      </div>

      <!-- Rendered dynamically from PROPERTY_TYPE_FIELDS's amenities
           checkbox_ref for the selected property type; see
           renderPropertyTypeFields() below. -->
      <div class="features" id="property-features-grid"></div>

    </div>

    <!-- BUYER CONTACT -->

    <div class="section">

      <div class="section-title">
        ຜູ້ຕິດຕໍ່ (Buyer Contact)
      </div>

      <div class="field">
        <label>ຊື່ຜູ້ຕິດຕໍ່</label>
        <input class="input" id="contactName" placeholder="ຄ່າເລີ່ມຕົ້ນ: ຊື່ຂອງທ່ານ">
      </div>

      <div class="field">
        <label>ເບີໂທ *</label>
        <input class="input" id="contactPhone" placeholder="020 XXXXXXXX">
      </div>

    </div>

    <!-- STATUS -->

<div class="section">

  <div class="section-title">
    ສະຖານະ
  </div>

  <select class="select" id="status">

    <option value="published">
      Published
    </option>

    <option value="draft">
      Draft
    </option>

    <option value="sold">
      Sold
    </option>

    <option value="rented">
      Rented
    </option>

  </select>

</div>

    <!-- BUTTONS -->

    <div class="actions">

      <button
        class="btn btn-primary"
        onclick="saveProperty()"
      >
        ບັນທຶກ
      </button>

      <button
        class="btn btn-secondary"
        onclick="window.location.href='dashboard.html'"
      >
        ຍົກເລີກ
      </button>

    </div>

    <div class="status-text" id="statusText"></div>

  </div>

</div>

<script src="config.js"></script>
<script src="dev-banner.js"></script>
<script src="terminology.js"></script>
<script src="amenities.js"></script>
<script>

const SUPABASE_URL = window.PINTAG.supabaseUrl;

const SUPABASE_KEY = window.PINTAG.anonKey;

const supabaseClient =
  supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );
let deleteId = null;

// Resolves the logged-in user's own party row — checks auth_user_id first
// (the decoupled model going forward), falling back to id (the legacy
// "agents.id == auth uid" convention preserved for pre-existing agents).
async function resolveMyPartyId(userId){
  const { data } = await supabaseClient
    .from('parties')
    .select('id,name_en,whatsapp')
    .or(`auth_user_id.eq.${userId},id.eq.${userId}`)
    .limit(1);
  return (data && data[0]) || null;
}

// Populate the Property Type dropdown from PROPERTY_TYPES (terminology.js)
// using Lao labels, since this page is Lao-only UI.
(function populatePropertyTypeOptions(){
  const sel = document.getElementById('propertyType');
  sel.innerHTML = Object.keys(PROPERTY_TYPES).map(function(key){
    return '<option value="' + key + '">' + PROPERTY_TYPES[key].lo + '</option>';
  }).join('');
})();

function getCheckedFeatureKeys(){
  return Array.from(document.querySelectorAll('#property-features-grid input:checked')).map(function(el){ return el.value; });
}

// Renders the Property Details fields and the Features checkboxes for the
// selected property type from PROPERTY_TYPE_FIELDS (terminology.js). Only
// the AMENITIES-registry checkbox_ref is used here (not FEATURES), since
// this page has a single combined features/amenities checkbox list mapped
// to the `amenities` column, unlike admin.html's two separate sections.
function renderPropertyTypeFields(typeKey){
  const detailsGrid = document.getElementById('property-details-grid');
  const featuresGrid = document.getElementById('property-features-grid');
  if(!detailsGrid || !featuresGrid) return;
  const fields = PROPERTY_TYPE_FIELDS[typeKey] || [];
  const prevChecked = getCheckedFeatureKeys();

  detailsGrid.innerHTML = fields.filter(function(f){ return f.kind !== 'checkbox_ref'; }).map(function(f){
    if(f.kind === 'select'){
      const opts = f.options.map(function(o){
        return '<option value="' + o.value + '">' + o.label.lo + '</option>';
      }).join('');
      return '<div class="field"><label>' + f.label.lo + '</label><select class="select" id="' + f.id + '">' + opts + '</select></div>';
    }
    return '<div class="field"><label>' + f.label.lo + '</label><input type="' + (f.kind === 'text' ? 'text' : 'number') + '" class="input" id="' + f.id + '"' +
      (f.min != null ? ' min="' + f.min + '"' : '') + (f.max != null ? ' max="' + f.max + '"' : '') +
      (f.placeholder ? ' placeholder="' + f.placeholder + '"' : '') + '></div>';
  }).join('');

  const amenityField = fields.find(function(f){ return f.kind === 'checkbox_ref' && f.registry === 'AMENITIES'; });
  const keys = amenityField ? amenityField.keys : [];
  featuresGrid.innerHTML = keys.map(function(key){
    const a = AMENITIES[key];
    if(!a) return '';
    return '<label class="feature"><input type="checkbox" value="' + key + '">' + a.lo + '</label>';
  }).join('');
  keys.forEach(function(key){
    if(prevChecked.indexOf(key) === -1) return;
    const input = featuresGrid.querySelector('input[value="' + key + '"]');
    if(input) input.checked = true;
  });
}

function populateTypedFields(typeKey, sourceRow){
  (PROPERTY_TYPE_FIELDS[typeKey] || []).forEach(function(f){
    if(!f.column) return;
    const el = document.getElementById(f.id);
    if(!el) return;
    const v = sourceRow ? sourceRow[f.column] : null;
    el.value = (v != null ? v : '');
  });
}

function buildTypedFieldsPayload(typeKey){
  const activeIds = {};
  (PROPERTY_TYPE_FIELDS[typeKey] || []).forEach(function(f){ if(f.column) activeIds[f.id] = f; });
  const allColumns = {};
  Object.keys(PROPERTY_TYPE_FIELDS).forEach(function(key){
    PROPERTY_TYPE_FIELDS[key].forEach(function(f){ if(f.column) allColumns[f.column] = f; });
  });
  const out = {};
  Object.keys(allColumns).forEach(function(column){
    const f = allColumns[column];
    const active = activeIds[f.id];
    if(!active){ out[column] = null; return; }
    const el = document.getElementById(f.id);
    if(!el){ out[column] = null; return; }
    out[column] = f.kind === 'number' ? (parseInt(el.value) || null) : (el.value.trim() || null);
  });
  return out;
}

renderPropertyTypeFields(document.getElementById('propertyType').value);

// Prefill the Buyer Contact section with the agent's own info as a
// convenience default — still editable, since an agent may be listing on
// an owner's behalf and want buyers to call the owner instead.
(async function prefillContactFromOwnParty(){
  const { data:{ user } } = await supabaseClient.auth.getUser();
  if(!user) return;
  const myParty = await resolveMyPartyId(user.id);
  if(!myParty) return;
  const nameEl = document.getElementById('contactName');
  const phoneEl = document.getElementById('contactPhone');
  if(nameEl && !nameEl.value) nameEl.value = myParty.name_en || '';
  if(phoneEl && !phoneEl.value) phoneEl.value = myParty.whatsapp || '';
})();

function openDeleteModal(id){

  deleteId = id;

  document.getElementById(
    'deleteModal'
  ).style.display = 'flex';

}

function closeDeleteModal(){

  document.getElementById(
    'deleteModal'
  ).style.display = 'none';

}

async function confirmDelete(){

  if(!deleteId) return;

  await supabaseClient
    .from('properties')
    .delete()
    .eq('id',deleteId);

  location.reload();

}
const imageInput =
  document.getElementById('images');

const previewGrid =
  document.getElementById('previewGrid');

let selectedFiles = [];

imageInput.addEventListener('change',function(e){

  selectedFiles =
    Array.from(e.target.files);

  previewGrid.innerHTML = '';

  selectedFiles.forEach(file=>{

    const reader = new FileReader();

    reader.onload = function(event){

      const img =
        document.createElement('img');

      img.src = event.target.result;

      previewGrid.appendChild(img);

    };

    reader.readAsDataURL(file);

  });

});
async function compressImage(file){

  return new Promise((resolve)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = function(event){

      const img = new Image();

      img.src = event.target.result;

      img.onload = function(){

        const canvas =
          document.createElement('canvas');

        const MAX_WIDTH = 1600;

        let width = img.width;
        let height = img.height;

        if(width > MAX_WIDTH){

          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;

        }

        canvas.width = width;
        canvas.height = height;

        const ctx =
          canvas.getContext('2d');

        ctx.drawImage(
          img,
          0,
          0,
          width,
          height
        );

        canvas.toBlob(

          (blob)=>{

            resolve(
              new File(
                [blob],
                file.name,
                {
                  type:'image/jpeg'
                }
              )
            );

          },

          'image/jpeg',
          0.78

        );

      };

    };

  });

}
async function uploadImages(){

  const uploadedUrls = [];

  for(let file of selectedFiles){

  file =
    await compressImage(file);

    const fileName =
      Date.now() + '-' + file.name;

    const { error } =
      await supabaseClient
        .storage
        .from('property-images')
        .upload(fileName,file);

    if(error){
      console.error(error);
      continue;
    }

    const { data } =
      supabaseClient
        .storage
        .from('property-images')
        .getPublicUrl(fileName);

    uploadedUrls.push(data.publicUrl);

  }

  return uploadedUrls;

}

function slugify(text){

  return text
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');

}

async function saveProperty(){

  const statusText =
    document.getElementById('statusText');

  statusText.innerText =
    'ກຳລັງບັນທຶກ...';

  const {
    data:{ user }
  } = await supabaseClient.auth.getUser();

  if(!user){

    window.location.href =
      'agent-login.html';

    return;
  }

  const myParty = await resolveMyPartyId(user.id);

  if(!myParty){
    statusText.innerText =
      'ບັນຊີຕົວແທນຂອງທ່ານຍັງບໍ່ໄດ້ຕັ້ງຄ່າ. ກະລຸນາຕິດຕໍ່ Pintag staff.';
    return;
  }

  const contactPhone =
    document.getElementById('contactPhone').value.trim();

  if(!contactPhone){
    statusText.innerText =
      'ກະລຸນາປ້ອນເບີໂທຜູ້ຕິດຕໍ່.';
    return;
  }

  const { data: contactRows, error: contactError } =
    await supabaseClient
      .from('contacts')
      .insert({
        role: 'agent',
        name: document.getElementById('contactName').value.trim() || null,
        phone: contactPhone,
        whatsapp: contactPhone,
        party_id: myParty.id,
        created_by: user.id
      })
      .select('id');

  if(contactError){
    console.error(contactError);
    statusText.innerText =
      contactError.message;
    return;
  }

  const contactId = contactRows[0].id;

  const title =
    document.getElementById('title').value;

  const propertyType =
    document.getElementById('propertyType').value;

  const listingType =
    document.getElementById('listingType').value;

  const price =
    document.getElementById('price').value;

  const district =
    document.getElementById('district').value;

  const village =
    document.getElementById('village').value;

  const description =
    document.getElementById('description').value;

  const status =
    document.getElementById('status').value;

  const amenities =
    getCheckedFeatureKeys();

  const imageUrls =
    await uploadImages();

  const slug =
    slugify(title) +
    '-' +
    Date.now();

  const { error } =
    await supabaseClient
      .from('properties')
      .insert({

        title_en:title,
        title_lo:title,

        slug:slug,

        property_type:propertyType,

        transaction_type:listingType,

        price_display:price,

        district_en:district,
        district_lo:district,

        village_en:village,
        village_lo:village,

        description_en:description,
        description_lo:description,

        amenities:amenities,

        images:imageUrls,

        status:status,

        managed_by_party_id:myParty.id,
        contact_id:contactId,

        ...buildTypedFieldsPayload(propertyType)

      });

if(error){

  console.error(error);

  alert(JSON.stringify(error));

  statusText.innerText =
    error.message;

  return;
}

  statusText.innerText =
    'ບັນທຶກສຳເລັດ';

  setTimeout(function(){

    window.location.href =
      'dashboard.html';

  },1200);

}

</script>

</body>
</html>
