<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;--teal-dim:rgba(45,140,140,0.08);
  --ink:#1A2428;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--white:#FFFFFF;
  --border:rgba(26,36,40,0.07);--border-teal:rgba(45,140,140,0.18);
}
body{font-family:'DM Sans',sans-serif;font-weight:400;font-size:16px;line-height:1.75;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* LANGUAGE */
.lo{display:block;}.en{display:none;}.zh{display:none;}
.lo-i{display:inline;}.en-i{display:none;}.zh-i{display:none;}
body.lang-en .lo{display:none;}body.lang-en .en{display:block;}body.lang-en .zh{display:none;}
body.lang-en .lo-i{display:none;}body.lang-en .en-i{display:inline;}body.lang-en .zh-i{display:none;}
body.lang-zh .lo{display:none;}body.lang-zh .en{display:none;}body.lang-zh .zh{display:block;}
body.lang-zh .lo-i{display:none;}body.lang-zh .en-i{display:none;}body.lang-zh .zh-i{display:inline;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:52px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-wordmark{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-0.02em;}
.nav-back{font-size:13px;color:var(--ink-muted);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color 0.2s;}
.nav-back:hover{color:var(--ink);}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:ldot 1.2s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── GALLERY — immersive, no thumbnails ── */
.gallery{
  margin-top:52px;
  position:relative;
  background:var(--ink);
  overflow:hidden;
}
.gallery-stage{
  position:relative;
  height:72vw;
  min-height:300px;
  max-height:580px;
  overflow:hidden;
  cursor:pointer;
  user-select:none;
}
/* Crossfade stack */
.g-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  opacity:0;
  transition:opacity 0.4s ease;
  pointer-events:none;
  display:block;
}
.g-img.active{opacity:1;}
.gallery-no-img{
  width:100%;height:100%;
  background:#2A3A35;
  display:flex;align-items:center;justify-content:center;
}

/* Gallery overlay — counter + status only */
.gallery-ui{
  position:absolute;bottom:0;left:0;right:0;
  padding:40px 16px 14px;
  background:linear-gradient(to top,rgba(20,28,32,0.55) 0%,transparent 100%);
  display:flex;align-items:flex-end;justify-content:space-between;
  z-index:2;pointer-events:none;
}
.g-counter{
  font-size:12px;font-weight:400;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.08em;
}
.g-status{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.92);
  padding:4px 10px;
  font-size:10px;font-weight:500;
  color:var(--teal);letter-spacing:0.06em;
  pointer-events:all;
}
.s-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--teal);
  animation:ldot 2s ease-in-out infinite;
}

/* Progress bar — replaces thumbnail strip */
.gallery-progress{
  display:flex;gap:3px;
  padding:0 16px;
  background:var(--ink);
  height:3px;
}
.g-bar{
  flex:1;height:3px;
  background:rgba(255,255,255,0.18);
  cursor:pointer;
  transition:background 0.25s;
}
.g-bar.active{background:rgba(255,255,255,0.75);}

/* Share button */
.g-share-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.15);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;
  backdrop-filter:blur(8px);
}
.g-share-btn:hover{background:rgba(255,255,255,0.25);}

/* Nav arrows — subtle */
.g-btn{
  position:absolute;top:50%;transform:translateY(-50%);z-index:3;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;
  font-size:18px;color:rgba(255,255,255,0.8);line-height:1;
}
.g-btn:hover{background:rgba(255,255,255,0.22);}
.g-btn.prev{left:10px;}
.g-btn.next{right:10px;}

/* ── LANGUAGE TABS — calm ── */
.lang-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--white);
  position:sticky;top:52px;z-index:200;
}
.lang-tab{
  flex:1;padding:13px 8px;
  text-align:center;font-size:13px;font-weight:400;
  color:var(--ink-muted);cursor:pointer;border:none;background:transparent;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;font-family:'DM Sans',sans-serif;
  letter-spacing:0.04em;
}
.lang-tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}

/* STICKY WA — mobile only */
.sticky-wa{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  padding:8px 16px 10px;
  background:rgba(255,255,255,0.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
  display:none;
}
.sticky-wa a{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:12px;
  background:#1A9E50;color:#fff;
  font-size:14px;font-weight:500;
  text-decoration:none;border-radius:3px;letter-spacing:0.02em;
}
@media(max-width:800px){.sticky-wa{display:block;}body{padding-bottom:66px;}}

/* CONTENT */
.content{max-width:780px;margin:0 auto;}

/* PRICE */
.price-section{padding:24px 20px 20px;}
.price-type{
  font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:5px;
}
.price-figure{
  font-size:34px;font-weight:700;color:var(--ink);
  letter-spacing:-0.03em;line-height:1;
}
.price-on-req{
  font-size:20px;font-weight:300;color:var(--ink-muted);font-style:italic;
}

/* ── AGENT — credible, calm ── */
.agent-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.agent-photo{
  width:48px;height:48px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:var(--warm);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.agent-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.agent-initial{font-size:17px;font-weight:600;color:var(--teal);}
.agent-details{flex:1;min-width:100px;}
.agent-name{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.agent-sub{font-size:12px;color:var(--ink-muted);}
/* Quiet verification — no pill */
.agent-verified{color:var(--ink-muted);font-size:11px;font-weight:400;}
.btn-contact{
  display:flex;align-items:center;gap:8px;
  padding:11px 18px;
  background:#1A9E50;color:#fff;
  font-size:13px;font-weight:600;
  text-decoration:none;border-radius:3px;
  transition:background 0.2s;white-space:nowrap;flex-shrink:0;
}
.btn-contact:hover{background:#168C45;}
@media(max-width:460px){.btn-contact{width:100%;justify-content:center;margin-top:4px;}}

/* TITLE + LOCATION */
.listing-header{padding:24px 20px 0;}
.l-type{
  font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:8px;
}
.l-title{
  font-size:clamp(20px,3.5vw,26px);font-weight:700;
  color:var(--ink);line-height:1.25;letter-spacing:-0.02em;margin-bottom:10px;
}
.l-location{
  display:flex;align-items:center;gap:6px;
  font-size:14px;color:var(--ink-muted);
}

/* DESCRIPTION — breathing room */
.l-desc-section{padding:24px 20px;border-top:1px solid var(--border);margin-top:24px;}
.l-desc{font-size:15px;font-weight:300;color:var(--ink-soft);line-height:1.95;}



/* SPECS */
.specs-section{padding:24px 20px;border-bottom:1px solid var(--border);}
.specs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.spec-card{
  padding:14px 8px;
  background:var(--warm);
  border:1px solid var(--border);
  text-align:center;
}
.spec-val{font-size:22px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-0.02em;}
.spec-key{font-size:9px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:4px;}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;}
.tag-pill{
  font-size:11px;font-weight:400;padding:5px 12px;
  border-radius:20px;background:var(--white);
  border:1px solid var(--border);color:var(--ink-soft);
}

/* LANDMARKS — Nearby label kept for clarity */
.landmarks-section{padding:24px 20px;border-bottom:1px solid var(--border);}
.nearby-label{
  font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:14px;
}
.landmark-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;
}
.landmark-row:last-child{border-bottom:none;}
.landmark-name{color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
.landmark-name::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ink-muted);flex-shrink:0;}
.landmark-dist{color:var(--ink-muted);font-size:13px;font-weight:400;}

/* MEDIA */
.media-section{border-bottom:1px solid var(--border);}
.media-grid{display:grid;grid-template-columns:1fr 1fr;min-height:340px;}
.media-grid.no-video{grid-template-columns:1fr;}
.media-video{position:relative;background:var(--ink);overflow:hidden;border-right:1px solid var(--border);}
.media-map{position:relative;background:#D4E4D4;overflow:hidden;border:1px solid var(--border);}
.video-cover{position:absolute;inset:0;cursor:pointer;z-index:2;}
.video-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.video-cover-overlay{
  position:absolute;inset:0;background:rgba(20,28,32,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  transition:background 0.25s;
}
.video-cover-overlay:hover{background:rgba(20,28,32,0.45);}
.play-btn{
  width:60px;height:60px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all 0.2s;
}
.video-cover-overlay:hover .play-btn{background:var(--teal);border-color:var(--teal);}
.play-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:0.1em;text-transform:uppercase;}
.map-iframe{width:100%;height:100%;border:none;display:block;}
.map-ph{width:100%;height:100%;background:#D4E4D4;display:flex;align-items:center;justify-content:center;}
.map-lbl{
  position:absolute;bottom:8px;left:8px;z-index:2;
  background:rgba(20,28,32,0.8);color:rgba(255,255,255,0.75);
  font-size:9px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;
  padding:4px 10px;backdrop-filter:blur(8px);pointer-events:none;
}
.media-labels{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--border);
}
.media-lbl{
  padding:9px 16px;font-size:9px;font-weight:400;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--ink-muted);background:var(--warm);
}
.media-lbl+.media-lbl{border-left:1px solid var(--border);}

/* DOWNLOAD */
.dl-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.btn-dl{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;
  background:var(--ink);color:#fff;
  font-size:13px;font-weight:500;
  text-decoration:none;border-radius:3px;transition:opacity 0.2s;letter-spacing:0.04em;
}
.btn-dl:hover{opacity:0.85;}

/* FOOTER */
.listing-footer{
  padding:18px 20px 32px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
}
.footer-note{font-size:12px;color:var(--ink-muted);}
.footer-disc{font-size:11px;color:var(--ink-muted);font-style:italic;}

/* MOBILE */
@media(max-width:600px){
  .gallery-stage{height:72vw;min-height:240px;}
  .media-grid{grid-template-columns:1fr;min-height:auto;}
  .media-video{min-height:220px;border-right:none;border-bottom:1px solid var(--border);}
  .media-map{min-height:200px;}
  .specs-grid{grid-template-columns:repeat(2,1fr);}
  .price-figure{font-size:28px;}
  .l-title{font-size:20px;}
}
</style>
</head>

      <p class="media-lbl"><span class="lo-i">ແຜນທີ່</span><span class="en-i">Map</span><span class="zh-i">地图</span></p>
    </div>

<script>
const SB='https://eoladhcljbpbhnrmmpev.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';
const BASE='https://pintag-cyrora.github.io/pintag';
const slug=new URLSearchParams(location.search).get('slug');
let imgs=[],idx=0;

// ── AUTO AGENT PHOTO by name ──
function getAgentPhoto(name){
  if(!name)return null;
  const n=name.toLowerCase().trim();
  const map={
    'keomany':'agent-keomany.jpg',
    'tik':'agent-tik.jpg',
    'ທິກ':'agent-tik.jpg',
    'ແກ້ວມະນີ':'agent-keomany.jpg',
  };
  // Check exact match first
  if(map[n])return`${BASE}/${map[n]}`;
  // Check if name contains known agent name
  for(const[k,v]of Object.entries(map)){
    if(n.includes(k)||k.includes(n))return`${BASE}/${v}`;
  }
  // Fall back to stored URL if available
  return null;
}

// ── SHARE ──
async function shareList(){
  const title = document.getElementById('l-title')?.textContent||'Pintag · Property';
  const url = window.location.href;
  if(navigator.share){
    try{
      await navigator.share({title,text:`ເບິ່ງລາຍການນີ້ໃນ Pintag · ${title}`,url});
    }catch(e){}
  } else {
    try{
      await navigator.clipboard.writeText(url);
      const btn = document.querySelector('.g-share-btn');
      if(btn){
        btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(()=>{btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';},1500);
      }
    }catch(e){}
  }
}

async function loadProperty(){
  if(!slug){location.href='listings.html';return;}
  const r=await fetch(`${SB}/rest/v1/properties?slug=eq.${encodeURIComponent(slug)}&limit=1`,{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  });
  const d=await r.json();
  if(!d||!d[0]){location.href='listings.html';return;}
  render(d[0]);
  document.getElementById('loading').style.display='none';
  document.getElementById('page').style.display='block';
}

function fmtDate(s){
  if(!s)return'';
  const d=new Date(s);
  const m=['ມ.ກ','ກ.ພ','ມ.ນ','ເ.ສ','ພ.ພ','ມິ.ຖ','ກ.ລ','ສ.ຫ','ກ.ຍ','ຕ.ລ','ພ.ຈ','ທ.ວ'];
  return`${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}

function render(p){
  document.title='Pintag · '+(p.title_en||'Property');

  // OG meta tags
  const pageUrl=`${BASE}/listing.html?slug=${encodeURIComponent(p.slug||'')}`;
  const ogImg=p.images&&p.images[0]?p.images[0]:`${BASE}/pintag-hero.png`;
  const ogTitle=(p.title_en||p.title_lo||'Property')+' · Pintag';
  const ogDesc=`${p.price_display||'Price on request'} · ${p.district_en||p.district_lo||'Vientiane'} · pintag.io`;
  document.getElementById('og-title').content=ogTitle;
  document.getElementById('og-desc').content=ogDesc;
  document.getElementById('og-image').content=ogImg;
  document.getElementById('og-url').content=pageUrl;
  document.title=ogTitle;

  const txLo=p.transaction_type==='for_sale'?'ຂາຍ':'ໃຫ້ເຊົ່າ';
  const txEn=p.transaction_type==='for_sale'?'For Sale':'For Rent';
  const txZh=p.transaction_type==='for_sale'?'出售':'租房';
  const waN=(p.whatsapp||'').replace(/[^0-9]/g,'');
  const waM=encodeURIComponent(`ສະບາຍດີ, ຂ້ອຍເຫັນລາຍການ Pintag: ${p.title_en||''} — ຢາກສອບຖາມ`);
  const waU=`https://wa.me/${waN}?text=${waM}`;
  const agName=p.agent_name||'Agent';

  // ── GALLERY ──
  imgs=p.images&&p.images.length?p.images:[];
  const stage=document.getElementById('g-stage');
  if(imgs.length){
    document.getElementById('g-no-img').style.display='none';
    // Build crossfade images
    imgs.forEach((src,i)=>{
      const img=document.createElement('img');
      img.className='g-img'+(i===0?' active':'');
      img.src=src;img.alt=`Photo ${i+1}`;
      stage.insertBefore(img,stage.querySelector('.gallery-ui'));
    });
    // Counter
    if(imgs.length>1){
      document.getElementById('g-counter').style.display='block';
      document.getElementById('g-counter').textContent=`1 / ${imgs.length}`;
      document.getElementById('g-prev').style.display='flex';
      document.getElementById('g-next').style.display='flex';
      // Progress bars
      const pb=document.getElementById('g-progress');
      pb.style.display='flex';
      imgs.forEach((_,i)=>{
        const bar=document.createElement('div');
        bar.className='g-bar'+(i===0?' active':'');
        bar.onclick=()=>goTo(i);
        pb.appendChild(bar);
      });
    }
    // Touch swipe
    let tx=0;
    stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
    stage.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-tx;
      if(Math.abs(dx)>40){dx<0?gNext():gPrev();}
    },{passive:true});
  }

  // Status
  const st=p.status==='available'?
    '<span class="lo-i">ວ່າງ</span><span class="en-i">Available</span><span class="zh-i">可用</span>':
    (p.status||'');
  document.getElementById('s-text').innerHTML=st;

  // Language tabs — hide empty
  document.querySelectorAll('.lang-tab').forEach(tab=>{
    const l=tab.dataset.lang;
    if(l==='en'&&!p.title_en&&!p.desc_en)tab.style.display='none';
    if(l==='zh'&&!p.title_zh&&!p.desc_zh)tab.style.display='none';
  });

  // Price
  document.getElementById('pb-type').innerHTML=
    `<span class="lo-i">${txLo}</span><span class="en-i">${txEn}</span><span class="zh-i">${txZh}</span>`;
  const pe=document.getElementById('pb-price');
  if(p.price_display){pe.textContent=p.price_display;}
  else{pe.className='price-on-req';pe.innerHTML='<span class="lo-i">ສອບຖາມລາຄາ</span><span class="en-i">Price on request</span><span class="zh-i">价格面议</span>';}

  // ── AGENT — auto photo by name ──
  document.getElementById('agent-name-el').textContent=agName;
  document.getElementById('agent-initial').textContent=agName.charAt(0).toUpperCase();
  // Try auto-match first, then stored URL
  const photoUrl=getAgentPhoto(agName)||p.agent_photo_url||null;
  if(photoUrl){
    const av=document.getElementById('agent-photo');
    av.innerHTML=`<img src="${photoUrl}" alt="${agName}" onerror="this.parentElement.innerHTML='<span class=\\'agent-initial\\'>${agName.charAt(0).toUpperCase()}</span>'">`;
  }
  document.getElementById('btn-contact').href=waU;
  document.getElementById('contact-label').textContent=`ຕິດຕໍ່ ${agName}`;

  // WA buttons
  document.getElementById('sticky-wa-link').href=waU;
  document.getElementById('sticky-wa-text').textContent=`ຕິດຕໍ່ ${agName} · WhatsApp`;

  // Title + location
  document.getElementById('l-type').innerHTML=
    `<span class="lo-i">${txLo}</span><span class="en-i">${txEn}</span><span class="zh-i">${txZh}</span>`;
  document.getElementById('l-title').innerHTML=
    `<span class="lo-i">${p.title_lo||p.title_en||''}</span><span class="en-i">${p.title_en||''}</span><span class="zh-i">${p.title_zh||p.title_en||''}</span>`;
  document.getElementById('l-loc').innerHTML=
    `<span class="lo-i">${p.district_lo||''}, ວຽງຈັນ</span><span class="en-i">${p.district_en||''}, Vientiane</span><span class="zh-i">${p.district_zh||''}, 万象</span>`;

  // Description
  document.getElementById('l-desc').innerHTML=
    `<span class="lo">${p.desc_lo||p.desc_en||''}</span><span class="en">${p.desc_en||''}</span><span class="zh">${p.desc_zh||p.desc_en||''}</span>`;

  // Specs
  const sg=document.getElementById('specs-grid');
  const si=[];
  if(p.bedrooms)si.push({v:p.bedrooms,k:'<span class="lo-i">ຫ້ອງນອນ</span><span class="en-i">Beds</span><span class="zh-i">卧室</span>'});
  if(p.bathrooms)si.push({v:p.bathrooms,k:'<span class="lo-i">ຫ້ອງນ້ຳ</span><span class="en-i">Baths</span><span class="zh-i">浴室</span>'});
  if(p.sqm)si.push({v:p.sqm,k:'SQM'});
  if(p.floors)si.push({v:p.floors,k:'<span class="lo-i">ຊັ້ນ</span><span class="en-i">Floors</span><span class="zh-i">层</span>'});
  if(si.length){
    document.getElementById('specs-section').style.display='block';
    sg.style.gridTemplateColumns=`repeat(${Math.min(si.length,4)},1fr)`;
    si.forEach(s=>sg.innerHTML+=`<div class="spec-card"><p class="spec-val">${s.v}</p><p class="spec-key">${s.k}</p></div>`);
    const tags=[];
    if(p.furnished==='fully')tags.push('<span class="lo-i">ເຄື່ອງເຟີນີເຈີຄົບ</span><span class="en-i">Fully Furnished</span><span class="zh-i">全配家具</span>');
    if(p.furnished==='partially')tags.push('<span class="lo-i">ບາງສ່ວນ</span><span class="en-i">Part Furnished</span><span class="zh-i">部分家具</span>');
    if(p.parking)tags.push('<span class="lo-i">ທີ່ຈອດລົດ ✓</span><span class="en-i">Parking ✓</span><span class="zh-i">停车位 ✓</span>');
    if(p.pool)tags.push('<span class="lo-i">ສະລອຍນ້ຳ ✓</span><span class="en-i">Pool ✓</span><span class="zh-i">泳池 ✓</span>');
    const tr=document.getElementById('tags-row');
    tags.forEach(t=>tr.innerHTML+=`<span class="tag-pill">${t}</span>`);
  }

  // Landmarks
  if(p.landmarks&&p.landmarks.length){
    document.getElementById('landmarks-section').style.display='block';
    const ll=document.getElementById('landmarks-list');
    p.landmarks.forEach(l=>ll.innerHTML+=
      `<div class="landmark-row">
        <span class="landmark-name">
          <span class="lo-i">${l.name_lo||l.name_en||''}</span>
          <span class="en-i">${l.name_en||l.name_lo||''}</span>
          <span class="zh-i">${l.name_zh||l.name_en||''}</span>
        </span>
        <span class="landmark-dist">${l.distance||''}</span>
      </div>`
    );
  }

  // Video
  const vb=document.getElementById('video-box');
  const vu=p.video_url||(p.video_drive_id?`https://drive.google.com/file/d/${p.video_drive_id}/view`:null);
  if(vu){
    document.getElementById('video-box').style.display='block';
    const isTT=vu.includes('tiktok.com');
    const th=imgs[0]||'';
    const pl=isTT?
      '<span class="lo-i">ເບິ່ງໃນ TikTok ↗</span><span class="en-i">Watch on TikTok ↗</span><span class="zh-i">在TikTok观看 ↗</span>':
      '<span class="lo-i">ຫຼິ້ນວິດີໂອ</span><span class="en-i">Play Video</span><span class="zh-i">播放视频</span>';
    vb.style.position='relative';
    vb.innerHTML=`
      <div class="video-cover" onclick="playVid(this,'${vu.replace(/'/g,"\\'")}')">
        ${th?`<img src="${th}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">`:
        '<div style="width:100%;height:100%;min-height:200px;background:#1A2428;"></div>'}
        <div class="video-cover-overlay">
          <div class="play-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <span class="play-label">${pl}</span>
        </div>
      </div>
      <div id="vec" style="position:absolute;inset:0;display:none;"></div>`;
  }

  // If no video, make map full width
  if(!vu && p.map_embed_url){
    const mg=document.querySelector('.media-grid');
    if(mg)mg.classList.add('no-video');
    const ml=document.querySelector('.media-labels');
    if(ml)ml.style.gridTemplateColumns='1fr';
    const ml2=document.querySelector('.media-lbl+.media-lbl');
    if(ml2)ml2.style.display='none';
  }
  // Map
  if(p.map_embed_url){
    const mf=document.getElementById('map-frame');
    mf.src=p.map_embed_url;mf.style.display='block';
    document.getElementById('map-ph').style.display='none';
    document.getElementById('map-lbl').innerHTML=
      `<span class="lo-i">${p.district_lo||''}</span><span class="en-i">${p.district_en||''}</span><span class="zh-i">${p.district_zh||''}</span>`;
  }

  // Download
  const du=p.download_url||(p.video_drive_id?`https://drive.google.com/uc?export=download&id=${p.video_drive_id}`:null);
  if(du){
    document.getElementById('dl-section').style.display='block';
    let durl=du;const m=du.match(/[-\w]{25,}/);
    if(du.includes('drive.google.com')&&m)durl=`https://drive.google.com/uc?export=download&id=${m[0]}`;
    document.getElementById('dl-btn').href=durl;
  }

  // Footer
  document.getElementById('footer-note').textContent=`${agName} · Pintag · ${fmtDate(p.created_at)}`;
}

// ── GALLERY NAVIGATION ──
function goTo(i){
  if(!imgs.length)return;
  document.querySelectorAll('.g-img')[idx]?.classList.remove('active');
  document.querySelectorAll('.g-bar')[idx]?.classList.remove('active');
  idx=(i+imgs.length)%imgs.length;
  document.querySelectorAll('.g-img')[idx]?.classList.add('active');
  document.querySelectorAll('.g-bar')[idx]?.classList.add('active');
  document.getElementById('g-counter').textContent=`${idx+1} / ${imgs.length}`;
}
function gNext(e){if(e)e.stopPropagation();goTo(idx+1);}
function gPrev(e){if(e)e.stopPropagation();goTo(idx-1);}
document.getElementById('g-stage').addEventListener('click',()=>{if(imgs.length>1)gNext();});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')gNext();
  if(e.key==='ArrowLeft')gPrev();
});

// ── VIDEO ──
function playVid(cover,url){
  if(url.includes('tiktok.com')){window.open(url,'_blank');return;}
  const h=getEmbed(url);if(!h)return;
  const c=document.getElementById('vec');
  c.innerHTML=h;c.style.cssText='display:block;position:absolute;inset:0;';
  const f=c.querySelector('iframe,video');
  if(f)f.style.cssText='width:100%;height:100%;position:absolute;inset:0;border:none;';
  cover.style.display='none';
}
function getEmbed(url){
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  if(yt)return`<iframe src="https://www.youtube.com/embed/${yt[1]}?rel=0" frameborder="0" allowfullscreen allow="autoplay;picture-in-picture"></iframe>`;
  if(url.includes('facebook.com'))return`<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&mute=0" frameborder="0" allowfullscreen allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share"></iframe>`;
  const dr=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(dr)return`<iframe src="https://drive.google.com/file/d/${dr[1]}/preview" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
  const vi=url.match(/vimeo\.com\/(\d+)/);
  if(vi)return`<iframe src="https://player.vimeo.com/video/${vi[1]}" frameborder="0" allowfullscreen></iframe>`;
  return null;
}

// ── LANGUAGE ──
function setLang(lang,btn){
  document.body.className=lang==='lo'?'':'lang-'+lang;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

loadProperty();
</script>
