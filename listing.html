<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · ລາຍລະອິດອະສັງຫາ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

:root{
  --teal:#2D8C8C;
  --teal-light:#38A8A8;
  --teal-mark:rgba(45,140,140,0.22);

  --ink:#1A2428;
  --ink-soft:#3A4E55;
  --ink-muted:#7A9098;

  --warm:#F3EFE8;
  --warm-deep:#E8E3DB;
  --white:#FFFFFF;

  --border:rgba(26,36,40,0.07);
  --border-mid:rgba(26,36,40,0.10);
  --border-strong:rgba(26,36,40,0.13);

  --wa:#1D5D9B;

  --r-btn:10px;
  --r-tag:4px;
  --r-switcher:6px;
}

body{
  font-family:"DM Sans",sans-serif;
  font-weight:400;
  font-size:15px;
  line-height:1.75;
  background-color:var(--warm);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

.lo{display:block;}
.en{display:none;}
.zh{display:none;}

.lo-i{display:inline;}
.en-i{display:none;}
.zh-i{display:none;}

body.lang-en .lo{display:none;}
body.lang-en .en{display:block;}
body.lang-en .zh{display:none;}

body.lang-en .lo-i{display:none;}
body.lang-en .en-i{display:inline;}
body.lang-en .zh-i{display:none;}

body.lang-zh .lo{display:none;}
body.lang-zh .en{display:none;}
body.lang-zh .zh{display:block;}

body.lang-zh .lo-i{display:none;}
body.lang-zh .en-i{display:none;}
body.lang-zh .zh-i{display:inline;}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:300;

  height:54px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 28px;

  background:rgba(243,239,232,0.96);

  border-bottom:1px solid var(--border-mid);
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:9px;
  text-decoration:none;
  flex-shrink:0;
}

.nav-wordmark{
  font-size:17px;
  font-weight:700;
  color:var(--ink);
}

.nav-links{
  display:flex;
  align-items:center;
  gap:24px;
}

.nav-link{
  font-size:13px;
  color:var(--ink-soft);
  text-decoration:none;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:14px;
}

.lang-switcher{
  display:flex;
  gap:3px;
  background:var(--warm-deep);
  padding:3px;
  border-radius:var(--r-switcher);
}

.lang-btn{
  font-family:"DM Sans",sans-serif;
  font-size:10px;
  font-weight:700;
  padding:4px 10px;
  border:none;
  background:transparent;
  color:var(--ink-muted);
  cursor:pointer;
  border-radius:var(--r-tag);
}

.lang-btn.active{
  background:var(--ink);
  color:var(--white);
}

.g-wrap{
  max-width:1280px;
  margin:54px auto 0;
  background:var(--white);
}

.hero-section{
  display:grid;
  grid-template-columns:320px 1fr;
  min-height:580px;
}

.hero-left{
  padding:32px 24px 32px 36px;
  border-right:1px solid var(--border-mid);
  display:flex;
  flex-direction:column;
}

.hero-right{
  overflow:hidden;
}

.info-title{
  font-size:30px;
  font-weight:700;
  line-height:1.2;
  margin-bottom:14px;
}

.price-value{
  font-size:28px;
  font-weight:700;
}

.spec-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px 6px;
  margin-top:24px;
}

.spec-item{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.spec-val{
  font-size:14px;
  font-weight:700;
}

.spec-lbl{
  font-size:10px;
  color:var(--ink-muted);
}

.desktop-gallery{
  display:flex;
  flex-direction:column;
  height:100%;
}

.dg-hero{
  flex:1;
  position:relative;
  background:var(--warm-deep);
}

.dg-hero img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:var(--warm-deep);
  display:block;
}

.dg-rail{
  display:flex;
  gap:2px;
  height:88px;
  background:var(--ink);
}

.dg-thumb{
  flex:1;
  overflow:hidden;
  opacity:0.46;
  cursor:pointer;
}

.dg-thumb.active{
  opacity:1;
}

.dg-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.agent-band{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:32px;
  align-items:center;

  padding:24px 40px;

  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}

.agent-identity{
  display:flex;
  align-items:center;
  gap:14px;
}

.agent-pfp{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  background:var(--warm-deep);
}

.agent-name-en{
  font-size:15px;
  font-weight:700;
}

.agent-name-lo{
  font-size:12px;
  color:var(--ink-muted);
}

.agent-ctas{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-width:220px;
}

.btn-primary{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  padding:11px 20px;

  border:none;
  border-radius:10px;

  text-decoration:none;

  font-size:13px;
  font-weight:700;

  cursor:pointer;
}

.btn-wa{
  background:var(--wa);
  color:white;
}

.btn-wa:hover{
  background:#174B7A;
}

.btn-call{
  background:transparent;
  border:1px solid var(--border-strong);
  color:var(--ink);
}

.detail-wrap{
  padding:40px;
}

.section-label{
  font-size:15px;
  font-weight:700;
  margin-bottom:16px;
}

.body-narrative{
  line-height:1.9;
  color:var(--ink-soft);
  white-space:pre-line;
}

.features-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.feature-item{
  display:flex;
  align-items:center;
  gap:10px;
}

.mobile-gallery{
  display:none;
}

@media(max-width:960px){

  .hero-section{
    grid-template-columns:1fr;
  }

  .hero-left{
    border-right:none;
  }

  .hero-right{
    display:none;
  }

  .mobile-gallery{
    display:block;
  }

  .agent-band{
    grid-template-columns:1fr;
  }

  .detail-wrap{
    padding:28px 16px;
  }

  .spec-grid{
    grid-template-columns:repeat(2,1fr);
  }

}
</style>
</head>

<body>

<nav>

  <a href="index.html" class="nav-logo">

    <svg width="22" height="18" viewBox="0 0 46 38" fill="none">
      <circle cx="11" cy="10" r="8.5" fill="#38A8A8"/>
      <circle cx="27" cy="14" r="3.5" fill="#1C2B32"/>
    </svg>

    <span class="nav-wordmark">Pintag</span>

  </a>

  <div class="nav-links">
    <a href="listings.html" class="nav-link">Listings</a>
  </div>

  <div class="nav-right">

    <div class="lang-switcher">

      <button class="lang-btn active" onclick="setLang('lo',this)">ລາວ</button>

      <button class="lang-btn" onclick="setLang('en',this)">EN</button>

      <button class="lang-btn" onclick="setLang('zh',this)">中文</button>

    </div>

  </div>

</nav>

<div class="g-wrap">

  <div id="view-target"></div>

</div>

<script>

const BASE_DB='https://eoladhcljbpbhnrmmpev.supabase.co';

const SEC_KEY='YOUR_SUPABASE_ANON_KEY';

let propertyContext=null;

function fetchUrlParamSlug(){
  return new URLSearchParams(window.location.search).get('slug');
}

function getCurrentLang(){

  if(document.body.classList.contains('lang-en')) return 'en';

  if(document.body.classList.contains('lang-zh')) return 'zh';

  return 'lo';
}

function setLang(code,btn){

  document.body.className = code === 'lo' ? '' : 'lang-' + code;

  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.remove('active');
  });

  btn.classList.add('active');

  if(propertyContext){
    buildMockupLayout();
  }

}

function buildDesktopGallery(images){

  if(!images.length){
    return `
      <div class="desktop-gallery">
        <div class="dg-hero"></div>
      </div>
    `;
  }

  let thumbs='';

  images.slice(0,4).forEach(function(src,index){

    thumbs += `
      <div class="dg-thumb ${index===0?'active':''}"
           onclick="shiftDesktopHero('${src.replace(/'/g,"%27")}',this)">
        <img src="${src}">
      </div>
    `;

  });

  return `
    <div class="desktop-gallery">

      <div class="dg-hero">
        <img id="dg-hero-img" src="${images[0]}">
      </div>

      <div class="dg-rail">
        ${thumbs}
      </div>

    </div>
  `;
}

function shiftDesktopHero(src,thumb){

  const hero=document.getElementById('dg-hero-img');

  hero.src=src;

  document.querySelectorAll('.dg-thumb').forEach(function(el){
    el.classList.remove('active');
  });

  thumb.classList.add('active');
}

async function requestPropertyData(){

  const slug=fetchUrlParamSlug();

  if(!slug){
    document.getElementById('view-target').innerHTML='Missing slug';
    return;
  }

  try{

    const response=await fetch(
      BASE_DB+'/rest/v1/properties?slug=eq.'+
      encodeURIComponent(slug)+
      '&select=*',
      {
        headers:{
          apikey:SEC_KEY,
          Authorization:'Bearer '+SEC_KEY
        }
      }
    );

    const data=await response.json();

    if(!data || !data.length){

      document.getElementById('view-target').innerHTML='Listing not found';

      return;
    }

    propertyContext=data[0];

    buildMockupLayout();

  }catch(err){

    console.error(err);

    document.getElementById('view-target').innerHTML='Error loading listing';

  }

}

function buildMockupLayout(){

  const lang=getCurrentLang();

  const data=propertyContext;

  const resolvedTitle=
    data['title_'+lang] ||
    data.title_en ||
    data.title_lo ||
    'Untitled Property';

  const resolvedDesc=
    data['description_'+lang] ||
    data.description_en ||
    data.description_lo ||
    '';

  const resolvedDistrict=
    data['district_'+lang] ||
    data.district_en ||
    '';

  const imagesArray=
    data.images && data.images.length
      ? data.images
      : [];

  const specs=[];

  if(data.bedrooms){
    specs.push({
      val:data.bedrooms,
      lbl:'Beds'
    });
  }

  if(data.bathrooms){
    specs.push({
      val:data.bathrooms,
      lbl:'Baths'
    });
  }

  if(data.sqm){
    specs.push({
      val:data.sqm,
      lbl:'sqm'
    });
  }

  if(data.land_sqm){
    specs.push({
      val:data.land_sqm,
      lbl:'Land'
    });
  }

  const specGridHtml=`
    <div class="spec-grid">

      ${specs.map(function(s){

        return `
          <div class="spec-item">
            <span class="spec-val">${s.val}</span>
            <span class="spec-lbl">${s.lbl}</span>
          </div>
        `;

      }).join('')}

    </div>
  `;

  const leftHtml=`
    <div class="hero-left">

      <div style="font-size:13px;color:var(--teal);margin-bottom:10px;">
        ${resolvedDistrict}
      </div>

      <h1 class="info-title">
        ${resolvedTitle}
      </h1>

      <div class="price-value">
        ${data.price_display || 'Contact for pricing'}
      </div>

      ${specGridHtml}

    </div>
  `;

  const desktopGalleryMarkup=
    buildDesktopGallery(imagesArray);

  const statsHtml=`
    <div class="agent-stats-row">

      <div class="agent-stat">
        <div>
          <div style="font-weight:700;">Verified</div>
          <div style="font-size:12px;color:var(--ink-muted);">
            PINTAG Agent
          </div>
        </div>
      </div>

    </div>
  `;

  const agentFallback=
    'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23E8E3DB"/><text x="50%" y="55%" font-size="32" text-anchor="middle" fill="%237A9098">P</text></svg>';

  const directWhatsAppUrl=
    'https://wa.me/' +
    (data.agent_phone || '85620542966655');

  const callBtn=data.agent_phone
    ? `
      <a href="tel:${data.agent_phone}" class="btn-primary btn-call">
        Call Agent
      </a>
    `
    : '';

  const agentHtml=`
    <div class="agent-band">

      <div>

        <div class="agent-identity">

          <img
            class="agent-pfp"
            src="${data.agent_photo || ''}"
            onerror="this.src='${agentFallback}'"
          >

          <div>

            <div class="agent-name-en">
              ${data.agent_name || 'PINTAG Agent'}
            </div>

            ${
              data.agent_name_lo
                ? `<div class="agent-name-lo">${data.agent_name_lo}</div>`
                : ''
            }

          </div>

        </div>

      </div>

      ${statsHtml}

      <div class="agent-ctas">

        <a
          href="${directWhatsAppUrl}"
          target="_blank"
          class="btn-primary btn-wa"
        >
          WhatsApp
        </a>

        ${callBtn}

      </div>

    </div>
  `;

  let featuresHtml='';

  if(data.features && data.features.length){

    featuresHtml=`
      <div>

        <p class="section-label">
          Features
        </p>

        <div class="features-list">

          ${data.features.map(function(f){

            return `
              <div class="feature-item">
                • ${f}
              </div>
            `;

          }).join('')}

        </div>

      </div>
    `;
  }

  const detailHtml=`
    <div class="detail-wrap">

      <p class="section-label">
        Overview
      </p>

      <p class="body-narrative">
        ${resolvedDesc}
      </p>

      <div style="margin-top:40px;">
        ${featuresHtml}
      </div>

    </div>
  `;

  document.getElementById('view-target').innerHTML=`

    <div class="hero-section">

      ${leftHtml}

      <div class="hero-right">
        ${desktopGalleryMarkup}
      </div>

    </div>

    ${agentHtml}

    ${detailHtml}

  `;
}

requestPropertyData();

</script>

</body>
</html>
