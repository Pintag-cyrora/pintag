<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · Property</title>
<!-- OG tags injected by Cloudflare Worker -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;--teal-dim:rgba(45,140,140,0.08);
  --ink:#1A2428;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--white:#FFFFFF;
  --border:rgba(26,36,40,0.07);--border-teal:rgba(45,140,140,0.18);
}
body{font-family:'DM Sans',sans-serif;font-weight:400;font-size:16px;line-height:1.75;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* LANGUAGE */
.lo{display:block;}.en{display:none;}.zh{display:none;}
.lo-i{display:inline;}.en-i{display:none;}.zh-i{display:none;}
body.lang-en .lo{display:none;}body.lang-en .en{display:block;}body.lang-en .zh{display:none;}
body.lang-en .lo-i{display:none;}body.lang-en .en-i{display:inline;}body.lang-en .zh-i{display:none;}
body.lang-zh .lo{display:none;}body.lang-zh .en{display:none;}body.lang-zh .zh{display:block;}
body.lang-zh .lo-i{display:none;}body.lang-zh .en-i{display:none;}body.lang-zh .zh-i{display:inline;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:54px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(26,36,40,0.05);
}
.nav-logo{display:flex;align-items:center;gap:6px;text-decoration:none;}
.nav-wordmark{
  font-size:18px;font-weight:800;color:#1C2B32;
  letter-spacing:-0.02em;line-height:1;
}
.nav-back{
  font-size:12px;font-weight:500;color:var(--ink-muted);
  text-decoration:none;display:flex;align-items:center;gap:4px;
  transition:color 0.2s;letter-spacing:0.04em;text-transform:uppercase;
}
.nav-back:hover{color:var(--teal);}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:ldot 1.2s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── GALLERY — immersive, no thumbnails ── */
.gallery{
  margin-top:54px;
  position:relative;
  background:var(--ink);
  overflow:hidden;
}
.gallery-stage{
  position:relative;
  height:72vw;
  min-height:300px;
  max-height:580px;
  overflow:hidden;
  cursor:pointer;
  user-select:none;
}
/* Crossfade stack */
.g-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  opacity:0;
  transition:opacity 0.4s ease;
  pointer-events:none;
  display:block;
}
.g-img.active{opacity:1;}
.gallery-no-img{
  width:100%;height:100%;
  background:#2A3A35;
  display:flex;align-items:center;justify-content:center;
}

/* Gallery overlay — counter + status only */
.gallery-ui{
  position:absolute;bottom:0;left:0;right:0;
  padding:40px 16px 14px;
  background:linear-gradient(to top,rgba(20,28,32,0.55) 0%,transparent 100%);
  display:flex;align-items:flex-end;justify-content:space-between;
  z-index:2;pointer-events:none;
}
.g-counter{
  font-size:12px;font-weight:400;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.08em;
}
.g-status{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.92);
  padding:4px 10px;
  font-size:10px;font-weight:500;
  color:var(--teal);letter-spacing:0.06em;
  pointer-events:all;
}
.s-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--teal);
  animation:ldot 2s ease-in-out infinite;
}

/* Progress bar — replaces thumbnail strip */
.gallery-progress{
  display:flex;gap:3px;
  padding:0 16px;
  background:var(--ink);
  height:3px;
}
.g-bar{
  flex:1;height:3px;
  background:rgba(255,255,255,0.18);
  cursor:pointer;
  transition:background 0.25s;
}
.g-bar.active{background:rgba(255,255,255,0.75);}

/* Share button */
.g-share-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.15);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;
  backdrop-filter:blur(8px);
}
.g-share-btn:hover{background:rgba(255,255,255,0.25);}

/* Nav arrows — subtle */
.g-btn{
  position:absolute;top:50%;transform:translateY(-50%);z-index:3;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  font-size:20px;color:rgba(255,255,255,0.85);line-height:1;
  backdrop-filter:blur(8px);
}
.g-btn:hover{background:rgba(255,255,255,0.26);border-color:rgba(255,255,255,0.4);transform:translateY(-50%) scale(1.05);}
.g-btn.prev{left:12px;}
.g-btn.next{right:12px;}

/* ── LANGUAGE TABS — calm ── */
.lang-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--white);
  position:sticky;top:54px;z-index:200;
}
.lang-tab{
  flex:1;padding:13px 8px;
  text-align:center;font-size:13px;font-weight:400;
  color:var(--ink-muted);cursor:pointer;border:none;background:transparent;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;font-family:'DM Sans',sans-serif;
  letter-spacing:0.04em;
}
.lang-tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}

/* STICKY WA — mobile only */
.sticky-wa{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  padding:8px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,0.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
  display:none;
}
.sticky-wa a{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px;
  background:#1A9E50;color:#fff;
  font-size:14px;font-weight:600;
  text-decoration:none;border-radius:4px;letter-spacing:0.02em;
  transition:background 0.2s;
  box-shadow:0 2px 12px rgba(26,158,80,0.25);
}
.sticky-wa a:active{background:#168C45;}
@media(max-width:800px){.sticky-wa{display:block;}body{padding-bottom:66px;}}

/* CONTENT */
.content{max-width:780px;margin:0 auto;}

/* PRICE */
.price-section{padding:28px 20px 22px;}
.price-type{
  font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--teal);margin-bottom:6px;
}
.price-figure{
  font-size:36px;font-weight:700;color:var(--ink);
  letter-spacing:-0.03em;line-height:1;
}
.price-on-req{
  font-size:20px;font-weight:300;color:var(--ink-muted);font-style:italic;
}

/* ── AGENT — credible, calm ── */
.agent-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.agent-photo{
  width:48px;height:48px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:var(--warm);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.agent-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.agent-initial{font-size:17px;font-weight:600;color:var(--teal);}
.agent-details{flex:1;min-width:100px;}
.agent-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;letter-spacing:-0.01em;}
.agent-sub{font-size:11px;font-weight:400;color:var(--ink-muted);letter-spacing:0.02em;}
/* Quiet verification — no pill */
.agent-verified{color:var(--ink-muted);font-size:11px;font-weight:400;}
.btn-contact{
  display:flex;align-items:center;gap:8px;
  padding:11px 18px;
  background:#1A9E50;color:#fff;
  font-size:13px;font-weight:600;
  text-decoration:none;border-radius:3px;
  transition:background 0.2s;white-space:nowrap;flex-shrink:0;
}
.btn-contact:hover{background:#168C45;}
@media(max-width:800px){.btn-contact{display:none;}}

/* TITLE + LOCATION */
.listing-header{padding:28px 20px 0;}
.l-type{
  font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:8px;
}
.l-title{
  font-size:clamp(21px,3.5vw,28px);font-weight:700;
  color:var(--ink);line-height:1.2;letter-spacing:-0.025em;margin-bottom:12px;
}
.l-location{
  display:flex;align-items:center;gap:6px;
  font-size:14px;font-weight:400;color:var(--ink-soft);letter-spacing:0.01em;
}

/* DESCRIPTION — breathing room */
.l-desc-section{padding:28px 20px;border-top:1px solid var(--border);margin-top:28px;}
.l-desc{font-size:15px;font-weight:400;color:var(--ink-soft);line-height:2.0;letter-spacing:0.01em;}



/* SPECS */
.specs-section{padding:24px 20px;border-bottom:1px solid var(--border);}
.specs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.spec-card{
  padding:16px 8px;
  background:var(--warm);
  border:1px solid rgba(26,36,40,0.06);
  text-align:center;
  border-radius:3px;
}
.spec-val{font-size:22px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-0.02em;}
.spec-key{font-size:9px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:4px;}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;}
.tag-pill{
  font-size:11px;font-weight:400;padding:5px 12px;
  border-radius:20px;background:var(--white);
  border:1px solid var(--border);color:var(--ink-soft);
}

/* LANDMARKS — Nearby label kept for clarity */
.landmarks-section{padding:24px 20px;border-bottom:1px solid var(--border);}
.nearby-label{
  font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-muted);margin-bottom:14px;
}
.landmark-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;
}
.landmark-row:last-child{border-bottom:none;}
.landmark-name{color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
.landmark-name::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ink-muted);flex-shrink:0;}
.landmark-dist{color:var(--ink-muted);font-size:13px;font-weight:400;}

/* MEDIA */
.media-section{border-bottom:1px solid var(--border);}
.media-grid{display:grid;grid-template-columns:1fr 1fr;min-height:340px;}
.media-grid.no-video{grid-template-columns:1fr;}
.media-video{position:relative;background:var(--ink);overflow:hidden;border-right:1px solid var(--border);}
.media-map{position:relative;background:#D4E4D4;overflow:hidden;border:1px solid var(--border);}
.video-cover{position:absolute;inset:0;cursor:pointer;z-index:2;}
.video-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.video-cover-overlay{
  position:absolute;inset:0;background:rgba(20,28,32,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  transition:background 0.25s;
}
.video-cover-overlay:hover{background:rgba(20,28,32,0.45);}
.play-btn{
  width:60px;height:60px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all 0.2s;
}
.video-cover-overlay:hover .play-btn{background:var(--teal);border-color:var(--teal);}
.play-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:0.1em;text-transform:uppercase;}
.map-iframe{width:100%;height:100%;border:none;display:block;}
.map-ph{width:100%;height:100%;background:#D4E4D4;display:flex;align-items:center;justify-content:center;}
.map-lbl{
  position:absolute;bottom:8px;left:8px;z-index:2;
  background:rgba(20,28,32,0.8);color:rgba(255,255,255,0.75);
  font-size:9px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;
  padding:4px 10px;backdrop-filter:blur(8px);pointer-events:none;
}
.media-labels{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--border);
}
.media-lbl{
  padding:9px 16px;font-size:9px;font-weight:400;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--ink-muted);background:var(--warm);
}
.media-lbl+.media-lbl{border-left:1px solid var(--border);}

/* DOWNLOAD */
.dl-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.btn-dl{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;
  background:var(--ink);color:#fff;
  font-size:13px;font-weight:500;
  text-decoration:none;border-radius:3px;transition:opacity 0.2s;letter-spacing:0.04em;
}
.btn-dl:hover{opacity:0.85;}

/* FOOTER */
.listing-footer{
  padding:18px 20px 32px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
}
.footer-note{font-size:12px;color:var(--ink-muted);}
.footer-disc{font-size:11px;color:var(--ink-muted);font-style:italic;}

/* MOBILE */
@media(max-width:600px){
  .gallery-stage{height:72vw;min-height:240px;}
  .media-grid{grid-template-columns:1fr;min-height:auto;}
  .media-video{min-height:220px;border-right:none;border-bottom:1px solid var(--border);}
  .media-map{min-height:200px;}
  .specs-grid{grid-template-columns:repeat(2,1fr);}
  .price-figure{font-size:28px;}
  .l-title{font-size:20px;}
}

/* PREMIUM MOTION — subtle, calm, intentional */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.fade-up{
  animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both;
}
.fade-up-1{animation-delay:0.05s;}
.fade-up-2{animation-delay:0.1s;}
.fade-up-3{animation-delay:0.15s;}
.fade-up-4{animation-delay:0.2s;}
.fade-up-5{animation-delay:0.25s;}

/* Image loading — smooth reveal */
.g-img{transition:opacity 0.45s cubic-bezier(0.4,0,0.2,1);}

/* Spec card hover */
.spec-card{transition:transform 0.2s ease,box-shadow 0.2s ease;}
.spec-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,36,40,0.06);}

/* Landmark row hover */
.landmark-row{transition:background 0.15s ease;border-radius:3px;padding-left:4px;padding-right:4px;}
.landmark-row:hover{background:var(--warm);}

/* Tag pill hover */
.tag-pill{transition:all 0.15s ease;}
.tag-pill:hover{border-color:var(--teal);color:var(--teal);}

@media(prefers-reduced-motion:reduce){
  .fade-up,.g-img,.spec-card,.landmark-row,.tag-pill{animation:none;transition:none;}
}
</style>
</head>

      <p class="agent-sub">Pintag · ວຽງຈັນ</p>

const SB='https://eoladhcljbpbhnrmmpev.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';

// ── NORMALIZE — defensive data layer ──
function normalizeProperty(p){
  if(!p||typeof p!=='object') return null;
  return {
    ...p,
    images: Array.isArray(p.images) ? p.images : (typeof p.images==='string' ? tryParseJSON(p.images) : []),
    landmarks: Array.isArray(p.landmarks) ? p.landmarks : (typeof p.landmarks==='string' ? tryParseJSON(p.landmarks) : []),
    title_en: p.title_en||'',
    title_lo: p.title_lo||'',
    title_zh: p.title_zh||'',
    desc_en: p.desc_en||'',
    desc_lo: p.desc_lo||'',
    desc_zh: p.desc_zh||'',
    district_en: p.district_en||'',
    district_lo: p.district_lo||'',
    district_zh: p.district_zh||'',
    price_display: p.price_display||'',
    agent_name: p.agent_name||'Agent',
    whatsapp: p.whatsapp||'',
    status: p.status||'available',
    transaction_type: p.transaction_type||'for_sale',
    slug: p.slug||''
  };
}

function tryParseJSON(str){
  try{ const r=JSON.parse(str); return Array.isArray(r)?r:[]; }catch(e){ return []; }
}

// Sanitize agent-entered text before innerHTML injection
function safeText(str){
  const d=document.createElement('div');
  d.textContent=str||'';
  return d.innerHTML;
}

// ── AUTO AGENT PHOTO by name ──
function getAgentPhoto(name){
  if(!name) return null;
  const n=name.toLowerCase().trim();
  const map={
    'keomany':'agent-keomany.jpg',
    'tik':'agent-tik.jpg',
    'ທິກ':'agent-tik.jpg',
    'ແກ້ວມະນີ':'agent-keomany.jpg',
  };
  if(map[n]) return BASE+'/'+map[n];
  for(const k in map){ if(n.includes(k)||k.includes(n)) return BASE+'/'+map[k]; }
  return null;
}

// ── LOAD ──
function showError(loading, isTimeout){
  const msg = isTimeout
    ? 'ການໂຫຼດໃຊ້ເວລາດົນເກີນໄປ · Connection timed out'
    : 'ບໍ່ສາມາດໂຫຼດໄດ້ · Unable to load listing';
  loading.innerHTML =
    '<div style="padding:40px 24px;text-align:center;font-family:DM Sans,sans-serif;max-width:320px;margin:0 auto;">' +
      '<p style="color:#7A9098;font-size:14px;line-height:1.7;margin-bottom:20px;">'+msg+'</p>' +
      '<button onclick="location.reload()" style="padding:10px 24px;background:#2D8C8C;color:#fff;border:none;border-radius:3px;font-size:14px;font-family:DM Sans,sans-serif;cursor:pointer;margin-bottom:12px;display:block;width:100%;">↺ ລອງໃໝ່ · Retry</button>' +
      '<a href="listings.html" style="color:#7A9098;font-size:13px;text-decoration:none;display:block;">← ກັບຄືນ · Back to listings</a>' +
    '</div>';
}

async function loadProperty(){
  const loading=document.getElementById('loading');
  const page=document.getElementById('page');
  const controller=new AbortController();
  const timer=setTimeout(function(){
    controller.abort();
  }, 8000);
  try{
    if(!slug) throw new Error('No slug');
    const r=await fetch(
      SB+'/rest/v1/properties?slug=eq.'+encodeURIComponent(slug)+'&limit=1',
      { headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}, signal:controller.signal }
    );
    clearTimeout(timer);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(!d||!d[0]) throw new Error('Not found');
    const p=normalizeProperty(d[0]);
    if(!p) throw new Error('Invalid data');
    render(p);
    loading.style.display='none';
    page.style.display='block';
  }catch(err){
    clearTimeout(timer);
    console.error('Pintag load error:',err.message);
    const isTimeout = err.name==='AbortError';
    showError(loading, isTimeout);
  }
}

function fmtDate(s){
  if(!s) return '';
  try{
    const d=new Date(s);
    const m=['ມ.ກ','ກ.ພ','ມ.ນ','ເ.ສ','ພ.ພ','ມິ.ຖ','ກ.ລ','ສ.ຫ','ກ.ຍ','ຕ.ລ','ພ.ຈ','ທ.ວ'];
    return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
  }catch(e){ return ''; }
}

        imgs.forEach(function(_,i){
          const bar=document.createElement('div');
          bar.className='g-bar'+(i===0?' active':'');
          bar.onclick=function(){ goTo(i); };
          pb.appendChild(bar);
        });
      }
      let tx=0;
      stage.addEventListener('touchstart',function(e){ tx=e.touches[0].clientX; },{passive:true});
      stage.addEventListener('touchend',function(e){
        const dx=e.changedTouches[0].clientX-tx;
        if(Math.abs(dx)>40){ dx<0?gNext():gPrev(); }

    // Specs

// ── GALLERY NAV ──
function goTo(i){
  if(!imgs.length) return;
  document.querySelectorAll('.g-img')[idx] && document.querySelectorAll('.g-img')[idx].classList.remove('active');
  document.querySelectorAll('.g-bar')[idx] && document.querySelectorAll('.g-bar')[idx].classList.remove('active');
  idx=(i+imgs.length)%imgs.length;
  document.querySelectorAll('.g-img')[idx] && document.querySelectorAll('.g-img')[idx].classList.add('active');
  document.querySelectorAll('.g-bar')[idx] && document.querySelectorAll('.g-bar')[idx].classList.add('active');
  document.getElementById('g-counter').textContent=(idx+1)+' / '+imgs.length;
}
function gNext(e){ if(e)e.stopPropagation(); goTo(idx+1); }
function gPrev(e){ if(e)e.stopPropagation(); goTo(idx-1); }
document.getElementById('g-stage').addEventListener('click',function(){ if(imgs.length>1) gNext(); });
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight') gNext();
  if(e.key==='ArrowLeft') gPrev();
});

// ── VIDEO ──
function playVid(cover,url){
  if(url.includes('tiktok.com')){ window.open(url,'_blank'); return; }
  var h=getEmbed(url); if(!h) return;
  var c=document.getElementById('vec');
  c.innerHTML=h; c.style.cssText='display:block;position:absolute;inset:0;';
  var f=c.querySelector('iframe,video');
  if(f) f.style.cssText='width:100%;height:100%;position:absolute;inset:0;border:none;';
  cover.style.display='none';
}
function getEmbed(url){
  var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  if(yt) return '<iframe src="https://www.youtube.com/embed/'+yt[1]+'?rel=0" frameborder="0" allowfullscreen allow="autoplay;picture-in-picture"></iframe>';
  if(url.includes('facebook.com')) return '<iframe src="https://www.facebook.com/plugins/video.php?href='+encodeURIComponent(url)+'&show_text=false&mute=0" frameborder="0" allowfullscreen allow="autoplay;clipboard-write;encrypted-media;picture-in-picture;web-share"></iframe>';
  var dr=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(dr) return '<iframe src="https://drive.google.com/file/d/'+dr[1]+'/preview" frameborder="0" allow="autoplay" allowfullscreen></iframe>';
  var vi=url.match(/vimeo\.com\/(\d+)/);
  if(vi) return '<iframe src="https://player.vimeo.com/video/'+vi[1]+'" frameborder="0" allowfullscreen></iframe>';
  return null;
}

// ── SHARE ──
async function shareList(){
  var titleEl=document.getElementById('l-title');
  var title=titleEl?titleEl.textContent:'Pintag';
  var url=window.location.href;
  if(navigator.share){
    try{ await navigator.share({title:title,url:url}); }catch(e){}
  } else {
    try{
      await navigator.clipboard.writeText(url);
      var btn=document.querySelector('.g-share-btn');
      if(btn){ btn.style.background='rgba(45,140,140,0.5)'; setTimeout(function(){ btn.style.background=''; },1500); }
    }catch(e){}
  }
}

// ── LANGUAGE ──
function setLang(lang,btn){
  document.body.className=lang==='lo'?'':'lang-'+lang;
  document.querySelectorAll('.lang-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}
