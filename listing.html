<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · ລາຍລະອຽດອະສັງຫາ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A2428; --ink-muted: #7A9098; --warm: #F3EFE8; 
    --border: rgba(26,36,40,0.07); --wa: #25D366; --teal: #2D8C8C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background-color: var(--warm); color: var(--ink); line-height: 1.6; }
  
  /* Language display logic kept same */
  .lo, .lo-i { display: block; } .en, .en-i, .zh, .zh-i { display: none; }
  body.lang-en .lo { display: none; } body.lang-en .en { display: block; }
  body.lang-zh .lo { display: none; } body.lang-zh .zh { display: block; }

  /* 1. Locked Editorial Grid */
  .listing-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 48px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 40px;
    align-items: start;
  }

  /* 2. Stable Hero Container */
  .hero-box {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #E8E3DB;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 2px;
  }
  .hero-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.3s ease;
  }

  /* 3. Sidebar Anchor */
  .sidebar-column { position: sticky; top: 40px; }
  
  .agent-card {
    padding: 20px;
    border: 1px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 24px;
    border-radius: 2px;
  }
  .agent-pfp { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #eee; }

  .btn-wa {
    background: var(--wa) !important;
    color: white !important;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 2px;
    margin-top: 20px;
  }

  @media(max-width: 960px) {
    .listing-layout { grid-template-columns: 1fr; padding: 20px; }
  }
</style>
</head>
<body>

<main class="listing-layout" id="view-target">
  <div class="gallery-column">
    <div class="hero-box">
      <img id="dg-hero-img" src="" alt="Property">
    </div>
    <div id="thumb-container" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-top:10px;"></div>
  </div>

  <aside class="sidebar-column">
    <h1 id="prop-title">Loading...</h1>
    <p id="prop-price" style="font-size:20px; font-weight:700; margin-top:10px;"></p>
    
    <div class="agent-card">
      <img id="agent-pfp" class="agent-pfp" src="" alt="Agent">
      <div>
        <strong id="agent-name"></strong>
        <p style="font-size:12px; color:var(--ink-muted);">Pintag Agent</p>
      </div>
    </div>
    
    <a href="#" id="wa-link" class="btn-wa">WhatsApp</a>
  </aside>
</main>

<script>
// Original Logic Preserved
const BASE_DB='https://eoladhcljbpbhnrmmpev.supabase.co';
const SEC_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';

function fetchUrlParamSlug(){return new URLSearchParams(window.location.search).get('slug');}
function getCurrentLang(){if(document.body.classList.contains('lang-en'))return 'en';if(document.body.classList.contains('lang-zh'))return 'zh';return 'lo';}

function shiftDesktopHero(url, el) {
    const hero = document.getElementById('dg-hero-img');
    hero.style.opacity = 0;
    setTimeout(() => {
        hero.src = url;
        hero.style.opacity = 1;
    }, 150);
    
    document.querySelectorAll('.dg-thumb').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
}

async function requestPropertyData(){
  var slug=fetchUrlParamSlug();
  if(!slug) return;
  try{
    var response=await fetch(BASE_DB+'/rest/v1/properties?slug=eq.'+encodeURIComponent(slug)+'&select=*',{headers:{'apikey':SEC_KEY,'Authorization':'Bearer '+SEC_KEY}});
    var payload=await response.json();
    if(!payload||!payload.length) return;
    
    const data = payload[0];
    const lang = getCurrentLang();
    document.getElementById('prop-title').innerText = data['title_'+lang] || data.title_en || 'Property Listing';
    document.getElementById('prop-price').innerText = data.price_display || 'Inquire';
    document.getElementById('agent-name').innerText = data.agent_name || 'Agent';
    document.getElementById('agent-pfp').src = data.agent_photo || '';
    document.getElementById('wa-link').href = 'https://wa.me/' + (data.agent_phone || '85620542966655');
    
    if(data.images && data.images.length > 0) {
        document.getElementById('dg-hero-img').src = data.images[0];
        const thumbs = document.getElementById('thumb-container');
        data.images.forEach((img, i) => {
            const div = document.createElement('div');
            div.className = 'dg-thumb' + (i===0 ? ' active' : '');
            div.style.cursor = 'pointer';
            div.innerHTML = `<img src="${img}" style="width:100%; height:60px; object-fit:cover;">`;
            div.onclick = () => shiftDesktopHero(img, div);
            thumbs.appendChild(div);
        });
    }
  } catch(err) { console.error(err); }
}

requestPropertyData();
</script>
</body>
</html>
