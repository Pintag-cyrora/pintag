/* ---------------------------------- */
/* URL PARAM */
/* ---------------------------------- */

function fetchUrlParamSlug() {

  return new URLSearchParams(
    window.location.search
  ).get('slug');
}

/* ---------------------------------- */
/* LANGUAGE */
/* ---------------------------------- */

function getCurrentLang() {

  const body = document.body;

  if (!body) return 'lo';

  if (body.classList.contains('lang-en')) {
    return 'en';
  }

  if (body.classList.contains('lang-zh')) {
    return 'zh';
  }

  return 'lo';
}

function setLang(
  targetLanguageCode,
  contextBtnElement
) {

  document.body.classList.remove(
    'lang-en',
    'lang-zh'
  );

  if (targetLanguageCode !== 'lo') {

    document.body.classList.add(
      'lang-' + targetLanguageCode
    );
  }

  document
    .querySelectorAll('.lang-btn')
    .forEach(btn =>
      btn.classList.remove('active')
    );

  contextBtnElement.classList.add(
    'active'
  );

  if (propertyContext) {
    buildMockupLayout();
  }
}

/* ---------------------------------- */
/* FETCH */
/* ---------------------------------- */

async function requestPropertyData() {

  const slug =
    fetchUrlParamSlug();

  const wrapper =
    document.getElementById(
      'view-target'
    );

  if (!wrapper) {
    console.error(
      'Missing #view-target'
    );
    return;
  }

  if (!slug) {

    const msg = {
      lo:'ບໍ່ພົບລະຫັດລາຍການ',
      en:'Missing listing reference',
      zh:'缺少房源编号'
    };

    wrapper.innerHTML = `
      <div class="loader-stage">
        <h3>${msg[getCurrentLang()]}</h3>
      </div>
    `;

    return;
  }

  try {

    const cleanSlug =
      encodeURIComponent(
        slug.trim()
      );

    const response =
      await fetch(
        `${BASE_DB}/rest/v1/properties?slug=eq.${cleanSlug}&select=*`,
        {
          headers:{
            apikey:SEC_KEY,
            Authorization:
              'Bearer ' + SEC_KEY
          }
        }
      );

    const payload =
      await response.json();

    console.log(payload);

    if (
      !payload ||
      !payload.length
    ) {

      const msg = {
        lo:'ບໍ່ພົບລາຍການນີ້',
        en:'Listing not found',
        zh:'未找到该房源'
      };

      wrapper.innerHTML = `
        <div class="loader-stage">
          <h3>${msg[getCurrentLang()]}</h3>
        </div>
      `;

      return;
    }

    propertyContext =
      payload[0];

    buildMockupLayout();

  } catch(err) {

    console.error(err);

    wrapper.innerHTML = `
      <div class="loader-stage">
        <h3>Error loading property</h3>
      </div>
    `;
  }
}

/* ---------------------------------- */

        </div>

    }

    if (data.map_url) {

        <div>

          <p class="section-caption">
            Map
          </p>

          <div class="asset-iframe-wrapper">

            <iframe

/* ---------------------------------- */

/* ---------------------------------- */
/* HERO SWAP */
/* ---------------------------------- */

function shiftFocusHero(
  imageSource
) {

  const currentHeroImg =
    document.querySelector(
      '#primary-hero-frame img'
    );

  if (currentHeroImg) {

    currentHeroImg.src =
      imageSource;
  }
}

/* ---------------------------------- */
/* VIDEO EMBED */
/* ---------------------------------- */

function generateEmbeddedVideoFrame(
  url
) {

  if (!url) return null;

  if (
    url.includes(
      'youtube.com/embed/'
    )
  ) {

    return `
      <iframe
        src="${url}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  if (
    url.includes(
      'youtube.com/watch?v='
    )
  ) {

    const id =
      url
        .split('v=')[1]
        ?.split('&')[0];

    return `
      <iframe
        src="https://www.youtube.com/embed/${id}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  if (
    url.includes(
      'youtu.be/'
    )
  ) {

    const id =
      url
        .split('youtu.be/')[1]
        ?.split('?')[0];

    return `
      <iframe
        src="https://www.youtube.com/embed/${id}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  if (
    url.includes(
      'facebook.com'
    )
  ) {

    return `
      <iframe
        src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  const driveMatch =
    url.match(
      /drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/
    );

  if (driveMatch) {

    return `
      <iframe
        src="https://drive.google.com/file/d/${driveMatch[1]}/preview"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  return null;
}

/* ---------------------------------- */
/* SHARE */
/* ---------------------------------- */

async function triggerNativeShareChannel() {

  if (navigator.share) {

    try {

      await navigator.share({
        title:'Pintag',
        url:window.location.href
      });

    } catch(err) {

      console.error(err);
    }

  } else {

    try {

      await navigator.clipboard.writeText(
        window.location.href
      );

      alert('Link copied');

    } catch(err) {

      console.error(err);
    }
  }
}
