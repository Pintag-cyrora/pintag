<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;
  --ink:#1C2B32;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--warm-deep:#EDE8DF;--white:#FFFFFF;
  --border:rgba(26,36,40,0.07);--wa:#1A9E50;
}
body{font-family:'DM Sans',sans-serif;font-weight:400;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:300;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);border-bottom:1px solid rgba(26,36,40,0.05);}
.nav-logo{display:flex;align-items:center;gap:6px;text-decoration:none;}
.nav-wordmark{font-size:18px;font-weight:800;color:#1C2B32;letter-spacing:-0.02em;line-height:1;}
.nav-back{font-size:12px;font-weight:500;color:var(--ink-muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color 0.2s;letter-spacing:0.04em;text-transform:uppercase;}
.nav-back:hover{color:var(--teal);}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:ldot 1.2s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── IDENTITY HERO — typography-led, warm, human-first ── */
.agent-hero{
  margin-top:54px;
  position:relative;
  background:var(--warm);
  overflow:hidden;
  min-height:72vw;
}

/* Slow property crossfade behind identity — atmosphere only */
.hero-bg-reel{
  position:absolute;inset:0;z-index:0;
}
.hero-bg-slide{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center 45%;
  opacity:0;
  transition:opacity 2s ease-in-out;
}
.hero-bg-slide.active{opacity:0.18;}

/* Warm overlay — keeps background as atmosphere */
.hero-warm-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(
    135deg,
    rgba(247,243,236,0.96) 0%,
    rgba(247,243,236,0.88) 60%,
    rgba(247,243,236,0.70) 100%
  );
}

/* Identity content */
.hero-identity{
  position:relative;z-index:2;
  padding:44px 24px 40px;
  display:flex;align-items:flex-start;gap:20px;
  max-width:780px;margin:0 auto;
}
.hero-portrait{
  width:80px;height:80px;
  border-radius:50%;overflow:hidden;
  flex-shrink:0;
  border:2px solid rgba(26,36,40,0.1);
  background:var(--warm-deep);
  margin-top:4px;
}
.hero-portrait img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.hero-portrait-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--teal);}
.hero-text{}
.hero-credential{font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;display:block;}
.hero-name{
  font-size:clamp(28px,6vw,40px);font-weight:800;
  color:var(--ink);letter-spacing:-0.04em;line-height:1.0;
  margin-bottom:8px;
}
.hero-role{font-size:13px;font-weight:400;color:var(--ink-muted);margin-bottom:14px;letter-spacing:0.01em;}
.hero-bio{
  font-size:16px;font-weight:400;color:var(--ink-soft);
  line-height:1.8;max-width:420px;
}

/* CONTACT */
.agent-contact-wrap{padding:0 24px 28px;max-width:780px;margin:0 auto;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:var(--wa);color:#fff;font-size:15px;font-weight:500;text-decoration:none;border-radius:4px;transition:background 0.2s;box-shadow:0 2px 14px rgba(26,158,80,0.16);}
.btn-wa:active{background:#168C45;}

/* SOFT SEPARATOR */
.soft-sep{height:1px;background:var(--border);max-width:780px;margin:0 auto;}

/* ── PORTFOLIO — clean aligned grid, works at any count ── */
.portfolio-wrap{padding:28px 24px 64px;max-width:780px;margin:0 auto;}

/* Consistent 2-col grid — clean and aligned */
.portfolio-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
/* First card always full width — hero listing */
.portfolio-grid .p-card:first-child{grid-column:1/-1;}
.portfolio-grid .p-card:first-child .p-img{aspect-ratio:16/9;}
.portfolio-grid .p-card:first-child .p-img img{object-position:center 50%;}
.portfolio-grid .p-card:first-child .p-price{font-size:18px;}
/* All subsequent cards consistent — no awkward orphans */
.p-card{display:block;text-decoration:none;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.p-card:hover{transform:translateY(-2px);}
.p-img{aspect-ratio:4/3;overflow:hidden;background:var(--warm);border-radius:3px;position:relative;}
.p-img img{width:100%;height:100%;object-fit:cover;object-position:center 45%;display:block;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);}
.p-card:hover .p-img img{transform:scale(1.03);}
.p-tx{position:absolute;top:10px;left:10px;background:rgba(255,255,255,0.9);font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft);padding:3px 9px;border-radius:2px;}
.p-featured-dot{position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 0 2px rgba(255,255,255,0.5);}
.p-body{padding:10px 2px 0;}
.p-price{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;line-height:1;margin-bottom:3px;}
.p-loc{font-size:11px;color:var(--ink-muted);}

/* Empty portfolio fallback */
.portfolio-fallback{grid-column:1/-1;border-radius:3px;overflow:hidden;position:relative;}
.portfolio-fallback img{width:100%;aspect-ratio:16/9;object-fit:cover;object-position:center 50%;display:block;opacity:0.55;}
.portfolio-fallback-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.portfolio-fallback-text{font-size:13px;font-weight:400;color:var(--ink-muted);letter-spacing:0.04em;}

.page-footer{padding:20px 24px 40px;text-align:center;border-top:1px solid var(--border);}
.page-footer p{font-size:12px;color:var(--ink-muted);letter-spacing:0.04em;}

/* MOTION */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both;}
.fu1{animation-delay:0s;}.fu2{animation-delay:0.08s;}.fu3{animation-delay:0.16s;}.fu4{animation-delay:0.24s;}
@media(prefers-reduced-motion:reduce){.fu{animation:none;} .hero-bg-slide{transition:none;}}

@media(max-width:600px){
  .agent-hero{min-height:auto;}
  .hero-identity{padding:36px 20px 32px;gap:16px;}
  .hero-portrait{width:68px;height:68px;}
  .hero-name{font-size:28px;}
  .agent-contact-wrap,.portfolio-wrap{padding-left:20px;padding-right:20px;}
  .portfolio-grid{gap:10px;}
}
</style>
</head>
<body>
<div class="loading-screen" id="loading"><div class="loading-dot"></div></div>
<div id="page" style="display:none;">

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="28" height="24" viewBox="0 0 46 38" fill="none" shape-rendering="geometricPrecision">
      <circle cx="11" cy="10" r="8.5" fill="#38A8A8"/>
      <circle cx="27" cy="14" r="3.5" fill="#1C2B32"/>
    </svg>
    <span class="nav-wordmark">Pintag</span>
  </a>
  <a href="for-agents.html" class="nav-back">← Pintag</a>
</nav>

<!-- HERO — identity first, property as atmosphere -->
<div class="agent-hero" id="agent-hero">
  <div class="hero-bg-reel" id="hero-reel"></div>
  <div class="hero-warm-overlay"></div>
  <div class="hero-identity fu fu1">
    <div class="hero-portrait" id="hero-portrait">
      <div class="hero-portrait-initial" id="hero-initial">?</div>
    </div>
    <div class="hero-text">
      <span class="hero-credential" id="hero-credential" style="display:none;">VERIFIED AGENT</span>
      <h1 class="hero-name" id="hero-name">—</h1>
      <p class="hero-role" id="hero-role">Property Advisor · ວຽງຈັນ</p>
      <p class="hero-bio" id="hero-bio" style="display:none;"></p>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="agent-contact-wrap fu fu2">
  <a href="#" id="wa-btn" target="_blank" class="btn-wa">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span id="wa-label">ຢາກຮູ້ເພີ່ມເຕີມ? ທັກໄດ້ເລີຍ</span>
  </a>
</div>

<div class="soft-sep"></div>

<!-- PORTFOLIO -->
<div class="portfolio-wrap fu fu3">
  <div class="portfolio-grid" id="portfolio-grid"></div>
</div>

<div class="page-footer"><p>Pintag · pintag.io</p></div>
</div>

<script>
const SB='https://eoladhcljbpbhnrmmpev.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';
const FALLBACK='https://pintag-cyrora.github.io/pintag/pintag-interior.png';
const slug=new URLSearchParams(location.search).get('slug');

var interiorKW=['interior','living','bedroom','kitchen','dining','sofa','bathroom'];
var exteriorKW=['cover','facade','exterior','drone','front'];
function pickWarmImg(images){
  if(!images||!images.length) return null;
  function score(url){
    var u=(url||'').toLowerCase();
    for(var i=0;i<interiorKW.length;i++) if(u.includes(interiorKW[i])) return 2;
    for(var i=0;i<exteriorKW.length;i++) if(u.includes(exteriorKW[i])) return 0;
    return 1;
  }
  return images.slice().sort(function(a,b){return score(b)-score(a);})[0]||null;
}

// Slow CSS crossfade reel — atmosphere only, barely noticeable
function startReel(images){
  var reel=document.getElementById('hero-reel');
  if(!reel||!images||images.length<1) return;
  var slides=images.slice(0,4);
  slides.forEach(function(src,i){
    var img=document.createElement('img');
    img.className='hero-bg-slide'+(i===0?' active':'');
    img.src=src;img.alt='';img.loading=i===0?'eager':'lazy';
    reel.appendChild(img);
  });
  if(slides.length<2) return;
  var cur=0;
  setInterval(function(){
    var allSlides=reel.querySelectorAll('.hero-bg-slide');
    allSlides[cur].classList.remove('active');
    cur=(cur+1)%allSlides.length;
    allSlides[cur].classList.add('active');
  },7000); // 7 seconds — almost subliminal
}

function showError(msg){
  document.getElementById('loading').innerHTML=
    '<div style="padding:40px 24px;text-align:center;font-family:DM Sans,sans-serif;max-width:320px;margin:0 auto;">'+
    '<p style="color:#7A9098;font-size:14px;line-height:1.8;margin-bottom:20px;">'+msg+'</p>'+
    '<a href="for-agents.html" style="color:#2D8C8C;font-size:14px;text-decoration:none;">← Pintag</a></div>';
}

async function load(){
  if(!slug){showError('ບໍ່ພົບໂປຣໄຟລ໌ຕົວແທນ');return;}
  var ctrl=new AbortController();
  var t=setTimeout(function(){ctrl.abort();},8000);
  try{
    var r=await fetch(SB+'/rest/v1/agents?slug=eq.'+encodeURIComponent(slug)+'&limit=1',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY},signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var ag=await r.json();
    console.log('Resolved slug:', slug);
    console.log('Agent object:', ag);
    if(!ag||!ag[0]) throw new Error('Agent not found');
    var a=ag[0];
    console.log('Agent ID:', a.id);
    var r2=await fetch(
      SB+'/rest/v1/properties?agent_id=eq.'+encodeURIComponent(a.id)+'&order=is_featured.desc,created_at.desc&select=slug,title_lo,title_en,price_display,district_lo,district_en,images,transaction_type,is_featured',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    var listings=await r2.json();
    console.log('Listings returned:', listings);
    if(!Array.isArray(listings)) listings=[];
    render(a,listings);
    document.getElementById('loading').style.display='none';
    document.getElementById('page').style.display='block';
  }catch(err){
    clearTimeout(t);
    showError(err.name==='AbortError'?'ການໂຫຼດໃຊ້ເວລາດົນ — ກະລຸນາລອງໃໝ່':'ບໍ່ສາມາດໂຫຼດຂໍ້ມູນໄດ້');
  }
}

function render(a,listings){
  document.title='Pintag · '+(a.name_en||'Agent');
  var initial=(a.name_en||'A').charAt(0).toUpperCase();

  // Portrait
  document.getElementById('hero-initial').textContent=initial;
  if(a.photo_url){
    var port=document.getElementById('hero-portrait');
    var img=document.createElement('img');
    img.alt='';img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;display:block;';
    img.onerror=function(){this.onerror=null;port.innerHTML='<div class="hero-portrait-initial">'+initial+'</div>';};
    img.src=a.photo_url;port.innerHTML='';port.appendChild(img);
  }

  // Credential
  if(a.is_verified) document.getElementById('hero-credential').style.display='block';

  // Name
  document.getElementById('hero-name').textContent=a.name_lo||a.name_en||'Agent';

  // Role
  var roleEl=document.getElementById('hero-role');
  roleEl.textContent=a.agency_name?a.agency_name+' · ວຽງຈັນ':'ຕົວແທນອະສັງຫາ · ວຽງຈັນ';

  // Bio — warm fallback if empty
  var bio=a.bio_lo||a.bio_en||'';
  if(bio){
    var bioEl=document.getElementById('hero-bio');
    bioEl.textContent=bio;
    bioEl.style.display='block';
  }

  // WhatsApp
  var waN=(a.whatsapp||'').replace(/[^0-9]/g,'');
  var waM=encodeURIComponent('ສະບາຍດີ '+(a.name_lo||a.name_en||'')+', ຂ້ອຍຢາກສອບຖາມກ່ຽວກັບລາຍການ Pintag ຂອງທ່ານ');
  document.getElementById('wa-btn').href='https://wa.me/'+waN+'?text='+waM;
  document.getElementById('wa-label').textContent='ຢາກຮູ້ເພີ່ມເຕີມ? ທັກຫາ '+(a.name_lo||a.name_en||'')+'ໄດ້ເລີຍ';

  // Background reel — use listing images as atmosphere
  var reelImgs=[];
  listings.forEach(function(l){
    if(l.images&&l.images.length) reelImgs.push(l.images[0]);
  });
  if(reelImgs.length) startReel(reelImgs);

  // Portfolio grid
  var grid=document.getElementById('portfolio-grid');
  if(!listings.length){
    var fb=document.createElement('div');fb.className='portfolio-fallback';
    var fbImg=document.createElement('img');fbImg.src=FALLBACK;fbImg.alt='';fb.appendChild(fbImg);
    var fbOv=document.createElement('div');fbOv.className='portfolio-fallback-overlay';
    var fbTxt=document.createElement('p');fbTxt.className='portfolio-fallback-text';
    fbTxt.textContent='ລາຍການກຳລັງຈະມາ';fbOv.appendChild(fbTxt);fb.appendChild(fbOv);
    grid.appendChild(fb);return;
  }

  listings.forEach(function(p,i){
    var imgs=Array.isArray(p.images)?p.images:[];
    var thumb=pickWarmImg(imgs)||imgs[0]||null;
    var card=document.createElement('a');
    card.href='listing.html?slug='+encodeURIComponent(p.slug||'');
    card.className='p-card';
    var imgDiv=document.createElement('div');imgDiv.className='p-img';
    if(thumb){
      var ti=document.createElement('img');ti.src=thumb;ti.alt='';
      ti.loading=i===0?'eager':'lazy';ti.decoding='async';imgDiv.appendChild(ti);
    }
    var tx=document.createElement('span');tx.className='p-tx';
    tx.textContent=p.transaction_type==='for_sale'?'ຂາຍ':'ເຊົ່າ';imgDiv.appendChild(tx);
    if(p.is_featured){var dot=document.createElement('span');dot.className='p-featured-dot';imgDiv.appendChild(dot);}
    var body=document.createElement('div');body.className='p-body';
    if(p.price_display){var pe=document.createElement('p');pe.className='p-price';pe.textContent=p.price_display;body.appendChild(pe);}
    if(p.district_lo||p.district_en){var de=document.createElement('p');de.className='p-loc';de.textContent=p.district_lo||p.district_en;body.appendChild(de);}
    card.appendChild(imgDiv);card.appendChild(body);grid.appendChild(card);
  });
}

load();
</script>
</body>
</html>
