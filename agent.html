<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;
  --ink:#1C2B32;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--white:#FFFFFF;
  --border:rgba(26,36,40,0.07);
  --wa:#1A9E50;
}
body{font-family:'DM Sans',sans-serif;font-weight:400;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:54px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(26,36,40,0.05);
}
.nav-logo{display:flex;align-items:center;gap:6px;text-decoration:none;}
.nav-wordmark{font-size:18px;font-weight:800;color:#1C2B32;letter-spacing:-0.02em;line-height:1;}
.nav-back{font-size:12px;font-weight:500;color:var(--ink-muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color 0.2s;letter-spacing:0.04em;text-transform:uppercase;}
.nav-back:hover{color:var(--teal);}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:ldot 1.2s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── AGENT IDENTITY — no boxes, atmosphere only ── */
.agent-identity{
  margin-top:54px;
  padding:48px 24px 36px;
  max-width:780px;margin-left:auto;margin-right:auto;
  padding-top:calc(54px + 48px);
}
.agent-photo-row{
  display:flex;align-items:flex-end;gap:20px;
  margin-bottom:28px;
}
.agent-avatar{
  width:88px;height:88px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:var(--warm);
}
.agent-avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.agent-avatar-initial{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:700;color:var(--teal);
}
.agent-identity-text{}
.agent-verified{
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--teal);margin-bottom:6px;display:block;
}
.agent-name-block{
  font-size:clamp(28px,5vw,38px);font-weight:800;
  color:var(--ink);letter-spacing:-0.035em;line-height:1.05;
  margin-bottom:6px;
}
.agent-sub{
  font-size:14px;font-weight:400;color:var(--ink-muted);
  letter-spacing:0.01em;
}

/* BIO — editorial, no box */
.agent-bio{
  font-size:16px;font-weight:300;color:var(--ink-soft);
  line-height:2.0;margin-top:20px;
  max-width:560px;
}

/* LANGUAGES — quiet, inline */
.agent-langs{
  margin-top:16px;
  font-size:12px;font-weight:500;color:var(--ink-muted);
  letter-spacing:0.06em;text-transform:uppercase;
}

/* DIVIDER */
.section-divider{
  height:1px;background:var(--border);
  max-width:780px;margin:0 auto;
}

/* WA — integrated, calm */
.agent-contact{
  padding:28px 24px;
  max-width:780px;margin:0 auto;
}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px;
  background:var(--wa);color:#fff;
  font-size:15px;font-weight:600;
  text-decoration:none;border-radius:4px;
  transition:background 0.2s;
  box-shadow:0 2px 16px rgba(26,158,80,0.18);
  letter-spacing:0.01em;
}
.btn-wa:active{background:#168C45;}

/* ── PORTFOLIO — cinematic grid ── */
.agent-portfolio{
  padding:36px 24px 48px;
  max-width:780px;margin:0 auto;
}
.portfolio-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:24px;
}
.portfolio-title{
  font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-muted);
}
.portfolio-count{
  font-size:11px;font-weight:400;color:var(--ink-muted);
}

/* Card grid — 2 col, cinematic feel */
.portfolio-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* First card spans full width — hero listing */
.portfolio-grid .listing-card:first-child{
  grid-column:1/-1;
}
.portfolio-grid .listing-card:first-child .card-img{
  aspect-ratio:16/9;
}

.listing-card{
  text-decoration:none;
  display:block;
  overflow:hidden;
  background:var(--white);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.listing-card:hover{transform:translateY(-3px);}
.card-img{
  aspect-ratio:4/3;
  overflow:hidden;
  background:var(--warm);
  position:relative;
  border-radius:3px;
}
.card-img img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.listing-card:hover .card-img img{transform:scale(1.04);}
.card-tx{
  position:absolute;top:10px;left:10px;
  background:rgba(255,255,255,0.92);
  font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-soft);padding:3px 9px;border-radius:2px;
}
.card-body{padding:12px 2px 0;}
.card-price{
  font-size:16px;font-weight:700;color:var(--ink);
  letter-spacing:-0.02em;line-height:1;margin-bottom:4px;
}
.card-title{
  font-size:12px;font-weight:400;color:var(--ink-soft);
  line-height:1.4;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.card-loc{
  font-size:11px;color:var(--ink-muted);
  display:flex;align-items:center;gap:4px;
}

/* No listings */
.no-listings{
  grid-column:1/-1;
  padding:40px 0;text-align:center;
  color:var(--ink-muted);font-size:14px;font-weight:300;
}

/* FOOTER */
.agent-footer{
  padding:20px 24px 40px;
  text-align:center;
  border-top:1px solid var(--border);
}
.agent-footer p{font-size:12px;color:var(--ink-muted);letter-spacing:0.04em;}

/* MOTION */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both;}
.fu1{animation-delay:0.0s;}
.fu2{animation-delay:0.07s;}
.fu3{animation-delay:0.14s;}
.fu4{animation-delay:0.21s;}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none;}}

/* MOBILE */
@media(max-width:600px){
  .agent-identity{padding:calc(54px + 32px) 20px 28px;}
  .agent-avatar{width:72px;height:72px;}
  .agent-name-block{font-size:26px;}
  .agent-bio{font-size:15px;}
  .portfolio-grid{gap:10px;}
  .agent-contact{padding:20px 20px;}
  .agent-portfolio{padding:28px 20px 40px;}
  .card-price{font-size:15px;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-dot"></div>
</div>

<div id="page" style="display:none;">

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="28" height="24" viewBox="0 0 46 38" fill="none" shape-rendering="geometricPrecision">
      <circle cx="11" cy="10" r="8.5" fill="#38A8A8"/>
      <circle cx="27" cy="14" r="3.5" fill="#1C2B32"/>
    </svg>
    <span class="nav-wordmark">Pintag</span>
  </a>
  <a href="listings.html" class="nav-back">← Listings</a>
</nav>

<!-- AGENT IDENTITY -->
<div class="agent-identity fade-up fu1">
  <div class="agent-photo-row">
    <div class="agent-avatar" id="agent-avatar">
      <div class="agent-avatar-initial" id="agent-initial">?</div>
    </div>
    <div class="agent-identity-text">
      <span class="agent-verified" id="agent-badge" style="display:none;">✓ Pintag Agent</span>
      <h1 class="agent-name-block" id="agent-name">—</h1>
      <p class="agent-sub" id="agent-sub">ວຽງຈັນ</p>
    </div>
  </div>
  <p class="agent-bio" id="agent-bio" style="display:none;"></p>
  <p class="agent-langs" id="agent-langs" style="display:none;"></p>
</div>

<div class="section-divider"></div>

<!-- CONTACT -->
<div class="agent-contact fade-up fu2">
  <a href="#" id="wa-btn" target="_blank" class="btn-wa">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span id="wa-label">ຕິດຕໍ່ · WhatsApp</span>
  </a>
</div>

<div class="section-divider"></div>

<!-- PORTFOLIO -->
<div class="agent-portfolio fade-up fu3">
  <div class="portfolio-header">
    <span class="portfolio-title">ລາຍການ · Portfolio</span>
    <span class="portfolio-count" id="portfolio-count"></span>
  </div>
  <div class="portfolio-grid" id="portfolio-grid">
    <div class="no-listings" id="no-listings" style="display:none;">
      ຍັງບໍ່ມີລາຍການ · No active listings
    </div>
  </div>
</div>

<div class="agent-footer fade-up fu4">
  <p>Pintag · pintag.io</p>
</div>

</div>

<script>
const SB='https://eoladhcljbpbhnrmmpev.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';
const slug=new URLSearchParams(location.search).get('slug');

function showError(msg){
  document.getElementById('loading').innerHTML=
    '<div style="padding:40px 24px;text-align:center;font-family:DM Sans,sans-serif;max-width:320px;margin:0 auto;">'+
    '<p style="color:#7A9098;font-size:14px;line-height:1.8;margin-bottom:20px;">'+msg+'</p>'+
    '<a href="listings.html" style="color:#2D8C8C;font-size:14px;text-decoration:none;">← ກັບຄືນ · Back</a></div>';
}

async function loadAgent(){
  if(!slug){showError('ບໍ່ພົບ Agent · Agent not found');return;}
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},8000);
  try{
    var r=await fetch(
      SB+'/rest/v1/agents?slug=eq.'+encodeURIComponent(slug)+'&limit=1',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY},signal:controller.signal}
    );
    clearTimeout(timer);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var agents=await r.json();
    if(!agents||!agents[0]) throw new Error('Not found');
    var a=agents[0];

    var r2=await fetch(
      SB+'/rest/v1/properties?agent_id=eq.'+a.id+'&status=eq.available&order=created_at.desc&select=slug,title_lo,title_en,price_display,district_lo,district_en,images,transaction_type,bedrooms',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}
    );
    var listings=await r2.json();
    if(!Array.isArray(listings)) listings=[];

    render(a,listings);
    document.getElementById('loading').style.display='none';
    document.getElementById('page').style.display='block';
  }catch(err){
    clearTimeout(timer);
    showError(err.name==='AbortError'?'ການໂຫຼດໃຊ້ເວລາດົນ · Timed out':'ບໍ່ສາມາດໂຫຼດໄດ້ · Unable to load');
  }
}

function render(a,listings){
  document.title='Pintag · '+(a.name_en||'Agent');

  // Avatar
  var av=document.getElementById('agent-avatar');
  var initial=(a.name_en||'A').charAt(0).toUpperCase();
  document.getElementById('agent-initial').textContent=initial;
  if(a.photo_url){
    var img=document.createElement('img');
    img.alt=a.name_en||'';
    img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;display:block;';
    img.onerror=function(){this.onerror=null;av.innerHTML='<div class="agent-avatar-initial">'+initial+'</div>';};
    img.src=a.photo_url;
    av.innerHTML='';
    av.appendChild(img);
  }

  // Identity
  if(a.is_verified) document.getElementById('agent-badge').style.display='block';
  document.getElementById('agent-name').textContent=a.name_lo||a.name_en||'Agent';
  var sub=[];
  if(a.agency_name) sub.push(a.agency_name);
  sub.push('Pintag · ວຽງຈັນ');
  document.getElementById('agent-sub').textContent=sub.join(' · ');

  // Bio
  var bio=a.bio_lo||a.bio_en||'';
  if(bio){
    var bioEl=document.getElementById('agent-bio');
    bioEl.textContent=bio;
    bioEl.style.display='block';
  }

  // Languages — quiet inline text, not pills
  if(a.languages&&a.languages.length){
    var langsEl=document.getElementById('agent-langs');
    langsEl.textContent=a.languages.join(' · ');
    langsEl.style.display='block';
  }

  // WhatsApp
  var waN=(a.whatsapp||'').replace(/[^0-9]/g,'');
  var waM=encodeURIComponent('ສະບາຍດີ '+(a.name_lo||a.name_en||'')+', ຂ້ອຍຢາກສອບຖາມກ່ຽວກັບລາຍການ Pintag');
  document.getElementById('wa-btn').href='https://wa.me/'+waN+'?text='+waM;
  document.getElementById('wa-label').textContent='ຕິດຕໍ່ '+(a.name_lo||a.name_en||'Agent')+' · WhatsApp';

  // Portfolio
  var grid=document.getElementById('portfolio-grid');
  document.getElementById('portfolio-count').textContent=listings.length?listings.length+' ລາຍການ':'';

  if(!listings.length){
    document.getElementById('no-listings').style.display='block';
    return;
  }

  listings.forEach(function(p,i){
    var imgs=Array.isArray(p.images)?p.images:[];
    var thumb=imgs[0]||'';
    var price=p.price_display||'';
    var title=p.title_lo||p.title_en||'';
    var district=p.district_lo||p.district_en||'';
    var tx=p.transaction_type==='for_sale'?'ຂາຍ':'ເຊົ່າ';

    var card=document.createElement('a');
    card.href='listing.html?slug='+encodeURIComponent(p.slug||'');
    card.className='listing-card';

    // Thumbnail
    var imgDiv=document.createElement('div');
    imgDiv.className='card-img';
    if(thumb){
      var tImg=document.createElement('img');
      tImg.src=thumb;tImg.alt=title;
      tImg.loading=i===0?'eager':'lazy';
      tImg.decoding='async';
      imgDiv.appendChild(tImg);
    }
    var txBadge=document.createElement('span');
    txBadge.className='card-tx';
    txBadge.textContent=tx;
    imgDiv.appendChild(txBadge);

    // Body
    var body=document.createElement('div');
    body.className='card-body';
    if(price){var pEl=document.createElement('p');pEl.className='card-price';pEl.textContent=price;body.appendChild(pEl);}
    if(title){var tEl=document.createElement('p');tEl.className='card-title';tEl.textContent=title;body.appendChild(tEl);}
    if(district){var dEl=document.createElement('p');dEl.className='card-loc';dEl.textContent=district;body.appendChild(dEl);}

    card.appendChild(imgDiv);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

loadAgent();
</script>
</body>
</html>
