<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintag · Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#2D8C8C;--teal-light:#38A8A8;
  --ink:#1C2B32;--ink-soft:#3D5058;--ink-muted:#7A9098;
  --warm:#F7F3EC;--white:#FFFFFF;
  --border:rgba(26,36,40,0.07);
  --wa:#1A9E50;
}
body{font-family:'DM Sans',sans-serif;font-weight:400;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:54px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(26,36,40,0.05);
}
.nav-logo{display:flex;align-items:center;gap:6px;text-decoration:none;}
.nav-wordmark{font-size:18px;font-weight:800;color:#1C2B32;letter-spacing:-0.02em;line-height:1;}
.nav-back{font-size:12px;font-weight:500;color:var(--ink-muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color 0.2s;letter-spacing:0.04em;text-transform:uppercase;}
.nav-back:hover{color:var(--teal);}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:ldot 1.2s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── HERO — cinematic, image-first ── */
.agent-hero{
  margin-top:54px;
  position:relative;
  background:var(--ink);
  overflow:hidden;
}
.hero-img{
  width:100%;
  height:75vw;
  min-height:320px;
  max-height:520px;
  object-fit:cover;
  object-position:center;
  display:block;
  opacity:0.85;
}
.hero-gradient{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(20,28,32,0.0) 0%,
    rgba(20,28,32,0.1) 40%,
    rgba(20,28,32,0.75) 80%,
    rgba(20,28,32,0.92) 100%
  );
}
/* Agent identity overlaid on hero bottom */
.hero-identity{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:24px 24px 28px;
  display:flex;align-items:flex-end;gap:16px;
}
.hero-avatar{
  width:64px;height:64px;
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.1);
}
.hero-avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.hero-avatar-initial{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:rgba(255,255,255,0.8);
}
.hero-text{}
.hero-verified{
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--teal-light);margin-bottom:4px;display:block;
}
.hero-name{
  font-size:clamp(22px,5vw,30px);font-weight:800;
  color:#fff;letter-spacing:-0.03em;line-height:1.05;
  margin-bottom:2px;
}
.hero-sub{
  font-size:13px;font-weight:400;
  color:rgba(255,255,255,0.6);letter-spacing:0.01em;
}

/* Hero fallback — no image */
.hero-no-img{
  width:100%;
  padding:calc(54px + 48px) 24px 40px;
  background:var(--warm);
}
.hero-no-img .hero-identity{
  position:static;padding:0;
  align-items:flex-start;
  flex-direction:column;gap:12px;
}
.hero-no-img .hero-avatar{
  border-color:var(--border);
  background:var(--white);
}
.hero-no-img .hero-avatar-initial{color:var(--teal);}
.hero-no-img .hero-name{color:var(--ink);}
.hero-no-img .hero-sub{color:var(--ink-muted);}
.hero-no-img .hero-verified{color:var(--teal);}

/* ── BIO — editorial, open space ── */
.agent-bio-section{
  padding:28px 24px 24px;
  border-bottom:1px solid var(--border);
  max-width:780px;margin:0 auto;
}
.agent-bio-text{
  font-size:16px;font-weight:300;
  color:var(--ink-soft);line-height:2.0;
  max-width:540px;
}
.agent-langs{
  margin-top:12px;
  font-size:11px;font-weight:500;
  color:var(--ink-muted);letter-spacing:0.1em;text-transform:uppercase;
}

/* ── CONTACT ── */
.agent-contact{
  padding:24px 24px;
  border-bottom:1px solid var(--border);
  max-width:780px;margin:0 auto;
}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px;
  background:var(--wa);color:#fff;
  font-size:15px;font-weight:600;
  text-decoration:none;border-radius:4px;
  transition:background 0.2s;
  box-shadow:0 2px 16px rgba(26,158,80,0.18);
  letter-spacing:0.01em;
}
.btn-wa:active{background:#168C45;}

/* ── PORTFOLIO ── */
.agent-portfolio{
  padding:32px 24px 56px;
  max-width:780px;margin:0 auto;
}
.portfolio-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:24px;
}
.portfolio-label{
  font-size:11px;font-weight:600;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--ink-muted);
}
.portfolio-count{font-size:11px;color:var(--ink-muted);}

/* Grid — editorial feel */
.portfolio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}

/* First card — hero listing, full width */
.portfolio-grid .p-card:first-child{grid-column:1/-1;}
.portfolio-grid .p-card:first-child .p-img{aspect-ratio:16/9;}
.portfolio-grid .p-card:first-child .p-price{font-size:20px;}
.portfolio-grid .p-card:first-child .p-title{-webkit-line-clamp:2;font-size:14px;}

.p-card{
  display:block;text-decoration:none;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.p-card:hover{transform:translateY(-3px);}
.p-img{
  aspect-ratio:4/3;overflow:hidden;
  background:var(--warm);border-radius:3px;
  position:relative;
}
.p-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.p-card:hover .p-img img{transform:scale(1.04);}
.p-img-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--warm);
}
.p-tx{
  position:absolute;top:10px;left:10px;
  background:rgba(255,255,255,0.92);
  font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-soft);padding:3px 9px;border-radius:2px;
}
.p-featured-dot{
  position:absolute;top:10px;right:10px;
  width:7px;height:7px;border-radius:50%;
  background:var(--teal-light);
  box-shadow:0 0 0 2px rgba(255,255,255,0.6);
}
.p-body{padding:12px 2px 0;}
.p-price{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;line-height:1;margin-bottom:5px;}
.p-title{
  font-size:13px;font-weight:400;color:var(--ink-soft);line-height:1.45;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.p-loc{font-size:11px;color:var(--ink-muted);}

.no-listings{
  grid-column:1/-1;padding:48px 0;
  text-align:center;color:var(--ink-muted);
  font-size:14px;font-weight:300;line-height:1.8;
}

/* FOOTER */
.agent-footer{
  padding:20px 24px 40px;
  text-align:center;border-top:1px solid var(--border);
}
.agent-footer p{font-size:12px;color:var(--ink-muted);letter-spacing:0.04em;}

/* MOTION */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both;}
.fu1{animation-delay:0s;}
.fu2{animation-delay:0.08s;}
.fu3{animation-delay:0.16s;}
.fu4{animation-delay:0.24s;}
@media(prefers-reduced-motion:reduce){.fu{animation:none;}}

/* MOBILE */
@media(max-width:600px){
  .hero-img{height:72vw;min-height:260px;}
  .hero-identity{padding:20px 20px 24px;}
  .hero-avatar{width:52px;height:52px;}
  .hero-name{font-size:22px;}
  .agent-bio-section,.agent-contact,.agent-portfolio{padding-left:20px;padding-right:20px;}
  .portfolio-grid{gap:10px;}
  .p-price{font-size:15px;}
  .portfolio-grid .p-card:first-child .p-price{font-size:17px;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-dot"></div>
</div>

<div id="page" style="display:none;">

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="28" height="24" viewBox="0 0 46 38" fill="none" shape-rendering="geometricPrecision">
      <circle cx="11" cy="10" r="8.5" fill="#38A8A8"/>
      <circle cx="27" cy="14" r="3.5" fill="#1C2B32"/>
    </svg>
    <span class="nav-wordmark">Pintag</span>
  </a>
  <a href="listings.html" class="nav-back">← Listings</a>
</nav>

<!-- HERO — image first, identity overlaid -->
<div class="agent-hero" id="agent-hero">
  <!-- populated by JS -->
</div>

<!-- BIO -->
<div class="agent-bio-section fu fu2" id="bio-section" style="display:none;">
  <p class="agent-bio-text" id="bio-text"></p>
  <p class="agent-langs" id="agent-langs" style="display:none;"></p>
</div>

<!-- CONTACT -->
<div class="agent-contact fu fu3">
  <a href="#" id="wa-btn" target="_blank" class="btn-wa">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span id="wa-label">ຕິດຕໍ່ · WhatsApp</span>
  </a>
</div>

<!-- PORTFOLIO -->
<div class="agent-portfolio fu fu4">
  <div class="portfolio-header">
    <span class="portfolio-label">Portfolio</span>
    <span class="portfolio-count" id="portfolio-count"></span>
  </div>
  <div class="portfolio-grid" id="portfolio-grid"></div>
</div>

<div class="agent-footer">
  <p>Pintag · pintag.io</p>
</div>

</div>

<script>
const SB='https://eoladhcljbpbhnrmmpev.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbGFkaGNsamJwYmhucm1tcGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE4NDQsImV4cCI6MjA5MTgyNzg0NH0.z1K8CqRFPIqiC7Gvfv1GekcQLIIkLodgyOksio1Upn0';
const slug=new URLSearchParams(location.search).get('slug');

function showError(msg){
  document.getElementById('loading').innerHTML=
    '<div style="padding:40px 24px;text-align:center;font-family:DM Sans,sans-serif;max-width:320px;margin:0 auto;">'+
    '<p style="color:#7A9098;font-size:14px;line-height:1.8;margin-bottom:20px;">'+msg+'</p>'+
    '<a href="listings.html" style="color:#2D8C8C;font-size:14px;text-decoration:none;">← ກັບຄືນ · Back</a></div>';
}

async function loadAgent(){
  if(!slug){showError('ບໍ່ພົບ Agent · Agent not found');return;}
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},8000);
  try{
    var r=await fetch(
      SB+'/rest/v1/agents?slug=eq.'+encodeURIComponent(slug)+'&limit=1',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY},signal:controller.signal}
    );
    clearTimeout(timer);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var agents=await r.json();
    if(!agents||!agents[0]) throw new Error('Not found');
    var a=agents[0];

    // Fetch listings — featured first, then by date
    var r2=await fetch(
      SB+'/rest/v1/properties?agent_id=eq.'+a.id+'&status=eq.available&order=is_featured.desc,created_at.desc&select=slug,title_lo,title_en,price_display,district_lo,district_en,images,transaction_type,bedrooms,is_featured',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}
    );
    var listings=await r2.json();
    if(!Array.isArray(listings)) listings=[];

    render(a,listings);
    document.getElementById('loading').style.display='none';
    document.getElementById('page').style.display='block';
  }catch(err){
    clearTimeout(timer);
    showError(err.name==='AbortError'?'ການໂຫຼດໃຊ້ເວລາດົນ · Timed out':'ບໍ່ສາມາດໂຫຼດໄດ້ · Unable to load');
  }
}

function getHeroImage(listings){
  // Priority: featured → most recent with image → fallback
  var featured=listings.find(function(l){return l.is_featured;});
  if(featured&&featured.images&&featured.images[0]) return featured.images[0];
  var withImg=listings.find(function(l){return l.images&&l.images[0];});
  if(withImg) return withImg.images[0];
  return null;
}

function render(a, listings){
  document.title='Pintag · '+(a.name_en||'Agent');

  var heroImg=getHeroImage(listings);
  var initial=(a.name_en||'A').charAt(0).toUpperCase();
  var heroEl=document.getElementById('agent-hero');

  // Build hero
  if(heroImg){
    // Cinematic hero with image
    heroEl.innerHTML=
      '<img class="hero-img" src="'+heroImg+'" alt="'+(a.name_lo||a.name_en||'')+' · Pintag" loading="eager">'+
      '<div class="hero-gradient"></div>'+
      '<div class="hero-identity fu fu1">'+
        '<div class="hero-avatar" id="hero-av"><div class="hero-avatar-initial">'+initial+'</div></div>'+
        '<div class="hero-text">'+
          (a.is_verified?'<span class="hero-verified">✓ Pintag Agent</span>':'')+
          '<h1 class="hero-name">'+(a.name_lo||a.name_en||'Agent')+'</h1>'+
          '<p class="hero-sub" id="hero-sub">Pintag · ວຽງຈັນ</p>'+
        '</div>'+
      '</div>';
  } else {
    // No image fallback — elegant light hero
    heroEl.classList.add('hero-no-img');
    heroEl.innerHTML=
      '<div class="hero-identity fu fu1">'+
        '<div class="hero-avatar" id="hero-av"><div class="hero-avatar-initial" style="color:var(--teal);">'+initial+'</div></div>'+
        '<div class="hero-text">'+
          (a.is_verified?'<span class="hero-verified">✓ Pintag Agent</span>':'')+
          '<h1 class="hero-name" style="color:var(--ink);">'+(a.name_lo||a.name_en||'Agent')+'</h1>'+
          '<p class="hero-sub" id="hero-sub" style="color:var(--ink-muted);">Pintag · ວຽງຈັນ</p>'+
        '</div>'+
      '</div>';
  }

  // Agent avatar in hero
  if(a.photo_url){
    var av=document.getElementById('hero-av');
    if(av){
      var img=document.createElement('img');
      img.alt=a.name_en||'';
      img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;display:block;';
      img.onerror=function(){this.onerror=null;av.innerHTML='<div class="hero-avatar-initial">'+initial+'</div>';};
      img.src=a.photo_url;
      av.innerHTML='';
      av.appendChild(img);
    }
  }

  // Sub line
  var subEl=document.getElementById('hero-sub');
  if(subEl){
    var sub=[];
    if(a.agency_name) sub.push(a.agency_name);
    sub.push('Pintag · ວຽງຈັນ');
    subEl.textContent=sub.join(' · ');
  }

  // Bio
  var bio=a.bio_lo||a.bio_en||'';
  if(bio){
    document.getElementById('bio-section').style.display='block';
    document.getElementById('bio-text').textContent=bio;
  }

  // Languages
  if(a.languages&&a.languages.length){
    var langsEl=document.getElementById('agent-langs');
    langsEl.textContent=a.languages.join(' · ');
    langsEl.style.display='block';
    if(!bio) document.getElementById('bio-section').style.display='block';
  }

  // WhatsApp
  var waN=(a.whatsapp||'').replace(/[^0-9]/g,'');
  var waM=encodeURIComponent('ສະບາຍດີ '+(a.name_lo||a.name_en||'')+', ຂ້ອຍຢາກສອບຖາມກ່ຽວກັບລາຍການ Pintag ຂອງທ່ານ');
  document.getElementById('wa-btn').href='https://wa.me/'+waN+'?text='+waM;
  document.getElementById('wa-label').textContent='ຕິດຕໍ່ '+(a.name_lo||a.name_en||'Agent')+' · WhatsApp';

  // Portfolio
  var grid=document.getElementById('portfolio-grid');
  document.getElementById('portfolio-count').textContent=listings.length?listings.length+' ລາຍການ':'';

  if(!listings.length){
    var empty=document.createElement('div');
    empty.className='no-listings';
    empty.textContent='ຍັງບໍ່ມີລາຍການ · No active listings';
    grid.appendChild(empty);
    return;
  }

  listings.forEach(function(p,i){
    var imgs=Array.isArray(p.images)?p.images:[];
    var thumb=imgs[0]||'';
    var price=p.price_display||'';
    var title=p.title_lo||p.title_en||'';
    var district=p.district_lo||p.district_en||'';
    var tx=p.transaction_type==='for_sale'?'ຂາຍ':'ເຊົ່າ';

    var card=document.createElement('a');
    card.href='listing.html?slug='+encodeURIComponent(p.slug||'');
    card.className='p-card';

    // Image
    var imgDiv=document.createElement('div');
    imgDiv.className='p-img';
    if(thumb){
      var tImg=document.createElement('img');
      tImg.alt=title;
      tImg.loading=i===0?'eager':'lazy';
      tImg.decoding='async';
      tImg.src=thumb;
      imgDiv.appendChild(tImg);
    } else {
      var ph=document.createElement('div');
      ph.className='p-img-ph';
      imgDiv.appendChild(ph);
    }

    // Transaction badge
    var txBadge=document.createElement('span');
    txBadge.className='p-tx';
    txBadge.textContent=tx;
    imgDiv.appendChild(txBadge);

    // Featured dot
    if(p.is_featured){
      var dot=document.createElement('span');
      dot.className='p-featured-dot';
      dot.title='Featured listing';
      imgDiv.appendChild(dot);
    }

    // Body
    var body=document.createElement('div');
    body.className='p-body';
    if(price){var pEl=document.createElement('p');pEl.className='p-price';pEl.textContent=price;body.appendChild(pEl);}
    if(title){var tEl=document.createElement('p');tEl.className='p-title';tEl.textContent=title;body.appendChild(tEl);}
    if(district){var dEl=document.createElement('p');dEl.className='p-loc';dEl.textContent=district;body.appendChild(dEl);}

    card.appendChild(imgDiv);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

loadAgent();
</script>
</body>
</html>
